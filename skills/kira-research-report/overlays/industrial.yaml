# ============================================================
# KIRA Research — Industry overlay: Industrial / B2B
#
# Covers manufacturing, building materials, chemicals, steel,
# cement, industrial supplies, packaging, machinery, automotive
# components. Project- and capex-cycle driven; OEM and
# distributor relationships are the strategic core.
# ============================================================

overlay_id: industrial
applies_when_keywords:
  - manufacturing
  - industrial
  - building materials
  - construction materials
  - cement
  - steel
  - chemicals
  - petrochemicals
  - polymers
  - packaging
  - machinery
  - equipment
  - automotive components
  - auto parts
