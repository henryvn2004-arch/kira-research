section_emphasis:
  market_opportunity:
    - "Anchor sizing on installed base + replacement cycle + new-build pipeline — three additive demand layers, not a single demand number"
    - "Surface project pipeline (infrastructure, residential, commercial, industrial capex) with named projects above a threshold size where possible"
    - "Frame demand by end-use mix — construction, automotive, packaging, machinery — and which end-use cycle is leading"
    - "Note import penetration % and the local-content / domestic-substitution opportunity if relevant"
    - "Distinguish project-driven (lumpy, contract-bid) demand from MRO / aftermarket (steady, distributor-served) demand"

  competitive_intensity:
    - "Lead with installed capacity ranking (kt/year, units/year) AND utilization rate — utilization gap is often the real story"
    - "Distinguish integrated players (own raw material upstream) from converters / fabricators — margin structures differ"
    - "Surface foreign-JV / wholly-foreign-owned participation and the local-content rules that gate it"
    - "Flag OEM relationships and Tier-1 / Tier-2 supplier classification — once-installed contracts run 5-10 years"
    - "Note recent capacity additions, announced expansions, and mothballed lines — capex cycle determines next 5 years"

  channel:
    - "Map distributor exclusivity arrangements — single-distributor-per-province or per-vertical is the dominant SEA pattern"
    - "Distinguish project sales (direct to contractor or EPC) from spec sales (engineer-specified) from retail / counter sales"
    - "Surface dealer / sub-dealer pyramid depth — typically 2-3 tiers in B2B industrial distribution"
    - "Flag e-procurement / B2B marketplace penetration — still nascent in most SEA industrial categories but accelerating"
    - "Note technical-service and on-site-support footprint as a differentiator, not a cost line"

  regulatory:
    - "Surface local-content rules (TKDN in Indonesia, FTA-rules-of-origin, automotive deletion programs) — material for foreign entrants"
    - "Flag environmental compliance regime — emissions caps, waste-water, hazardous-substance, asbestos and silica rules"
    - "Track import tariff and anti-dumping duty regime — steel, cement, chemicals all see frequent AD investigations"
    - "Note industrial-zone / SEZ incentives where the topic warrants — tax holidays, duty-free imports, land lease terms"
    - "Surface building code / product standard (SNI, JIS, KS, TIS) — non-compliance gates spec inclusion"

  pricing:
    - "Anchor on landed cost per ton / unit including raw material, energy, freight, duty — not factory-gate price alone"
    - "Surface price index trajectory tied to commodity input (iron ore, coking coal, naphtha, ethylene) — pass-through ability is the margin story"
    - "Flag project-price vs list-price divergence — project bids often run 15-30% below list"
    - "Note tiered pricing by volume / annual commitment with named OEMs and key distributors"
    - "Track price-volatility and contract-pricing-window — quarterly resets, monthly resets, or annual fixed"

  partnership:
    - "Frame partnership candidates by archetype: master distributor, project-EPC contractor, OEM buyer, fabricator, technical-service partner"
    - "Surface licensed technology partners (Japanese / European IP holders) — common in chemicals, advanced materials, precision machining"
    - "Flag JV / tolling arrangements with integrated upstream players for downstream entrants"
    - "Note industrial-park anchor tenant relationships as a captive-customer route to market"

  risk_factors:
    - "Capex cycle timing — entering at the wrong point in the construction or auto-build cycle is the single biggest risk"
    - "Raw material price volatility (iron ore, coking coal, naphtha, copper, aluminium) and FX exposure on imports"
    - "Energy cost exposure — most heavy industrial is energy-intensive; power tariff changes move margin 2-5 pp"
    - "Single-OEM concentration — losing one Tier-1 contract can cut volume 20-40%"
    - "Anti-dumping / safeguard duty actions against imports — protects locals but raises input cost for converters"
    - "Environmental enforcement step-up — older plants face stranded-asset risk"

  forecast_drivers:
    - "Anchor forecast on construction GDP, fixed capital formation, or vehicle production — not nominal GDP"
    - "Layer in named project pipeline with start-year and consumption ramp"
    - "Surface capacity-utilization trajectory as the supply-side gate on demand growth"
    - "Note replacement-cycle floor — installed base × end-of-life trajectory provides 30-50% of forecast demand"
    - "Flag substitution risk (steel vs aluminium, cement vs precast, plastic vs metal) where it materially shifts forecast"

  ai_use_cases:
    - "Predictive maintenance on production lines — heavy industrial unplanned-downtime cost is USD 10k-100k / hour"
    - "Demand sensing on order book against distributor stock — reduce finished-goods inventory days"
    - "Process optimization on furnace / reactor / kiln yield — energy-intensive ops have 2-5% efficiency on the table"
    - "Defect detection at QC stations via computer vision — replaces sampling inspection"
    - "Distributor-network optimization on geographic coverage and stock allocation"

chart_emphasis:
  market_data_chart:
    - "Prefer trend_line_5y for installed capacity vs effective demand — utilization gap is the visual story"
    - "Use stacked_bar_share_split for end-use mix evolution (construction vs automotive vs packaging vs machinery)"
    - "Use segment_bar_horizontal for sub-segment ranking by tonnage / units"

  competitive_structure:
    - "Use segment_bar_horizontal ranked by capacity for top-10 producers — capacity, not share, is the durable metric"
    - "Use network_diagram for distributor relationships in §08-09 when channel complexity is the story"

  forecast_outlook:
    - "Prefer dual_axis_combo with construction-GDP growth (or vehicle production) on one axis and category demand on the other"
    - "Layer named project pipeline as annotation, not as a separate chart"

voice_emphasis:
  - "Use 'installed capacity', 'utilization', 'effective demand', 'spec-in', 'project-bid', 'tonnage' — assume B2B reader knows them"
  - "Use 'EPC contractor', 'principal', 'fabricator', 'converter', 'Tier-1', 'Tier-2' precisely — these are not interchangeable"
  - "Frame demand in physical units (kt, units, m3) first, USD value second — B2B reader thinks in volume"
  - "Avoid 'sustainable construction' / 'green steel' as headline framing — use the carbon-intensity number or the spec-mandate driver"
  - "Use 'capex cycle' and 'project pipeline' as compressed terms — don't unpack"
  - "Avoid retail-side vocabulary ('shopper', 'consumer', 'purchase occasion') — wrong register for B2B industrial"

additional_anti_positioning:
  - "Avoid 'Industry 4.0' / 'smart factory' as headline framing — reserve for §10 and anchor on specific use case"
  - "Avoid 'made-in-country' nationalist framing of local content — frame as compliance gate or unit-economics input"
