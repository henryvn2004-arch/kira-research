# ============================================================
# KIRA Research — Industry overlay: FMCG
#
# Covers fast-moving consumer goods: packaged food, beverages
# (incl. coffee/tea/beer/soft drinks), personal care, household,
# snacks, dairy, confectionery. Branded SKUs sold through MT/GT
# rotating off-shelf at high frequency.
# ============================================================

overlay_id: fmcg
applies_when_keywords:
  - fmcg
  - consumer goods
  - packaged food
  - food and beverage
  - f&b
  - beverage
  - beverages
  - personal care
  - home care
  - household
  - snacks
  - dairy
  - confectionery
  - chocolate
  - coffee
  - tea
  - beer
  - soft drinks
  - carbonated
  - rtd
  - bottled water
  - instant noodles
  - cooking oil
  - hair care
  - skin care
  - oral care

section_emphasis:
  market_opportunity:
    - "Anchor sizing on consumption-per-capita gap versus regional benchmark, not just nominal USD value"
    - "Split read between in-home (HoReCa-out) and out-of-home / on-premise occasions when both are material"
    - "Note Tier-1 vs Tier-2/3 city demand structure separately — premium NPD lands in Tier-1 first"
    - "Surface category penetration % of households and frequency of purchase if data available"
    - "Frame demand pull as occasion-led (morning, lunch, evening, gifting) rather than purely demographic"

  competitive_intensity:
    - "Lead with top-3 / top-5 brand share by value AND volume — divergence between the two is the story"
    - "Flag private label penetration % and trajectory; modern trade chains push PL hard in commoditized sub-categories"
    - "Distinguish multinationals (Nestle, Unilever, Mondelez archetypes) from local champions; the local-champion gap is often where opportunity sits"
    - "Surface NPD (new product development) cadence — 6-12 month flavor cycles, limited editions, format extensions"
    - "Note brand affinity / repurchase intent if survey data surfaces, as a forward indicator of share defensibility"

  channel:
    - "Always split modern trade (hyper, super, mini, convenience) vs traditional trade (wet markets, warungs/sari-sari/mom-and-pop) by value share"
    - "Surface quick commerce / instant delivery penetration in Tier-1 cities (15-30 min apps) — material for urban premium SKUs"
    - "Note cafe channel as the premium discovery channel for coffee/tea/RTD — small in volume, decisive for brand pricing power"
    - "Distinguish on-premise (HoReCa) economics from off-premise for beer/spirits/soft drinks — margin structures invert"
    - "Flag direct-to-consumer / brand.com penetration if non-trivial; still nascent in most SEA FMCG sub-categories"
    - "Map distributor exclusivity arrangements — single-distributor-per-province is still common and shapes share defensibility"

  consumer_behavior:
    - "Frame the shopper occasion (treat, refresh, reward, daily-staple) not just the demographic"
    - "Surface brand affinity dynamics — emotional vs functional drivers, and where premium pays back"
    - "Note pack-size / pricing-architecture interaction (sachet economy, mid-size daily, large-size value)"
    - "Track gen-Z vs millennial divergence on health-and-wellness signals (low-sugar, plant-based, functional)"
    - "Distinguish trial-driven vs habit-driven categories — NPD payback economics differ sharply"

  pricing:
    - "Anchor on price per 100g / 100ml / standard serving — not pack price; pack-price ladders mislead on premium gap"
    - "Surface 3-tier price architecture (value / mainstream / premium) with named brands per tier"
    - "Flag sachet / single-serve pricing strategy — entry-point economics for low-income shoppers"
    - "Note recent price-pass-through behavior under commodity inflation (palm oil, sugar, packaging) — pricing power varies sharply by brand strength"
    - "Track promo intensity — % of volume sold on deal — as a proxy for category competitiveness"

  partnership:
    - "Frame partnership candidates by archetype: master distributor, regional sub-distributor, modern-trade buyer, ecommerce platform team, contract manufacturer"
    - "Surface co-packers / OEM manufacturers as a route-to-market for entrants who don't want capex"
    - "Note cafe / chain operator partnerships as premium discovery channel for coffee/tea/RTD"
    - "Flag aggregator platforms (Grab, Gojek, Shopee, Lazada, TikTok Shop) as channel-partners, not just sales channels"

  risk_factors:
    - "Commodity input volatility (palm oil, sugar, cocoa, milk powder, aluminum, PET) — flag pass-through ability"
    - "FX exposure on imported raw materials — most SEA FMCG is import-dependent on at least one major input"
    - "Regulatory pressure on sugar tax / front-of-pack labeling / single-use plastic — varies sharply by country"
    - "Modern trade buyer concentration risk — top-3 chains can hold 30-50% of MT in some markets"
    - "Counterfeit and grey-market parallel imports in border regions"

  forecast_drivers:
    - "Anchor forecast on consumption-per-capita convergence trajectory toward regional benchmark, not GDP-multiplier"
    - "Layer in modern trade penetration growth — channel mix shift drives value growth ahead of volume growth"
    - "Surface premiumization vector — share of premium-tier SKUs in mix, as the value-growth lever"
    - "Note demographic dividend (working-age population growth) as the volume-growth floor"
    - "Flag health-and-wellness reformulation as a margin lever, not just a top-line story"

  ai_use_cases:
    - "Demand sensing across MT + GT + ecom — SKU-store-week granularity is the unlock"
    - "Promotion ROI optimization — most FMCG promo spend is 50%+ unaccountable today"
    - "Distributor / route optimization for traditional-trade reps"
    - "NPD concept testing via synthetic shopper panels — early signal, not replacement for live test"
    - "Front-of-shelf compliance via image recognition at MT stores"

chart_emphasis:
  market_data_chart:
    - "Prefer stacked_bar_share_split for MT-vs-GT channel mix over time"
    - "Use trend_line_5y for category value growth with overlaid volume-growth dotted line (dual_axis_combo if both move)"
    - "Use segment_bar_horizontal for sub-category breakdown ranked by value share"

  competitive_structure:
    - "Use share_donut for top-3/top-5 brand share when concentration is the story"
    - "Use bubble_2x2 (axes: brand affinity index vs value share) when challenger-brand positioning is the read"
    - "Avoid stacked_bar over too many years for share — composition shifts compress visually"

  forecast_outlook:
    - "Prefer dual_axis_combo with value-growth (USD bn) and volume-growth (units/litres mn) — divergence is the FMCG story"
    - "Layer premiumization callout on top of forecast — share of premium mix on right axis"

voice_emphasis:
  - "Use 'shopper' for in-store decision-maker, 'consumer' for end-user, 'household' for purchase unit — keep them distinct"
  - "Use 'modern trade' and 'traditional trade' as compressed terms, not 'organized retail' / 'unorganized retail'"
  - "Use 'SKU', 'pack architecture', 'occasion', 'penetration', 'frequency', 'basket' — assume reader knows the terms"
  - "Avoid 'consumers are demanding…' — instead state 'shopper occasion X is gaining share at Y%'"
  - "Frame premiumization as a margin and mix story, not an aspirational-lifestyle story"
  - "Avoid soft framings like 'health-conscious consumers'; use 'low-sugar SKUs growing X% vs total category Y%'"

additional_anti_positioning:
  - "Avoid brand-puff language ('iconic', 'beloved', 'much-loved') even when describing market leaders"
  - "Avoid platform / app / SaaS framing of channel partners — TikTok Shop is a channel, not a 'platform partner'"
