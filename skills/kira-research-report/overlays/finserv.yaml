# ============================================================
# KIRA Research — Industry overlay: Financial services
#
# Covers banking, insurance, fintech, BNPL, payments, wealth
# management, lending, capital markets, neobank. Heavily
# regulated; central bank + securities regulator are first-class
# actors in every read.
# ============================================================

overlay_id: finserv
applies_when_keywords:
  - banking
  - bank
  - insurance
  - insurtech
  - fintech
  - bnpl
  - buy now pay later
  - payments
  - payment
  - e-wallet
  - digital wallet
  - wealth management
  - asset management
  - lending
  - credit
