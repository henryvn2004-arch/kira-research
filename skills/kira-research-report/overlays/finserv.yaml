section_emphasis:
  market_opportunity:
    - "Anchor sizing on penetration gap — bankable population %, insured population %, investing-population % — vs regional benchmark"
    - "Surface unbanked / underbanked share as the addressable wedge; quantify in millions of adults"
    - "Frame opportunity by income tier (mass-market, mass-affluent, affluent, HNW) — product economics differ sharply"
    - "Note formal vs informal lending split — informal credit is often 2-5x formal credit volume in SEA markets"
    - "Flag SME credit gap (USD bn) as a separate addressable wedge from retail"

  competitive_intensity:
    - "Lead with regulated-entity count (licensed banks, licensed insurers, licensed fintechs) AND market share by AUM / GWP / loan book"
    - "Distinguish state-owned / state-linked incumbents from private-sector challengers — capital-cost gap is structural"
    - "Surface super-app concentration — Grab, Gojek, Sea-Shopee, regional equivalents — and what % of payments / lending volume they intermediate"
    - "Flag neobank / digital-bank licenses issued and AUM-per-license traction"
    - "Note foreign-bank participation cap (often 30-49%) and how it shapes competitive set"

  channel:
    - "Surface branch footprint trajectory — most incumbents shedding 10-20% branches over 5 years"
    - "Flag agent / business correspondent networks for last-mile in lower-tier cities and rural"
    - "Note mobile / app penetration of customer base — DAU/MAU ratio if available"
    - "Distinguish open-banking / API-driven embedded finance from app-front-door distribution"
    - "Track super-app embedded lending and embedded insurance as the dominant new acquisition channel"

  regulatory:
    - "Treat the central bank and the securities/insurance regulator as first-class actors — every section cites which agency holds the rule"
    - "Surface KYC/AML compliance cost as a unit-economics drag — flag % of opex if data available"
    - "Flag capital adequacy ratios, liquidity coverage ratios, reserve requirements — current vs minimum, with trajectory"
    - "Track licensing regime for new entrants (digital bank, e-money, P2P lending, BNPL) — license cap and conditions"
    - "Note cross-border data localization rules — material for fintech infra cost"
    - "Surface deposit insurance scheme limits and ownership cap rules"
    - "Flag interest rate caps / usury caps on consumer credit where they exist"

  consumer_behavior:
    - "Frame customer-acquisition cost (CAC) by channel and product — banking CAC vs fintech CAC vs super-app embedded CAC"
    - "Surface trust gap — most SEA markets show 60-80% trust in incumbent banks, 20-40% in fintech challengers"
    - "Track multi-banking behavior — primary-bank loyalty is eroding; most affluent customers hold 3-5 accounts"
    - "Note digital-native (gen-Z, millennial) adoption curves by product — payments first, then lending, then investing, then insurance"

  pricing:
    - "Anchor on net interest margin (NIM), cost-to-income ratio, fee income mix — these are the core P&L levers"
    - "Surface BNPL merchant-discount-rate (MDR) trajectory — compressing 4% to 2% across most markets"
    - "Flag insurance pricing pressure from regtech-enabled underwriting — pricing dispersion compressing"
    - "Track loan-pricing transparency rules (effective interest rate disclosure) — varies by market"
    - "Note fee-cap regimes (ATM, remittance, FX) where they apply"

  partnership:
    - "Frame embedded-finance partnerships by archetype: e-commerce platform, ride-hailing super-app, telco, retailer, B2B SaaS"
    - "Surface bancassurance / brokerage relationships — still 40-60% of life insurance distribution in most SEA markets"
    - "Flag credit-bureau and alternative-data partnerships as the underwriting unlock for thin-file segments"
    - "Note BaaS (banking-as-a-service) providers and licensed-bank sponsors for non-bank product launches"

  risk_factors:
    - "Regulator scrutiny intensity — count of enforcement actions, fines, license suspensions in last 24 months"
    - "Asset-quality cycle — non-performing loan ratio trajectory, especially in unsecured consumer credit"
    - "Funding-cost shock from rate cycle — deposit beta and wholesale-funding mix exposure"
    - "Cyber and operational risk — incident count and headline events"
    - "Concentration risk on top-20 corporate borrowers (banking) or top-5 distribution partners (insurance)"
    - "FX exposure on USD-denominated liabilities or USD-funded book"

  forecast_drivers:
    - "Anchor forecast on penetration convergence — banking %, insurance %, investing % — toward developed-market benchmark"
    - "Layer in nominal GDP growth as the volume floor; rate cycle drives NIM and NPL trajectory"
    - "Surface regulatory tailwinds (digital-bank licensing, open banking, e-KYC mandate) as step-change drivers"
    - "Note demographic dividend — first-time bankable adults entering formal sector — as the multi-year volume pull"

  ai_use_cases:
    - "Underwriting / credit scoring on thin-file using alternative data (telco, e-commerce, utility)"
    - "Fraud and AML transaction monitoring — incumbent rule-based systems run 90%+ false-positive rates"
    - "Customer-service automation — calls, chats, claims triage"
    - "Personalized cross-sell / next-best-product on installed base"
    - "Document understanding for KYC, loan origination, insurance claims — high ROI given volume"
    - "Regulatory-reporting automation — material given reporting burden"

chart_emphasis:
  market_data_chart:
    - "Prefer trend_line_5y for AUM / loan book / GWP — show 5+ years to capture rate-cycle and pandemic distortion"
    - "Use dual_axis_combo for NIM vs loan-book growth or for premium growth vs combined ratio"
    - "Use stacked_bar_share_split for product-mix evolution (CASA vs term, life vs non-life, secured vs unsecured)"

  competitive_structure:
    - "Use share_donut for AUM / GWP / loan-market-share — top 5 + 'others' is the standard frame"
    - "Use bubble_2x2 (axes: digital-NPS / customer-experience score vs market share) for digital-readiness positioning"

  forecast_outlook:
    - "Prefer dual_axis_combo with penetration % (left axis) and absolute size USD bn (right axis)"
    - "Surface scenario range — base / bull / bear — given rate-cycle and regulatory uncertainty"

voice_emphasis:
  - "Use the proper local regulator names (BSP, OJK, MAS, BNM, SBV, RBI) — assume the senior strategy reader knows them"
  - "Use 'regulated entity' / 'licensed' / 'permitted activity' — convey the regulatory gate without melodrama"
  - "Use 'incumbent', 'challenger', 'sponsor bank', 'principal' — avoid 'disruptor' as it carries marketing baggage"
  - "Use 'CASA', 'NIM', 'GWP', 'AUM', 'NPL', 'CAR', 'MDR' as inline jargon without expansion — finserv reader knows them"
  - "Frame fintech in product terms (lending, payments, insurance, wealth) — not as a sector unto itself"
  - "Avoid 'democratizing finance' / 'banking the unbanked' as headline framing — use the penetration numbers instead"
  - "Frame super-apps as channel partners and competitive threats simultaneously — both are true"

additional_anti_positioning:
  - "Avoid 'AI-native bank' / 'AI-led underwriting' as headline framing — reserve for §10 and anchor on use-case ROI"
  - "Avoid 'Web3' / 'blockchain' framing of payments unless the topic is explicitly crypto / CBDC"
  - "Do not refer to BNPL as 'credit innovation' — it is unsecured consumer credit, frame it as such"
