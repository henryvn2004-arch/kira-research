# ============================================================
# KIRA Research — Industry overlay: Consumer durables
#
# Covers appliances (white goods, small appliances), consumer
# electronics, smartphones, auto-consumer (passenger cars,
# motorcycles, EV-consumer), furniture. High-ticket, financed,
# considered purchase with warranty/service-network economics.
# ============================================================

overlay_id: consumer_durables
applies_when_keywords:
  - consumer durables
  - white goods
  - appliances
  - home appliances
  - small appliances
  - consumer electronics
  - smartphone
  - smartphones
  - mobile phones
  - tv
  - television
  - audio
  - laptops
  - personal computers
  - tablets
  - wearables
  - smart home
  - air conditioner
  - refrigerator
  - washing machine
  - passenger car
  - passenger vehicles
  - motorcycle
  - motorbike
  - two-wheeler
  - ev
  - electric vehicle
  - bev
  - hev
  - phev
  - furniture
  - mattress
  - kitchen appliances

section_emphasis:
  market_opportunity:
    - "Anchor sizing on household penetration % by income tier — replacement cycle multiplied by installed base gives the durable demand floor"
    - "Surface first-time-buyer cohort (newly bankable households, household formation) — distinct dynamic from replacement"
    - "Frame demand by price tier — entry, mainstream, premium — and which tier is shifting share"
    - "Note urban vs rural / Tier-1 vs Tier-2/3 split — premium concentrates in Tier-1, value in Tier-3 and rural"
    - "Flag financing-led demand — % of units sold on installment / consumer credit, as the demand multiplier"

  competitive_intensity:
    - "Lead with top-3 / top-5 brand share by unit AND value — premium-skew or value-skew brands diverge"
    - "Distinguish global majors (Samsung, LG, Sony, Toyota, Honda archetypes) from regional champions and Chinese challengers (Xiaomi, BYD, Haier, Midea archetypes)"
    - "Surface OEM-vs-EMS structure for electronics — most 'brands' don't manufacture; matters for entry economics"
    - "Flag brand affinity / consideration / repurchase loyalty — durables have long inter-purchase intervals, so brand equity decays"
    - "Note recent product launches and feature-set parity — feature gaps close to zero in 18-24 months in electronics"

  channel:
    - "Map modern trade (electronics chains, hypermarket appliance sections, auto dealer networks) vs traditional trade (single-brand exclusives, independent appliance shops)"
    - "Surface brand-exclusive showroom / experience-center footprint as a premium discovery channel"
    - "Flag ecommerce share — typically 25-45% of smartphone, 15-30% of small appliance, 5-15% of large appliance, near-zero for auto in SEA"
    - "Note dealer-finance relationships and OEM-captive-finance penetration — material for auto and premium electronics"
    - "Track aftermarket / service-network footprint as a channel and a moat — 200+ authorized service centers per market is the entry-cost bar"

  consumer_behavior:
    - "Frame the purchase journey: trigger event (move, marriage, birth, breakdown, gift) → research (online review, peer reco) → showroom visit → negotiate / finance → install / delivery → service relationship"
    - "Surface brand affinity dynamics — premium electronics and autos run 40-60% repurchase loyalty, appliances 25-40%"
    - "Note feature-set decision drivers by category — auto: fuel economy + resale + safety; smartphone: camera + battery + brand; appliance: capacity + energy rating + after-sales"
    - "Track financing penetration by category — auto and smartphone are credit-led; large appliance is mixed; furniture is mostly cash"
    - "Flag premiumization vector — share of premium-tier units in mix as the value-growth story even when unit volume flattens"

  pricing:
    - "Anchor on landed retail price by SKU at the volume-driving spec — not OEM list or starting-from price"
    - "Surface 3-tier price architecture (entry / mainstream / premium) with named models per tier"
    - "Flag financing-adjusted price (EMI / down payment) — the buyer's mental price is the monthly payment, not the sticker"
    - "Note trade-in / exchange program contribution to net price — material for smartphone and auto"
    - "Track promo intensity — festival-season volume share — as a margin-management lever"

  partnership:
    - "Frame partnership candidates: master distributor, regional dealer network, modern-trade chain account, ecommerce platform, captive-finance partner, service-center franchisee, EMS contract manufacturer"
    - "Surface auto-finance / appliance-finance partnerships (banks, NBFCs, BNPL providers) — the credit-attach rate is the volume lever"
    - "Flag installation / delivery / installation-service contractors — last-mile execution is the differentiator for AC, large appliances"
    - "Note exclusive brand-store franchise partners for premium-tier rollout"

  risk_factors:
    - "Inventory-cycle risk — durables are vulnerable to channel-stock build during demand soft patches"
    - "Replacement-cycle elongation — under macro pressure, consumers defer 6-18 months on big-ticket items"
    - "Feature obsolescence on electronics — 18-24 month spec cycles strand inventory"
    - "FX exposure on imported components — most SEA durables assembly is import-dependent on chipsets, compressors, panels"
    - "Regulatory shift on energy efficiency standards, emission norms (auto Euro-IV/V/VI), or e-waste — can strand non-compliant inventory"
    - "Service-network reputation risk — single viral failure event can cost 10-20% of brand consideration"

  forecast_drivers:
    - "Anchor forecast on household-penetration convergence + replacement cycle — durables forecast is a stock-flow model, not a flow-only model"
    - "Layer in financing-penetration growth as a unit-volume multiplier"
    - "Surface premiumization mix-shift as the value-growth vector independent of unit-growth"
    - "Note demographic dividend (household formation rate) as the first-time-buyer cohort floor"
    - "Flag EV transition trajectory for auto — separate forecast track from ICE, with policy-window assumptions made explicit"

  ai_use_cases:
    - "Predictive after-sales / service-call dispatch optimization"
    - "Demand sensing across dealer network — reduce channel inventory days"
    - "Personalized recommendation on ecommerce and brand.com — high lift on considered-purchase categories"
    - "Image / video QC on production lines (panel, compressor, body-in-white)"
    - "Multilingual sales-assistant tooling for dealer-network reps"
    - "Computer-vision-assisted insurance-claim triage for auto"

chart_emphasis:
  market_data_chart:
    - "Prefer dual_axis_combo for unit-volume vs ASP — durables story is usually 'units flat, value up' or vice versa"
    - "Use stacked_bar_share_split for price-tier evolution (entry / mainstream / premium) over time"
    - "Use segment_bar_horizontal for sub-category ranking (e.g., AC vs refrigerator vs washing machine units)"

  competitive_structure:
    - "Use share_donut for unit-share top-5 + 'others'; pair with a value-share donut if mix shift is the story"
    - "Use bubble_2x2 (axes: brand consideration vs market share) for challenger-positioning reads"

  forecast_outlook:
    - "Prefer dual_axis_combo with unit volume on left axis and value on right axis — mix-shift is the durable forecast story"
    - "Surface scenario range — base / bull / bear — when financing penetration or EV policy is highly contingent"

voice_emphasis:
  - "Use 'unit' and 'ASP' (average selling price) precisely — durables reader thinks in unit-and-ASP, not value-only"
  - "Use 'installed base', 'replacement cycle', 'attach rate', 'consideration set', 'shortlist' — durables-research vocabulary"
  - "Frame financing as a demand multiplier, not a payment convenience — credit-attach moves units"
  - "Avoid 'gadget' / 'must-have' / 'lifestyle' as headline framing — too soft for senior strategy reader"
  - "Use 'EV', 'BEV', 'HEV', 'PHEV', 'ICE' as inline jargon without expansion in auto contexts"
  - "Avoid framing service network as a 'support function' — it is a moat and a P&L driver, frame it as such"

additional_anti_positioning:
  - "Avoid 'next-generation' / 'flagship' framing of products — use the spec or the price tier instead"
  - "Avoid 'EV revolution' / 'EV disruption' framing — anchor on the specific policy window, incentive, or charging-infra metric"
