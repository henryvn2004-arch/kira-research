section_emphasis:
  market_opportunity:
    - "Anchor sizing on subscriber count × ARPU × retention rate — the three multiplicands move independently"
    - "Surface addressable population (broadband-passed homes, smartphone users, school-age cohort, insured patients) as the upper bound"
    - "Frame demand by recurring-revenue tier (consumer subscription, SMB subscription, enterprise contract) — unit economics differ by 5-10x"
    - "Note free-tier / freemium share where the model exists — paid-conversion rate is the leakage point"
    - "Flag bundle penetration where it matters (telco quad-play, OTT bundle, education + tutoring bundle)"

  competitive_intensity:
    - "Lead with subscriber share AND revenue share — divergence signals churn or ARPU dispersion"
    - "Distinguish incumbent operators (state-linked telco, established hospital chain, traditional consulting firm) from challenger entrants (digital-only telco, telehealth, online-tutoring platform)"
    - "Surface bundle concentration — top-1 / top-3 operators in telco often hold 70-90% of total subs"
    - "Flag global-platform competition (Netflix, Spotify, AWS, McKinsey-archetype global firms) and the local-content / local-presence rules that shape entry"
    - "Note recent licensing rounds, M&A, or service-launch events"

  channel:
    - "Map direct (own website / app / branch / clinic) vs indirect (reseller, agent, broker, dealer)"
    - "Surface app / DAU / MAU penetration of customer base — services-business engagement runs through the app for most categories"
    - "Flag affiliate / referral program penetration as a low-CAC acquisition channel"
    - "Note enterprise / SMB direct-sales motion vs self-serve / product-led — gross-margin gap is 20-40 pp"
    - "Track partner / system-integrator channel for B2B software and professional services"

  regulatory:
    - "Surface licensing and certification regime — telco spectrum auction, hospital accreditation (JCI, KARS), tutoring license, consulting registrations, audit-firm registration"
    - "Flag data-localization and cross-border data transfer rules — material for OTT, telehealth, edtech, SaaS"
    - "Track content / curriculum / clinical-protocol mandates — local content quota on OTT, national curriculum compliance on edtech, treatment-protocol mandates on healthcare"
    - "Note professional-body registration and scope-of-practice rules for legal, audit, medical, architecture services"
    - "Surface foreign-equity caps on regulated services (telco often 49-65%, healthcare 30-67%, education varies)"

  consumer_behavior:
    - "Frame as a recurring-relationship: acquisition → activation → habit-formation → retention → reactivation. Each phase has distinct levers"
    - "Surface churn rate by cohort and trigger — most consumer services run 2-5% monthly churn; telco 1-2%"
    - "Note multi-service / multi-app behavior — most consumers run 3-5 streaming subs, 2-3 ride-hailing apps in parallel"
    - "Track gen-Z / millennial preference signals on bundle vs unbundle, subscription fatigue, content vertical"

  pricing:
    - "Anchor on ARPU (consumer) or ACV / ARR (enterprise) — not headline-price-list"
    - "Surface tiered pricing architecture (free, ad-supported, basic, premium, enterprise) with named tiers and penetration"
    - "Flag discount discipline — % of MRR sold on promo vs list — most services lose 10-25% to undisciplined discounting"
    - "Track hourly-rate benchmarks for professional services and per-bed / per-visit benchmarks for healthcare — these are the comparable unit-of-value"
    - "Note willingness-to-pay dispersion across income tiers — services pricing must walk between price-elastic mass-market and price-inelastic premium"

  partnership:
    - "Frame partnership candidates: distribution partner (telco for OTT, super-app for SaaS), content partner (studio, publisher), referral partner (corporate, school, hospital), system-integrator, channel reseller"
    - "Surface bundle partnerships — telco + OTT, broadband + streaming, employer + telehealth, school + tutoring"
    - "Flag white-label / OEM partnerships where the topic warrants — e.g., bank-distributed insurance, telco-distributed cloud"
    - "Note professional-network / accreditation-body relationships as a credentialing gate"

  risk_factors:
    - "Talent acquisition and retention — services-business cost is 50-75% people; wage inflation runs faster than revenue in tight talent markets"
    - "Certification / licensing exposure — license suspension is a step-function risk for regulated services"
    - "Churn shock from price increases or content / service quality drop — 100-200 bps incremental monthly churn destroys LTV"
    - "Platform / supplier dependency (cloud, content owner, listing-platform) for OTT, telehealth, food-delivery"
    - "Language and cultural fit risk for cross-border services (telco MNC entrant, edtech, OTT) — most global rollouts under-localize"
    - "Regulatory tightening on data, advertising, or content / curriculum"

  forecast_drivers:
    - "Anchor forecast on penetration convergence × ARPU trajectory × retention — three-factor model, not a single growth-rate"
    - "Layer in bundle penetration as the ARPU-uplift lever"
    - "Surface enterprise digital-spend trajectory for B2B services and SaaS forecasts"
    - "Note demographic and household-formation drivers for telco, education, healthcare"
    - "Flag policy windows (licensing rounds, foreign-equity-cap changes, content mandates) as step-change forecast events"

  ai_use_cases:
    - "Customer-service automation across chat, voice, ticket triage — the single highest-ROI use case in services"
    - "Churn-propensity modeling and next-best-action on installed base"
    - "Personalization on content (OTT recommendation, education learning path, healthcare care plan)"
    - "Multilingual content production and dubbing / subtitling for OTT, edtech"
    - "Provider / agent productivity tools — assist-mode for support, sales, consultants, clinicians"
    - "Fraud and abuse detection — ad fraud, account sharing, claim fraud"

chart_emphasis:
  market_data_chart:
    - "Prefer dual_axis_combo for subscriber growth vs ARPU — services story is the interaction of the two"
    - "Use trend_line_5y for total subs / paid users — show the curve shape (S-curve, linear, decelerating)"
    - "Use stacked_bar_share_split for tier-mix evolution (free / basic / premium / enterprise)"

  competitive_structure:
    - "Use share_donut for subscriber-share top-3 + others — concentration is high in most services markets"
    - "Use bubble_2x2 (axes: NPS / retention score vs market share) when challenger-positioning is the story"

  forecast_outlook:
    - "Prefer dual_axis_combo with subscribers on one axis and ARPU or revenue on the other"
    - "Layer churn-rate assumption explicitly in the chart subtitle — the forecast is most sensitive to it"

voice_emphasis:
  - "Use 'subscriber', 'user', 'customer', 'member', 'patient', 'student' precisely — the right noun per category"
  - "Use 'ARPU', 'ACV', 'ARR', 'MRR', 'LTV', 'CAC', 'churn', 'retention', 'NPS' as inline jargon — assume reader knows them"
  - "Frame services in recurring-revenue terms first, one-off transactions second"
  - "Avoid 'engagement' as a fuzzy umbrella term — use 'DAU/MAU', 'session frequency', 'minutes per session', or the specific metric"
  - "Use 'hourly rate', 'utilization', 'realization' for professional services — these are the unit economics"
  - "Avoid 'experience' as a noun standing alone ('our experience') — use 'service quality', 'NPS', 'CSAT', or the specific construct"

additional_anti_positioning:
  - "Avoid 'platform' framing of regulated services — telco is an operator, hospital is a provider, tutoring is a service — not 'platforms'"
  - "Avoid 'subscription economy' / 'creator economy' framing — anchor on the specific subscriber-ARPU-retention numbers"
  - "Avoid 'AI tutor' / 'AI doctor' framing in headlines outside §10 — frame as assist-mode for the human"
