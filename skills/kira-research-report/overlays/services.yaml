# ============================================================
# KIRA Research — Industry overlay: Services
#
# Covers telco, OTT / streaming, consumer software, professional
# services, education, healthcare services, ride-hailing.
# Talent-intensive, licensed/certified, recurring-revenue or
# hourly-rate economics. Churn and retention dominate the read.
# ============================================================

overlay_id: services
