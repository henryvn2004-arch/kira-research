# ============================================================
# KIRA Research — Industry overlay: Commodity / agri-commodity
#
# Covers palm oil, rubber, rice, coal, nickel, crude oil
# downstream, fisheries, plantation crops. Price-volatility-led,
# weather- and FX-exposed, smallholder-vs-estate structure, with
# rising ESG / sustainability-certification pressure (RSPO,
# FSC, MSC etc.).
# ============================================================

overlay_id: commodity
applies_when_keywords:
  - palm oil
  - cpo
  - palm kernel
  - rubber
  - natural rubber
  - rice
  - paddy
  - coffee beans
  - cocoa beans
  - tea leaf
  - coal
  - thermal coal
  - coking coal
  - nickel
  - bauxite
  - tin
  - copper ore
  - crude oil
  - downstream oil
  - refined products
  - lng
  - fisheries
  - aquaculture
  - shrimp
  - tuna
  - plantation
  - estate crop
  - sugarcane
  - corn
  - maize
  - cassava
  - timber
  - pulp and paper
  - commodity

section_emphasis:
  market_opportunity:
    - "Anchor sizing on physical production (mn tonnes, mn barrels, mn ha) and FOB / mine-mouth USD value — not just USD"
    - "Surface downstream-demand pull by end-use (food, feed, biofuel, tyre, battery, power-gen, steel) — each demand vector moves on its own cycle"
    - "Frame opportunity by value-add ladder — raw material → first-stage processing → derivative / specialty — margin steps up 2-5x per rung"
    - "Note export dependence — share of production exported — and key destination markets"
    - "Flag downstream-domestic-substitution policy (DMO, export ban, refining mandate) as the opportunity-creation lever"

  competitive_intensity:
    - "Lead with planted area / installed mining capacity / refining capacity AND share of national production — physical-asset ranking is the durable metric"
    - "Distinguish vertically-integrated estates / miners from smallholder-aggregator-trader chains — margin structures differ sharply"
    - "Surface state-owned / state-linked majors vs private domestic vs foreign-JV — capital cost and policy access differ"
    - "Flag trader / merchant tier (Wilmar, Olam, Trafigura, Glencore archetypes) as price-makers and route-to-export gatekeepers"
    - "Note recent M&A, replanting cycles, mothballed capacity, and concession expiries as supply-side shifts"

  channel:
    - "Map smallholder → middleman / collector → mill / refinery / smelter → trader / exporter → end-user — the multi-tier chain is the channel"
    - "Surface plantation-mill catchment radius (30-50 km for palm) and the smallholder-vs-estate supply split per mill"
    - "Flag terminal / port / storage infrastructure as a hard channel constraint — bottleneck moves price"
    - "Note long-term offtake agreements vs spot-market sales — the offtake-to-spot ratio is the price-volatility hedge"
    - "Track sustainability-certified channel separately from conventional — RSPO-CSPO, MSC, FSC, fair-trade have parallel trade flows and price premiums"

  regulatory:
    - "Surface domestic market obligation (DMO), export ban, export levy, biodiesel mandate (B30/B35/B40), refining mandate — these are the policy levers that move price"
    - "Flag environmental and concession regulation — moratorium on new plantation, mining-permit issuance, reclamation bonds, deforestation-free import rules (EUDR)"
    - "Track sustainability-certification regime as quasi-regulatory — RSPO, ISPO, MSPO for palm; FSC / PEFC for timber; MSC / ASC for seafood; UTZ / Rainforest Alliance for coffee / cocoa"
    - "Note carbon-tax exposure, methane regulation (rice, livestock), and Scope 3 supply-chain pressure from downstream buyers"
    - "Surface labor regulation (smallholder cooperatives, plantation worker rights, child-labor in cocoa)"

  pricing:
    - "Anchor on benchmark reference price (MDEX CPO, SICOM rubber, Newcastle thermal coal, LME nickel, Brent crude) — not nominal FOB"
    - "Surface price-volatility annualized as standard deviation and historical price range — volatility IS the commodity pricing story"
    - "Flag FX exposure — most commodities priced in USD, sold by countries with non-USD currencies — currency move can offset 50% of price move"
    - "Track premium / discount to benchmark (sustainable-certified premium, origin discount, quality differential)"
    - "Note hedging-instrument penetration and the fraction of physical volume hedged in futures / forwards"

  partnership:
    - "Frame partnership candidates: estate / mine operator, smallholder cooperative aggregator, mill / refinery / smelter, trader / merchant, certification-body, offtake-buyer (downstream processor, biofuel mandate-holder, food major)"
    - "Surface long-term offtake / supply-contract candidates — the downstream-buyer commitment is the financing-grade anchor"
    - "Flag certification and traceability partners — third-party auditor, satellite-monitoring service, geo-location data provider"
    - "Note infrastructure partners (port concession, storage terminal, rail freight) where logistics is the bottleneck"

  risk_factors:
    - "Price volatility — flag annualized vol % and worst peak-to-trough drawdown in last 10 years"
    - "Weather and yield risk — El Niño / La Niña, monsoon variability, pest and disease (Ganoderma in palm, leaf-blight in rubber, white-spot in shrimp)"
    - "FX exposure — USD-priced revenue, local-currency cost — devaluation helps margin, appreciation compresses it sharply"
    - "ESG / sustainability enforcement step-up — EUDR, US Forced Labor, JFTC scrutiny — non-certified product loses premium market access"
    - "Concession / land-tenure risk — moratorium extensions, indigenous-land claims, smallholder-plantation dispute"
    - "Downstream demand cycle — biofuel mandate changes, steel cycle for nickel, tyre cycle for rubber, food-import policy for rice / palm"
    - "Geopolitical / trade-flow risk — export bans, sanctions, route-diversion (Black Sea grain, Red Sea shipping)"

  forecast_drivers:
    - "Anchor forecast on benchmark-price scenario (base / bull / bear) — commodity forecast IS a price scenario, not a volume scenario"
    - "Layer in physical production trajectory — planted area × yield × extraction rate, or reserves × extraction rate"
    - "Surface downstream demand by named end-use vector with explicit assumption (biodiesel blending %, EV-battery nickel intensity, rice population × consumption)"
    - "Note inventory / stock-to-use ratio as the price-volatility floor"
    - "Flag policy windows (mandate ramp, export-ban duration, certification deadline) as step-change forecast events"

  ai_use_cases:
    - "Satellite / drone yield estimation and replanting prioritization for plantation crops"
    - "Predictive maintenance on mill / refinery / smelter equipment — unplanned downtime cost is USD 50k-500k / day"
    - "Demand-and-price forecasting on physical-trade flows — incremental edge on inventory and hedging decisions"
    - "Traceability and sustainability-certification documentation automation — geo-tagged source-to-mill records"
    - "Weather / climate-risk modeling for yield and disease outbreak"
    - "Computer-vision quality grading at receipt (fresh fruit bunch grading, coffee bean sorting, shrimp size grading)"

chart_emphasis:
  market_data_chart:
    - "Prefer trend_line_5y of benchmark price overlaid with USD index — price-volatility-and-FX story"
    - "Use stacked_bar_share_split for end-use demand mix (food / feed / biofuel / industrial)"
    - "Use segment_bar_horizontal for producer-country ranking by production tonnage"

  competitive_structure:
    - "Use segment_bar_horizontal ranked by planted area / installed capacity for top-10 producers"
    - "Use share_donut for national-production share top-5 + others when the topic is country-level concentration"

  forecast_outlook:
    - "Prefer dual_axis_combo with benchmark price on one axis and production / consumption on the other"
    - "Always show scenario range (base / bull / bear) — single-line price forecast is misleading for commodities"
    - "Layer stock-to-use ratio as a sub-chart or annotation — the price-volatility predictor"

voice_emphasis:
  - "Use 'benchmark price', 'FOB', 'CIF', 'spot', 'forward', 'offtake', 'hedging' precisely — commodity-trade vocabulary"
  - "Use 'planted area', 'extraction rate', 'yield', 'stock-to-use', 'inventory days', 'mill catchment' for upstream framing"
  - "Use 'smallholder', 'estate', 'cooperative', 'aggregator', 'middleman', 'trader' — the supply-chain tiers are not interchangeable"
  - "Frame demand in physical units (mn tonnes, mn barrels) first, USD value second — commodity reader thinks in volume"
  - "Avoid 'green palm' / 'ethical sourcing' as soft framing — use 'RSPO-CSPO certified', 'EUDR-compliant', or the specific standard"
  - "Avoid 'sustainable' standing alone — name the certification, the buyer mandate, or the regulatory rule"
  - "Frame ESG as a market-access requirement and a price-premium opportunity — both are true, in that order"

additional_anti_positioning:
  - "Avoid 'ESG revolution' / 'green transition' framing — anchor on the specific mandate (EUDR, B40, Scope 3), the buyer, and the price premium"
  - "Avoid romanticizing smallholders ('hardworking smallholders', 'traditional farmers') — frame them as a structurally-important supplier tier with specific cost and yield profiles"
  - "Avoid speculative price-call language ('CPO will hit USD 5,000') — always present as scenario with named assumption"
