# ============================================================
# KIRA Research — Blueprint: entry_strategy
#
# Company-perspective market entry brief for a multinational
# weighing a country × industry play in SEA. Diverges from
# market_analysis (which is sizing-and-forecast-led) by
# compressing the macro/sizing front-half to a single page and
# spending the back-half on actionable entry mechanics: target
# segment, regulatory path, channel/partner options, capex/opex
# build, 3-year P&L scenarios, risk matrix, phased rollout.
#
# Reader: strategy lead, corp-dev VP, or country-launch GM at
# a Japanese MNC / Korean conglomerate / Singapore HQ. Buyer
# wants a decision document, not a market scan.
# ============================================================

blueprint_id: entry_strategy
version: 1
origin: "Phase H1 — decision-document companion to market_analysis. Repurposes market_data_chart + competitive_structure + forecast_outlook page schemas; introduces pnl_scenario + risk_matrix page types (slot specs documented below)."

# Report shape
shape:
  total_sections: 17
  estimated_pages: 17-20
  estimated_render_time_min: 35-50
  locale: en
  page_dim_px: { width: 1280, height: 720 }

# Page-type mix this blueprint composes from.
# All defined in schemas/page_schemas.json EXCEPT pnl_scenario and
# risk_matrix, which are new for this blueprint — slot specs below.
page_types_used:
  - cover
  - methodology_inline
  - toc
  - divider
  - exec_summary_p1
  - exec_summary_p2_implications
  - market_data_chart
  - competitive_structure
  - forecast_outlook        # reused for the phasing/milestones timeline page
  - pnl_scenario            # NEW — see slot spec below
  - risk_matrix             # NEW — see slot spec below
  - methodology_endnote

# --- pnl_scenario page type — slot spec ---
# Centerpiece chart: 3-year P&L projection rendered as 3 line series
# (base / bull / bear) with revenue on Y-axis and Y1 / Y2 / Y3 on X-axis.
# Surrounded by anchor callouts (assumptions driving each scenario)
# plus a compressed source line. Designed to be the report's "money
# slide" — the page the strategy committee screenshots.
#
# Slots (caps in chars, all sentence-case copy unless noted):
#   h1                : sentence-case page headline                 cap 80
#   subhead           : 1-3 line scenario framing                   cap 220
#   chart_main        : 3-line P&L chart
#                        - row_height_px 300
#                        - series_count 3 (base / bull / bear)
#                        - x_axis_points 3 (Y1 / Y2 / Y3)
#                        - title_max_chars 60
#                        - subtitle_max_chars 80
#                        - y_axis_unit_max_chars 10 (e.g. "USD mn")
#   scenario_anchors  : 3-card row beneath chart, one per scenario
#                        each card = {
#                          scenario_name cap 14 (e.g. "Bull case"),
#                          year3_value cap 14 (e.g. "USD 48 mn"),
#                          key_assumption cap 110 chars,
#                          source_tag
#                        }
#   key_drivers_strip : 1-line assumption summary spanning chart base
#                        cap 180 chars (e.g. "Drivers: market share ramp,
#                        channel mix, unit economics at scale")
#   source_strip      : compressed citation footer cap 110 chars mono UC
#
# Char-budget envelope per page (pnl_scenario): ~1200 body chars total.
# All numerics carry inline source tags ([primary]/[secondary]/[estimate]).
# Anti-pattern: do NOT render scenarios as a 3-card grid only — the
# 3-line chart IS the page; cards are anchor commentary, not substitute.

# --- risk_matrix page type — slot spec ---
# 5x5 heatmap: likelihood (X-axis, 5 bands) × impact (Y-axis, 5 bands).
# Each populated cell carries a short risk label and a cell color from
# a 3-tone palette (green low / amber medium / red high). 8-12 named
# risks placed; remaining cells stay empty. Sidebar lists the 3 highest-
# severity risks in expanded form with mitigation framing.
#
# Slots (caps in chars, all sentence-case copy unless noted):
#   h1                : sentence-case page headline                 cap 80
#   subhead           : 1-3 line risk-framing thesis                cap 220
#   matrix_grid       : 5x5 SVG heatmap
#                        - row_height_px 360
#                        - axis_labels {
#                            x_axis "Likelihood" — bands ["Rare","Unlikely","Possible","Likely","Almost certain"]
#                            y_axis "Impact"     — bands ["Marginal","Minor","Moderate","Major","Severe"]
#                          }
#                        - risk_cell_count_min 8
#                        - risk_cell_count_max 12
#                        - cell_label_max_chars 22 (e.g. "FX devaluation IDR")
#                        - color_palette {
#                            low    "#15803D"  # green
#                            medium "#D97706"  # amber
#                            high   "#B91C1C"  # red
#                          }
#   key_risks_sidebar : 3-card vertical stack on right rail, one per
#                        highest-severity risk
#                        each card = {
#                          risk_name cap 30 (mono UC),
#                          severity_tag cap 14 (e.g. "HIGH · LIKELY"),
#                          body cap 180 chars (framing + mitigation),
#                          source_tag
#                        }
#   legend_strip      : 1-line legend below matrix
#                        cap 90 chars (e.g. "Green: monitor · Amber: mitigate · Red: gate the launch")
#   source_strip      : compressed citation footer cap 110 chars mono UC
#
# Char-budget envelope per page (risk_matrix): ~1400 body chars total.
# Risk placements must reflect the report's regulatory + competitive +
# operational findings — not generic SEA-entry boilerplate.

# Research budget
research:
  query_count_target: 25
  query_strategy_file: query_strategy.json
  source_mix_target:
    primary_pct: 25       # KIRA synthesis — scenario triangulation, partner shortlists, risk scoring
    secondary_pct: 50     # cited external — regulator filings, listed-company disclosures, trade press
    estimate_pct: 25      # KIRA estimate with anchor — capex/opex benchmarks, ramp curves, P&L scenarios

# Char budget envelope (informational — strict per-slot caps in page_schemas.json)
content_volume:
  total_body_chars_target: 20000-25000
  callouts_target: 12-16
  charts_target: 7-10           # P&L scenario + risk matrix + capex/opex curves + market sizing
  competitor_profiles_target: 0 # top-5 land in a single compressed structure page, no deep profiles
  partner_candidates_target: 6-9 # JV/distributor/agent shortlist on the partner page

# Quality gates
quality_gates:
  - overflow_check: "All pages <= 720px rendered height"
  - source_coverage: "Every quantitative claim has [primary|secondary|estimate|user-input] tag"
  - anti_positioning: "No mention of Claude, McKinsey, Mordor, Frost, Euromonitor, Synovate, Ipsos, IMARC, source-archive R-numbers"
  - voice_register: "De-cliented; no 'client should' language; sentence-case headlines"
  - char_budgets: "All slot char counts <= schema cap (callout label <= 30, change-line <= 38)"
  - decision_orientation: "Exec summary recommends ONE entry mode (Build / Partner / Acquire / License / Stay out) and names year-3 ambition with a number"
  - scenario_spread: "Bull / base / bear year-3 revenue spread >= 1.8x bull-to-bear ratio; if compressed below this, regen scenario assumptions"
  - risk_anchor: "Risk matrix cells must each tie to a named finding from sections 10-14 (regulatory / channel / partner / capex / opex); generic risks rejected"
  - partner_namedness: "Partnership page lists >= 5 named candidate organisations (JV / distributor / agent) with country footprint and segment focus"

# Output mode
output:
  default_mode: publish              # auto-upload to Supabase + kiraresearch.com
  publish_targets:
    - supabase_storage: "reports-pdfs/<REPORT_ID>/en.html"
    - supabase_storage: "reports-pdfs/<REPORT_ID>/en.pdf"
    - supabase_table: living_reports
    - supabase_table: report_translations
    - supabase_table: audit_log
  draft_targets:
    - local_html: "outputs/<REPORT_ID>/en.html"
    - local_pdf: "outputs/<REPORT_ID>/en.pdf"

# Confirm step
requires_confirm_step: false   # template validated; skip user confirmation

# Orchestrator match threshold
orchestrator:
  match_threshold: 0.7
  trigger_intent_hints:
    - "market entry"
    - "entry strategy"
    - "go to market"
    - "GTM"
    - "launch plan"
    - "country launch"
    - "should we enter"
    - "enter Vietnam"
    - "enter Indonesia"
    - "enter the Philippines"
    - "expansion into"
    - "build vs buy vs partner"
    - "joint venture"
    - "JV partner"
    - "distributor selection"
    - "phased rollout"
  trigger_industry_hints:
    - "any country x industry where the topic phrasing centers on a company decision, not market sizing"
  best_fit_signals:
    - "Topic phrasing names a company point-of-view: 'entering', 'launching', 'expanding into', 'build vs buy'"
    - "Country scope is single (not regional/APAC); industry is single"
    - "Buyer is a strategy / corp-dev / country-GM, not a sizing-only buyer"
    - "Topic carries implicit decision question (enter? how? when? with whom?)"
    - "Reader expects a recommended entry mode + 3-year ambition number on page 1"
