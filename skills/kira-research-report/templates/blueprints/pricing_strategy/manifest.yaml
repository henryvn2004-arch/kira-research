# ============================================================
# KIRA Research — Blueprint: pricing_strategy
#
# Pricing + positioning deep dive for a single country x industry.
# Centerpieces are the competitor price-points table and the
# price-quality perceptual matrix. Best fit: B2C consumer goods,
# services with discoverable shelf prices (insurance, telco,
# subscription, streaming, food delivery, QSR, mass beauty).
# AVOID: B2B negotiated pricing (opaque price discovery; the
# scrape-and-matrix moat collapses there). Use market_analysis
# or competitive_landscape instead for those topics.
# ============================================================

blueprint_id: pricing_strategy
version: 1
origin: "Phase H1 — pricing/positioning companion to market_analysis. Centerpieces are the competitor price-points table + price-quality matrix; remaining pages frame the tier stack, segment WTP, and promo norms."

# Report shape
shape:
  total_sections: 13
  estimated_pages: 13-15
  estimated_render_time_min: 28-42
  locale: en
  page_dim_px: { width: 1280, height: 720 }

# Page-type mix this blueprint composes from (all defined in schemas/page_schemas.json
# EXCEPT price_quality_matrix, which is new — see schema sketch below).
page_types_used:
  - cover
  - methodology_inline
  - toc
  - divider
  - exec_summary_p1
  - exec_summary_p2_implications
  - market_data_chart            # 4-tier stack chart, elasticity table, WTP bars, pricing-models table, promo norms
  - competitive_profile_deep     # premium-positioning case studies (1 winner + 1 failure on a shared template)
  - price_quality_matrix         # NEW page type — see schema sketch below
  - methodology_endnote

# -----------------------------------------------------------
# NEW page type: price_quality_matrix
# -----------------------------------------------------------
# Shape (to be formalized in schemas/page_schemas.json by orchestrator owner):
#
#   "price_quality_matrix": {
#     "description": "Perceptual map — 2x2 scatter of brands placed on price (x-axis) x perceived quality (y-axis). Quadrant labels frame strategic positioning. Used in pricing_strategy blueprint.",
