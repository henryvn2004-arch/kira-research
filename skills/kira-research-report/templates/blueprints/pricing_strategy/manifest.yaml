#
# Composition note: 1 chart per page, 1 perceptual frame. If a topic
# has > 12 brands worth plotting, split into 2 matrix pages (e.g. by
# segment: prepaid vs postpaid, mass vs premium). Quadrant labels
# should be specific to the category, not generic ("Premium fortress"
# > "High price / high quality"). Brand placement is qualitative —
# a tier-level band is acceptable; per-SKU price points are not required.
# -----------------------------------------------------------

# Research budget
research:
  query_count_target: 20
  query_strategy_file: query_strategy.json
  source_mix_target:
    primary_pct: 25       # KIRA synthesis — channel scans + tier-band observation, not exhaustive per-SKU scraping
    secondary_pct: 55     # cited external — surveys, regulator filings, listed-company tier disclosure, trade press
    estimate_pct: 20      # KIRA estimate with anchor — WTP segmentation, premium-tier sizing, promo direction

# Char budget envelope (informational — strict per-slot caps in page_schemas.json)
content_volume:
  total_body_chars_target: 16000-21000
  callouts_target: 9-12
  charts_target: 6-9                 # incl. 1 price-quality matrix, 1 tier stack, 1 indicative price bands, 1 WTP, 1 promo pattern
  competitor_brands_in_band_table: 5-6   # 5-6 brands with tier label + indicative price band + directional change

# Quality gates
quality_gates:
  - overflow_check: "All pages <= 720px rendered height"
  - source_coverage: "Every quantitative claim has [primary|secondary|estimate|user-input] tag"
  - anti_positioning: "No mention of Claude, McKinsey, Mordor, Frost, Euromonitor, Synovate, Ipsos, IMARC, source-archive R-numbers"
  - voice_register: "De-cliented; no 'client should' language; sentence-case headlines"
  - char_budgets: "All slot char counts <= schema cap; callout label <= 30 chars; change-line <= 38 chars"
  - tier_coverage: "All 4 tiers (premium / mid / mass / value) sized with share + directional growth (qualitative ranges OK)"
  - matrix_brand_count: "Price-quality matrix carries 6-12 brand points, every point sourced"
  - price_band_completeness: "Indicative price-band table covers 5-6 brands with tier label, price band (low-high range), directional change (up/stable/down) — point-precision per-SKU prices not required"
  - partial_data_policy: "If pricing data is sparse, proceed with what is available. Tier-level indicative bands + qualitative directional commentary are acceptable substitutes for per-SKU detail. Do NOT halt the pipeline; do flag thin coverage in the methodology endnote."

# Output mode
output:
  default_mode: publish              # auto-upload to Supabase + kiraresearch.com
  publish_targets:
    - supabase_storage: "reports-pdfs/<REPORT_ID>/en.html"
    - supabase_storage: "reports-pdfs/<REPORT_ID>/en.pdf"
    - supabase_table: living_reports
    - supabase_table: report_translations
    - supabase_table: audit_log
  draft_targets:
    - local_html: "outputs/<REPORT_ID>/en.html"
    - local_pdf: "outputs/<REPORT_ID>/en.pdf"

# Confirm step
requires_confirm_step: false   # template validated; skip user confirmation

# Orchestrator match threshold
match_threshold: 0.7

# Best-fit signals (orchestrator hints — non-binding)
best_fit_signals:
  - "Topic phrasing leads with 'pricing', 'price strategy', 'price points', 'price positioning', 'willingness to pay', 'premium positioning', 'market pricing overview'"
  - "Industry has visible market price tiers (B2C consumer goods, telco, insurance, subscription, streaming, food delivery, QSR, mass beauty)"
  - "Country scope is single (price levels are country-anchored; APAC roll-ups dilute the matrix)"
  - "Buyer wants the pricing landscape framed, not a per-SKU pricing-committee deliverable"

# Poor-fit signals (orchestrator should deprioritize and prefer another blueprint)
poor_fit_signals:
  - "Regulated single-price markets (utilities, basic pharma) — no real tier stack"
  - "Multi-country regional roll-ups — price levels diverge too much for a single matrix"
  - "Commodity inputs where the price IS the market (cement bulk, steel rebar) — use market_analysis instead"
  - "Buyer explicitly needs a per-SKU pricing-committee deep dive — this blueprint is now a general market overview, not a granular pricing audit"
