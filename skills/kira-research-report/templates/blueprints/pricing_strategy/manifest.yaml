#             "label_max_chars": 18,           # brand name on the dot
#             "x_value_unit": "USD or local-currency price index",
#             "y_value_unit": "quality score 0-100 (KIRA composite) OR survey perception index",
#             "dot_size_meaning": "optional — encodes share or revenue",
#             "source_tag": ["primary", "secondary", "estimate"]
#           }
#         }
#       },
#       "sidebar_narrative": {
#         "heading_max_chars": 30,
#         "body_max_chars": 380,               # 2-3 sentences interpreting the placement
