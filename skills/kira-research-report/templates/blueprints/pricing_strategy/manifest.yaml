# ============================================================
# KIRA Research — Blueprint: pricing_strategy
#
# General market pricing + positioning overview for a single
# country x industry. Centerpiece is the price-quality
# perceptual matrix; supporting pages frame the tier stack,
# indicative competitor price bands, segment WTP, pricing
# models, and directional promo patterns. Best fit: B2C
# consumer goods, services with visible market price tiers
# (telco, subscription, streaming, food delivery, QSR, mass
# beauty). Also workable for B2B categories — if per-SKU
# price detail is sparse, proceed with tier-level indicative
# bands and qualitative directional commentary instead of
# routing the topic away.
# ============================================================

blueprint_id: pricing_strategy
version: 2
origin: "Phase H1 — pricing/positioning companion to market_analysis. Revised in Phase H1.1 toward a general market pricing overview: less per-SKU scraping, more tier-level indicative bands and qualitative direction."

# Report shape
shape:
  total_sections: 13
  estimated_pages: 13-15
  estimated_render_time_min: 26-40
  locale: en
  page_dim_px: { width: 1280, height: 720 }

# Page-type mix this blueprint composes from (all defined in schemas/page_schemas.json
# EXCEPT price_quality_matrix, which is new — see schema sketch below).
page_types_used:
  - cover
  - methodology_inline
  - toc
  - divider
  - exec_summary_p1
  - exec_summary_p2_implications
  - market_data_chart            # 4-tier stack, indicative price bands, WTP bars, pricing-models table, promo pattern summary
  - competitive_profile_deep     # premium-positioning case studies (2 successes; failure optional)
  - price_quality_matrix         # NEW page type — see schema sketch below
  - methodology_endnote

# -----------------------------------------------------------
# NEW page type: price_quality_matrix
# -----------------------------------------------------------
# Shape (to be formalized in schemas/page_schemas.json by orchestrator owner):
#
