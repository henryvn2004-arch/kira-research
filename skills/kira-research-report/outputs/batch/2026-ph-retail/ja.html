<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フィリピン小売業 2026 — KIRA Research</title>
<style>
@import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap');
:root{
  --bg:#FFFFFF; --bg-soft:#F8F9FB; --text:#0B0D10; --text-mid:#4A5568;
  --muted:#6B7280; --primary:#1E6FFF; --primary-soft:#EEF3FF; --green:#00A88B;
  --amber:#D97706; --red:#B91C1C; --border:#E5E7EB; --dark:#0B0D10;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#52555c;font-family:'Satoshi',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono','SFMono-Regular',Menlo,monospace;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.page{
  position:relative;width:1280px;height:720px;background:var(--bg);
  margin:0 auto 22px;overflow:hidden;
  padding:36px 56px 28px 56px;display:flex;flex-direction:column;
}
.page.dark{background:var(--dark);color:#fff}
/* page chrome */
.page-header{display:flex;justify-content:space-between;align-items:center;height:25px;flex:0 0 auto}
.logo-mark{font-weight:900;letter-spacing:.16em;font-size:13px;text-transform:uppercase}
.page.dark .logo-mark{color:#fff}
.page-header .section-tag{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.page.dark .page-header .section-tag{color:#9aa3af}
.page-divider-rule{height:2px;background:var(--text);margin-top:6px;flex:0 0 auto}
.page.dark .page-divider-rule{background:#fff;opacity:.2}
.page-rule-soft{height:1px;background:var(--border);margin-top:6px;flex:0 0 auto}
.page-footer{margin-top:auto;display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border);font-size:10px;letter-spacing:.06em;color:var(--muted);flex:0 0 auto}
.page.dark .page-footer{border-top-color:rgba(255,255,255,.15);color:#9aa3af}
.body-wrap{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;padding-top:14px}
/* headings */
h1.page-h1{font-size:30px;font-weight:900;line-height:1.08;letter-spacing:-.01em;margin-bottom:8px}
.subhead{font-size:14.5px;line-height:1.45;color:var(--text-mid);max-width:1060px;margin-bottom:14px}
.subhead strong{font-weight:700;color:var(--text)}
.kicker{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:8px}
/* data tags */
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;padding:1px 5px;border-radius:3px;vertical-align:middle;letter-spacing:.02em;white-space:nowrap}
.tag.kira{background:var(--primary-soft);color:var(--primary)}
.tag.src{background:#E7F7F3;color:var(--green)}
.tag.est{background:#FDF2E2;color:var(--amber)}
/* cover */
.cover{padding:0}
.cover-inner{flex:1 1 auto;display:flex;flex-direction:column;justify-content:space-between;padding:56px}
.cover-top{display:flex;justify-content:space-between;align-items:flex-start}
.cover-badge{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.cover-title{font-size:62px;font-weight:900;line-height:1.02;letter-spacing:-.02em;max-width:1000px}
.cover-sub{font-size:20px;color:var(--text-mid);margin-top:18px;max-width:820px;line-height:1.4}
.cover-accent{width:88px;height:6px;background:var(--primary);margin:26px 0}
.cover-meta{display:flex;gap:48px;margin-top:8px}
.cover-meta div .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cover-meta div .v{font-size:17px;font-weight:700}
.cover-foot{display:flex;justify-content:space-between;align-items:flex-end;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.confidential{border:1px solid var(--border);border-radius:4px;padding:5px 10px;letter-spacing:.1em;text-transform:uppercase;font-size:10px}
/* callouts */
.callout-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.callout{border:1px solid var(--border);border-radius:8px;padding:14px 16px;background:var(--bg-soft);min-height:100px;display:flex;flex-direction:column;justify-content:space-between}
.callout .c-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);line-height:1.25}
.callout .c-num{font-size:32px;font-weight:900;line-height:1;margin:6px 0 2px;letter-spacing:-.01em}
.callout .c-num .u{font-size:15px;font-weight:700;color:var(--text-mid);margin-left:2px}
.callout .c-change{font-size:11.5px;color:var(--text-mid);line-height:1.3}
.callout .c-change .up{color:var(--green);font-weight:700}
.callout .c-change .down{color:var(--red);font-weight:700}
/* two-col narrative */
.split{display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1 1 auto;min-height:0}
.split-3070{display:grid;grid-template-columns:1.05fr .95fr;gap:34px;flex:1 1 auto;min-height:0}
.narr h3{font-size:14px;font-weight:700;margin-bottom:5px;letter-spacing:-.01em}
.narr p{font-size:13px;line-height:1.5;color:var(--text-mid);margin-bottom:14px}
.narr p strong{font-weight:700;color:var(--text)}
/* chart panel */
.chart-card{background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;flex-direction:column}
.chart-card .ch-title{font-size:14px;font-weight:700;letter-spacing:-.01em}
.chart-card .ch-sub{font-size:11.5px;color:var(--muted);margin-top:2px;margin-bottom:6px}
.chart-card .ch-src{font-size:10px;color:var(--muted);margin-top:auto;padding-top:8px;font-family:'JetBrains Mono',monospace}
svg text{font-family:'JetBrains Mono',monospace}
.bar-primary{fill:var(--primary)}
.bar-soft{fill:#Bcd4ff}
.bar-mut{fill:#cbd5e1}
.axis-line{stroke:var(--border);stroke-width:1}
.grid-line{stroke:#eef0f3;stroke-width:1}
/* implications cards */
.imp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;flex:1 1 auto}
.imp-grid.g3{grid-template-columns:repeat(3,1fr)}
.imp-card{border:1px solid var(--border);border-radius:8px;padding:14px 15px;display:flex;flex-direction:column}
.imp-card .i-tag{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);margin-bottom:8px}
.imp-card h4{font-size:14px;font-weight:700;line-height:1.2;margin-bottom:8px;letter-spacing:-.01em}
.imp-card p{font-size:11.5px;line-height:1.42;color:var(--text-mid)}
.imp-card .i-anchor{margin-top:auto;padding-top:9px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);border-top:1px solid var(--border)}
/* divider */
.div-body{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;max-width:980px}
.div-num{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.22em;color:var(--primary);margin-bottom:18px}
.div-title{font-size:50px;font-weight:900;line-height:1.04;letter-spacing:-.02em;margin-bottom:22px}
.div-title .acc{color:var(--primary)}
.div-thesis{font-size:18px;line-height:1.5;color:#cbd2dc;max-width:840px}
.div-thesis strong{color:#fff;font-weight:700}
.div-pills{display:flex;flex-wrap:wrap;gap:10px;margin-top:30px}
.div-pill{border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:6px 14px;font-size:11.5px;color:#dfe4ea;font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
/* toc */
.toc-list{display:grid;grid-template-columns:1fr 1fr;gap:6px 48px;flex:1 1 auto;align-content:start}
.toc-row{display:flex;align-items:baseline;gap:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.toc-row .t-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--primary);font-weight:600;width:26px;flex:0 0 auto}
.toc-row .t-title{font-size:13.5px;font-weight:600}
.toc-row .t-sub{font-size:11px;color:var(--muted);margin-left:4px;font-weight:400}
.toc-row .t-pg{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted)}
/* methodology cols */
.meth-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;flex:1 1 auto}
.meth-col h3{font-size:15px;font-weight:900;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--text)}
.meth-item{margin-bottom:16px}
.meth-item .m-label{font-size:13px;font-weight:700;margin-bottom:3px}
.meth-item .m-desc{font-size:12px;line-height:1.45;color:var(--text-mid)}
/* competitive structure */
.cs-top{display:grid;grid-template-columns:1.3fr 1fr;gap:28px;height:236px;margin-bottom:16px}
.cs-side h3{font-size:14px;font-weight:700;margin-bottom:8px}
.cs-side p{font-size:12px;line-height:1.45;color:var(--text-mid);margin-bottom:10px}
.cs-stat{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)}
.cs-stat .s-l{color:var(--text-mid)}
.cs-stat .s-v{font-family:'JetBrains Mono',monospace;font-weight:600}
.player-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.player-card{border:1px solid var(--border);border-radius:8px;padding:12px 13px}
.player-card .p-rank{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--primary);font-weight:600;letter-spacing:.06em}
.player-card .p-name{font-size:13.5px;font-weight:700;line-height:1.15;margin:3px 0 8px}
.player-card .p-stat{display:flex;justify-content:space-between;font-size:10.5px;padding:2px 0;color:var(--text-mid)}
.player-card .p-stat .v{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
.player-card .p-str{font-size:10.5px;line-height:1.35;color:var(--text-mid);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
/* deep profile */
.dp-hero{display:grid;grid-template-columns:1.4fr 1fr;gap:24px;background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:16px}
.dp-name{font-size:26px;font-weight:900;line-height:1.05;letter-spacing:-.01em}
.dp-subtitle{font-size:13px;color:var(--text-mid);margin-top:6px}
.dp-tags{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.dp-tag{font-size:10px;font-family:'JetBrains Mono',monospace;background:#fff;border:1px solid var(--border);border-radius:14px;padding:3px 10px;color:var(--text-mid)}
.dp-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dp-stat .l{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.dp-stat .v{font-size:21px;font-weight:900;line-height:1.1;margin-top:2px}
.dp-stat .v .u{font-size:11px;font-weight:600;color:var(--text-mid)}
.dp-body{display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1 1 auto}
.dp-body h3{font-size:13.5px;font-weight:700;margin-bottom:5px}
.dp-body p{font-size:12.5px;line-height:1.48;color:var(--text-mid);margin-bottom:12px}
.dp-body ul{list-style:none}
.dp-body li{font-size:12px;line-height:1.4;color:var(--text-mid);padding-left:16px;position:relative;margin-bottom:7px}
.dp-body li:before{content:"";position:absolute;left:0;top:7px;width:6px;height:6px;background:var(--primary);border-radius:50%}
/* use case grid */
.uc-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:14px;flex:1 1 auto}
.uc-card{border:1px solid var(--border);border-radius:8px;padding:13px 14px;display:flex;flex-direction:column}
.uc-card .u-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);margin-bottom:6px}
.uc-card h4{font-size:13.5px;font-weight:700;line-height:1.18;margin-bottom:7px}
.uc-card p{font-size:11px;line-height:1.4;color:var(--text-mid)}
.uc-card .u-ex{margin-top:auto;padding-top:8px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);border-top:1px solid var(--border)}
/* forecast */
.fc-chart{height:300px;margin-bottom:16px}
.scen-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:0 0 auto}
.scen-card{border:1px solid var(--border);border-radius:8px;padding:14px 16px;border-top:3px solid var(--primary)}
.scen-card.bull{border-top-color:var(--green)}
.scen-card.bear{border-top-color:var(--amber)}
.scen-card .s-name{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
.scen-card .s-val{font-size:24px;font-weight:900;margin:5px 0}
.scen-card .s-body{font-size:11.5px;line-height:1.4;color:var(--text-mid)}
/* source key footer */
.source-key{font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.4;color:var(--muted);font-style:italic;margin-top:12px;flex:0 0 auto}
.source-key b{font-style:normal;color:var(--text-mid)}
/* endnote */
.end-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:40px;flex:1 1 auto}
.end-grid p{font-size:12.5px;line-height:1.55;color:var(--text-mid);margin-bottom:12px}
.src-list{columns:1;font-size:11px;line-height:1.5;color:var(--text-mid)}
.src-list div{margin-bottom:6px;padding-left:14px;text-indent:-14px}
.src-list b{color:var(--text);font-weight:700}
.disclaimer{font-size:10.5px;color:var(--muted);line-height:1.4;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.legend{display:flex;gap:18px;margin-top:8px;font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.legend span:before{content:"";display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
.legend .lg-p:before{background:var(--primary)}
.legend .lg-s:before{background:var(--green)}
.legend .lg-e:before{background:var(--amber)}
</style>
</head>
