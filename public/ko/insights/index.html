<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>인사이트 — KIRA RESEARCH</title>
  <meta name="description" content="동남아시아 시장에 대한 분석가의 현장 노트와 코멘터리 — 핀테크, FMCG, 물류, 헬스테크, 에너지." />

  <link rel="alternate" hreflang="en" href="https://kiraresearch.com/en/insights/" />
  <link rel="alternate" hreflang="ja" href="https://kiraresearch.com/ja/insights/" />
  <link rel="alternate" hreflang="ko" href="https://kiraresearch.com/ko/insights/" />
  <link rel="alternate" hreflang="x-default" href="https://kiraresearch.com/en/insights/" />
  <link rel="canonical" href="https://kiraresearch.com/ko/insights/" />

  <meta property="og:title" content="인사이트 — KIRA RESEARCH" />
  <meta property="og:description" content="동남아시아 시장을 다루는 시니어 분석가의 현장 노트." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kiraresearch.com/ko/insights/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" />

  <link rel="stylesheet" href="/css/kira.css" />
  <style>
    body, h1, h2, h3, h4 { font-family: 'Satoshi', 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body>

  <div class="container">
    <header class="lib-header">
      <div class="hero-eyebrow" data-i18n="insights.eyebrow">인사이트</div>
      <h1 data-i18n="insights.title">분석가 데스크의 현장 노트.</h1>
      <p data-i18n="insights.sub">동남아시아에서 일어나는 변화에 대한 짧은 글 — 우리가 다루는 시장, 추적하는 신호, 사용하는 방법론. 무료 공개.</p>
    </header>

    <div class="insights-search-wrap">
      <svg class="insights-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="insights-search" class="insights-search" type="search" autocomplete="off"
             placeholder="주제, 국가, 산업으로 검색…" aria-label="인사이트 검색" />
    </div>

    <nav class="insights-cats" aria-label="카테고리">
      <a href="#" class="active" data-i18n="insights.catAll">전체</a>
      <a href="#" data-cat="vietnam">베트남</a>
      <a href="#" data-cat="indonesia">인도네시아</a>
      <a href="#" data-cat="thailand">태국</a>
      <a href="#" data-cat="philippines">필리핀</a>
      <a href="#" data-cat="fintech">핀테크</a>
      <a href="#" data-cat="fmcg">FMCG</a>
      <a href="#" data-cat="logistics">물류</a>
      <a href="#" data-cat="methodology" data-i18n="insights.catMethod">조사 방법론</a>
    </nav>

    <div id="insights-root">
      <div class="insight-empty">로딩 중…</div>
    </div>
  </div>

  <style>
    .insight-empty { padding: 96px 24px; text-align: center; color: var(--muted); font-size: 14px; }
    .insight-card.disabled, .insight-featured.disabled { pointer-events: none; opacity: 0.6; }
  </style>

  <script src="/js/nav.js" defer></script>
  <script src="/js/i18n.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const root      = document.getElementById('insights-root');
      const cats      = document.querySelectorAll('.insights-cats a');
      const searchEl  = document.getElementById('insights-search');
      const locale    = (window.kira && window.kira.locale) || 'ko';
      const PAGE_SIZE = 12;
      let activeCat = '';
      let searchQ   = '';
      let page      = 1;
      let searchTimer = null;

      const params = new URLSearchParams(window.location.search);
      const initCat = params.get('cat');
      if (initCat) {
        activeCat = initCat.toLowerCase();
        cats.forEach(a => {
          a.classList.toggle('active',
            (a.dataset.cat || '').toLowerCase() === activeCat ||
            (!a.dataset.cat && !activeCat));
        });
      }
      const initQ = params.get('q');
      if (initQ) {
        searchQ = initQ.slice(0, 64);
        if (searchEl) searchEl.value = searchQ;
      }
      const initPage = parseInt(params.get('page'), 10);
      if (initPage && initPage > 0) page = initPage;

      cats.forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          cats.forEach(o => o.classList.remove('active'));
          a.classList.add('active');
          activeCat = (a.dataset.cat || '').toLowerCase();
          page = 1;
          syncUrl();
          fetchAndRender();
        });
      });

      if (searchEl) {
        searchEl.addEventListener('input', () => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => {
            searchQ = searchEl.value.trim();
            page = 1;
            syncUrl();
            fetchAndRender();
          }, 220);
        });
      }

      window.addEventListener('popstate', () => {
        const p = new URLSearchParams(window.location.search);
        activeCat = (p.get('cat') || '').toLowerCase();
        searchQ   = (p.get('q')   || '').slice(0, 64);
        if (searchEl) searchEl.value = searchQ;
        page = Math.max(1, parseInt(p.get('page'), 10) || 1);
        cats.forEach(a => {
          a.classList.toggle('active',
            (a.dataset.cat || '').toLowerCase() === activeCat ||
            (!a.dataset.cat && !activeCat));
        });
        fetchAndRender();
      });

      function syncUrl() {
        const p = new URLSearchParams();
        if (activeCat) p.set('cat', activeCat);
        if (searchQ)   p.set('q',   searchQ);
        if (page > 1)  p.set('page', String(page));
        const qs = p.toString();
        window.history.pushState({}, '', window.location.pathname + (qs ? '?' + qs : ''));
      }

      async function fetchAndRender() {
        root.innerHTML = '<div class="insight-empty">로딩 중…</div>';
        const qs = new URLSearchParams();
        qs.set('locale', locale);
        qs.set('limit', String(PAGE_SIZE));
        qs.set('offset', String((page - 1) * PAGE_SIZE));
        if (activeCat) qs.set('category', activeCat);
        if (searchQ)   qs.set('q', searchQ);
        try {
          const r = await fetch('/api/insights-list?' + qs.toString());
          if (!r.ok) throw new Error('http ' + r.status);
          const data = await r.json();
          render(data.items || [], data.total || 0);
        } catch (err) {
          root.innerHTML = '<div class="insight-empty">인사이트를 불러올 수 없습니다. 다시 시도해주세요.</div>';
        }
      }

      function render(items, total) {
        if (!items.length) {
          const msg = searchQ
            ? '"' + escapeHtml(searchQ) + '"에 해당하는 인사이트가 없습니다. 다른 키워드로 시도해보세요.'
            : '이 필터에 해당하는 인사이트가 없습니다.';
          root.innerHTML = '<div class="insight-empty">' + msg + '</div>';
          return;
        }
        const html = [];
        if (page === 1 && !searchQ) {
          const featured = items.find(it => it.featured) || items[0];
          const rest = items.filter(it => it.slug !== featured.slug);
          html.push(renderFeatured(featured));
          if (rest.length) {
            html.push('<div class="insights-grid">');
            rest.forEach(it => html.push(renderCard(it)));
            html.push('</div>');
          }
        } else {
          html.push('<div class="insights-grid">');
          items.forEach(it => html.push(renderCard(it)));
          html.push('</div>');
        }
        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (totalPages > 1) html.push(renderPager(totalPages));
        root.innerHTML = html.join('');

        const prev = root.querySelector('.insights-pager .pager-prev');
        const next = root.querySelector('.insights-pager .pager-next');
        if (prev) prev.addEventListener('click', (e) => { e.preventDefault(); goTo(page - 1); });
        if (next) next.addEventListener('click', (e) => { e.preventDefault(); goTo(page + 1); });
      }

      function goTo(n) {
        page = Math.max(1, n);
        syncUrl();
        fetchAndRender();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function renderPager(totalPages) {
        const prevDisabled = page <= 1 ? ' disabled' : '';
        const nextDisabled = page >= totalPages ? ' disabled' : '';
        return (
          '<nav class="insights-pager" aria-label="페이지네이션">' +
            '<a href="#" class="pager-prev' + prevDisabled + '"' +
              (prevDisabled ? ' aria-disabled="true"' : '') + '>← 이전</a>' +
            '<span class="pager-status">' + page + ' / ' + totalPages + ' 페이지</span>' +
            '<a href="#" class="pager-next' + nextDisabled + '"' +
              (nextDisabled ? ' aria-disabled="true"' : '') + '>다음 →</a>' +
          '</nav>'
        );
      }

      function renderFeatured(it) {
        const cat = buildCatLabel(it);
        const meta = [formatDate(it.published_at), it.read_time].filter(Boolean).join(' · ');
        const title = it.title || humanize(it.slug);
        const excerpt = it.excerpt || '';
        return (
          '<a href="' + articleHref(it.slug) + '" class="insight-featured' + (it.hasTranslation ? '' : ' disabled') + '">' +
            '<div class="insight-featured-img"><span class="ifi-tag">' + escapeHtml(cat || 'INSIGHT') + '</span></div>' +
            '<div class="insight-featured-body">' +
              '<div class="insight-meta">' +
                '<span class="cat">주요</span>' +
                '<span>' + escapeHtml(meta || '—') + '</span>' +
              '</div>' +
              '<h2>' + escapeHtml(title) + '</h2>' +
              (excerpt ? '<p class="insight-excerpt">' + escapeHtml(excerpt) + '</p>' : '') +
              '<div class="insight-footer">' +
                '<span>리서치 팀</span>' +
                '<span class="read">' + (it.hasTranslation ? '읽기 →' : '번역 중…') + '</span>' +
              '</div>' +
            '</div>' +
          '</a>'
        );
      }

      function renderCard(it) {
        const cat = buildCatLabel(it);
        const date = formatDate(it.published_at);
        const title = it.title || humanize(it.slug);
        const excerpt = it.excerpt || '';
        const readTime = it.read_time || '';
        return (
          '<a href="' + articleHref(it.slug) + '" class="insight-card' + (it.hasTranslation ? '' : ' disabled') + '">' +
            '<div class="insight-meta">' +
              '<span class="cat">' + escapeHtml(cat || 'INSIGHT') + '</span>' +
              '<span>' + escapeHtml(date) + '</span>' +
            '</div>' +
            '<h3>' + escapeHtml(title) + '</h3>' +
            (excerpt ? '<p class="insight-excerpt">' + escapeHtml(excerpt) + '</p>' : '') +
            '<div class="insight-footer">' +
              '<span>' + escapeHtml(readTime || '—') + '</span>' +
              '<span class="read">' + (it.hasTranslation ? '읽기 →' : '번역 중…') + '</span>' +
            '</div>' +
          '</a>'
        );
      }

      function articleHref(slug) { return '/' + locale + '/insights/' + encodeURIComponent(slug); }
      function buildCatLabel(it) {
        const parts = [];
        if (it.country)  parts.push(it.country.toUpperCase());
        if (it.industry) parts.push(it.industry.toUpperCase());
        if (!parts.length && it.category) parts.push(it.category.toUpperCase());
        return parts.join(' · ');
      }
      function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return `${d.getFullYear()}년 ${d.getMonth() + 1}월`;
      }
      function humanize(slug) { return String(slug || '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }
      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
      fetchAndRender();
    });
  </script>
</body>
</html>
