<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>리서치 라이브러리 — KIRA RESEARCH</title>
  <meta name="description" content="동남아시아 11개국 38개 산업을 다루는 마켓 인텔리전스 보고서. 시니어 분석가가 작성." />

  <link rel="alternate" hreflang="en" href="https://kiraresearch.com/en/library" />
  <link rel="alternate" hreflang="ja" href="https://kiraresearch.com/ja/library" />
  <link rel="alternate" hreflang="ko" href="https://kiraresearch.com/ko/library" />
  <link rel="alternate" hreflang="x-default" href="https://kiraresearch.com/en/library" />
  <link rel="canonical" href="https://kiraresearch.com/ko/library" />

  <meta property="og:title" content="리서치 라이브러리 — KIRA RESEARCH" />
  <meta property="og:description" content="동남아시아 마켓 인텔리전스 라이브러리. 11개국, 38개 산업." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kiraresearch.com/ko/library" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" />

  <link rel="stylesheet" href="/css/kira.css" />
  <style>
    body, h1, h2, h3, h4, .hero-title { font-family: 'Satoshi', 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body>

  <div class="container">
    <header class="lib-header">
      <div class="hero-eyebrow" data-i18n="library.eyebrow">RESEARCH LIBRARY</div>
      <h1 data-i18n="library.title">Southeast Asia, by the market.</h1>
      <p data-i18n="library.sub">Browse market intelligence reports across 11 countries and 38 industries.</p>
    </header>

    <div class="lib-controls">
      <input type="text" class="lib-search" id="lib-search"
             placeholder="보고서 검색 — 산업, 국가, 키워드…"
             data-i18n-attr="placeholder:library.searchPlaceholder" />
      <span class="lib-count" id="lib-count">128 REPORTS</span>
      <select class="lib-sort" id="lib-sort">
        <option value="recent" data-i18n="library.sortRecent">Most recent</option>
        <option value="popular" data-i18n="library.sortPopular">Most popular</option>
        <option value="price-asc" data-i18n="library.sortPriceAsc">Price: Low to High</option>
        <option value="price-desc" data-i18n="library.sortPriceDesc">Price: High to Low</option>
      </select>
    </div>

    <div class="lib-grid">
      <aside class="filters">
        <div class="filter-group">
          <h5 data-i18n="library.filterCountry">Country</h5>
          <div class="filter-option active" data-filter="country" data-value=""><span data-i18n="library.all">All</span><span class="count">128</span></div>
          <div class="filter-option" data-filter="country" data-value="vietnam"><span>베트남</span><span class="count">28</span></div>
          <div class="filter-option" data-filter="country" data-value="indonesia"><span>인도네시아</span><span class="count">26</span></div>
          <div class="filter-option" data-filter="country" data-value="thailand"><span>태국</span><span class="count">22</span></div>
          <div class="filter-option" data-filter="country" data-value="philippines"><span>필리핀</span><span class="count">19</span></div>
          <div class="filter-option" data-filter="country" data-value="malaysia"><span>말레이시아</span><span class="count">15</span></div>
          <div class="filter-option" data-filter="country" data-value="singapore"><span>싱가포르</span><span class="count">12</span></div>
        </div>

        <div class="filter-group">
          <h5 data-i18n="library.filterIndustry">Industry</h5>
          <div class="filter-option" data-filter="industry" data-value="fintech"><span>핀테크</span><span class="count">14</span></div>
          <div class="filter-option" data-filter="industry" data-value="fmcg"><span>FMCG</span><span class="count">22</span></div>
          <div class="filter-option" data-filter="industry" data-value="logistics"><span>물류</span><span class="count">8</span></div>
          <div class="filter-option" data-filter="industry" data-value="healthtech"><span>헬스테크</span><span class="count">11</span></div>
          <div class="filter-option" data-filter="industry" data-value="real-estate"><span>부동산</span><span class="count">6</span></div>
          <div class="filter-option" data-filter="industry" data-value="fnb"><span>F&amp;B</span><span class="count">16</span></div>
        </div>

        <div class="filter-group">
          <h5 data-i18n="library.filterYear">Year</h5>
          <div class="filter-option active" data-filter="year" data-value="2026"><span>2026</span><span class="count">94</span></div>
          <div class="filter-option" data-filter="year" data-value="2025"><span>2025</span><span class="count">34</span></div>
        </div>

        <div class="filter-group">
          <h5 data-i18n="library.filterPrice">Price</h5>
          <div class="filter-option" data-filter="price" data-value="lt30"><span data-i18n="library.priceLt30">Under $30</span><span class="count">42</span></div>
          <div class="filter-option" data-filter="price" data-value="30-49"><span>$30 – $49</span><span class="count">68</span></div>
          <div class="filter-option" data-filter="price" data-value="gt50"><span data-i18n="library.priceGt50">$50+</span><span class="count">18</span></div>
        </div>
      </aside>

      <div class="lib-results" id="lib-results">
        <div class="lib-empty">로딩 중…</div>
      </div>
    </div>
  </div>

  <script src="/js/nav.js" defer></script>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/live-counts.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const root = document.getElementById('lib-results');
      const countEl = document.getElementById('lib-count');
      const searchEl = document.getElementById('lib-search');
      const sortEl = document.getElementById('lib-sort');
      const filterEls = document.querySelectorAll('.filter-option');
      const locale = (window.kira && window.kira.locale) || 'ko';

      const state = { country: '', industry: '', year: '', price: '', q: '', sort: 'recent' };

      const initParams = new URLSearchParams(window.location.search);
      ['country','industry','year'].forEach(k => {
        const v = initParams.get(k);
        if (v) {
          state[k] = v.toLowerCase();
          document.querySelectorAll(`[data-filter="${k}"]`).forEach(el => {
            el.classList.toggle('active', el.dataset.value.toLowerCase() === state[k]);
          });
        }
      });

      filterEls.forEach(opt => {
        opt.addEventListener('click', () => {
          const group = opt.dataset.filter;
          const value = (opt.dataset.value || '').toLowerCase();
          document.querySelectorAll(`[data-filter="${group}"]`).forEach(o => o.classList.remove('active'));
          opt.classList.add('active');
          state[group] = value;
          fetchAndRender();
        });
      });

      let searchTimer = null;
      if (searchEl) {
        searchEl.addEventListener('input', () => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => {
            state.q = searchEl.value.trim().toLowerCase();
            fetchAndRender();
          }, 220);
        });
      }
      if (sortEl) {
        sortEl.addEventListener('change', () => {
          state.sort = sortEl.value || 'recent';
          fetchAndRender();
        });
      }

      async function fetchAndRender() {
        root.innerHTML = '<div class="lib-empty">로딩 중…</div>';
        const qs = new URLSearchParams();
        qs.set('locale', locale);
        qs.set('sort',   state.sort);
        qs.set('limit',  '48');
        if (state.country)  qs.set('country',  state.country);
        if (state.industry) qs.set('industry', state.industry);
        if (state.year)     qs.set('year',     state.year);

        try {
          const r = await fetch('/api/library-list?' + qs.toString());
          if (!r.ok) throw new Error('http ' + r.status);
          const data = await r.json();
          render(data);
        } catch (err) {
          root.innerHTML = '<div class="lib-empty">라이브러리를 불러올 수 없습니다. 다시 시도해주세요.</div>';
        }
      }

      function render(data) {
        let items = data.items || [];
        if (state.q) {
          const q = state.q;
          items = items.filter(it => {
            return (it.title || '').toLowerCase().includes(q)
                || (it.country || '').toLowerCase().includes(q)
                || (it.industry || '').toLowerCase().includes(q)
                || (it.excerpt || '').toLowerCase().includes(q);
          });
        }
        if (state.price) {
          items = items.filter(it => {
            const p = it.price || 0;
            if (state.price === 'lt30')   return p < 30;
            if (state.price === '30-49')  return p >= 30 && p <= 49;
            if (state.price === 'gt50')   return p >= 50;
            return true;
          });
        }

        if (countEl) {
          countEl.textContent = (items.length || 0) + ' / ' + (data.total || 0) + ' 보고서';
        }

        if (!items.length) {
          root.innerHTML = '<div class="lib-empty">조건에 맞는 보고서가 없습니다. <a href="?" style="color:var(--primary)">필터 초기화 →</a></div>';
          return;
        }

        root.innerHTML = items.map(it => {
          const country = (it.country || '').toUpperCase();
          const industry = (it.industry || '').toUpperCase();
          const meta = [industry, it.year].filter(Boolean).join(' · ');
          const title = it.title || (humanize(it.slug));
          const excerpt = it.excerpt || '';
          return (
            '<a href="/' + locale + '/reports/' + escapeAttr(it.slug) + '" class="report-card">' +
              '<div class="report-meta">' +
                '<span class="country">' + escapeHtml(country) + '</span>' +
                '<span>' + escapeHtml(meta) + '</span>' +
              '</div>' +
              '<h3>' + escapeHtml(title) + '</h3>' +
              (excerpt ? '<p class="report-desc">' + escapeHtml(excerpt.slice(0, 180)) + (excerpt.length > 180 ? '…' : '') + '</p>' : '') +
              '<div class="report-footer">' +
                '<span class="report-price">$' + (it.price || 39) + '</span>' +
                '<span class="report-cta">미리보기 →</span>' +
              '</div>' +
            '</a>'
          );
        }).join('');
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
      function escapeAttr(s) { return encodeURIComponent(String(s == null ? '' : s)); }
      function humanize(slug) {
        return String(slug || '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      }

      fetchAndRender();
    });
  </script>

  <style>
    .lib-empty {
      grid-column: 1 / -1;
      padding: 96px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</body>
</html>
