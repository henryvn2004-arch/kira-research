<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New report — KIRA Studio</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="canonical" href="https://studio.kiraresearch.com/new" />

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/kira.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>

  <style>
    body { background: #FAFAFA; }
    .new-nav {
      padding: 22px 0;
      border-bottom: 1px solid #E2E8F0;
      background: #FFFFFF;
    }
    .new-nav .container { max-width: 1180px; display: flex; justify-content: space-between; align-items: center; }
    .new-nav .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .new-nav .logo-mark {
      font-family: 'Satoshi', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: 0.08em; color: #0F172A;
    }
    .new-nav .logo-mark .a-accent { color: #1E6FFF; display: inline-block; transform: skewX(-12deg); }
    .new-nav .logo-sub {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #64748B; padding: 3px 7px; background: rgba(30,111,255,0.08); border-radius: 3px;
    }
    .new-nav-links { display: flex; gap: 22px; align-items: center; }
    .new-nav-links a {
      color: #475569; text-decoration: none; font-family: 'Satoshi', sans-serif; font-weight: 500; font-size: 13px;
    }
    .new-nav-links a:hover { color: #1E6FFF; }

    .studio-hero {
      padding: 56px 0 28px;
      max-width: 880px;
      margin: 0 auto;
    }
    .studio-hero .eyebrow {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #1E6FFF; margin-bottom: 14px;
    }
    .studio-hero h1 {
      font-family: 'Satoshi', sans-serif; font-weight: 700;
      font-size: clamp(28px, 4.5vw, 42px);
      line-height: 1.05; letter-spacing: -0.025em;
      color: #0F172A; margin: 0 0 18px;
    }
    .studio-hero p.lede {
      font-size: 16px; line-height: 1.55; color: #475569;
      max-width: 640px; margin: 0;
    }

    .studio-form-card {
      max-width: 880px; margin: 0 auto 96px;
      padding: 36px;
      background: #FFFFFF;
      border: 1px solid #E2E8F0; border-radius: 8px;
      box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 4px 12px rgba(15,23,42,0.04);
    }
    .studio-field { margin-bottom: 20px; }
    .studio-field label {
      display: block;
      font-family: 'Satoshi', sans-serif; font-weight: 600; font-size: 11px;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: #64748B; margin-bottom: 8px;
    }
    .studio-field textarea {
      width: 100%; box-sizing: border-box;
      padding: 14px 16px;
      font-family: inherit; font-size: 15px; line-height: 1.5;
      color: #0F172A; background: #FAFAFA;
      border: 1px solid #CBD5E1; border-radius: 4px;
      resize: vertical; min-height: 100px;
    }
    .studio-field textarea:focus {
      outline: none; border-color: #1E6FFF;
      box-shadow: 0 0 0 3px rgba(30,111,255,0.12);
    }
    .studio-field .hint {
      font-size: 12px; color: #64748B; margin-top: 6px; line-height: 1.5;
    }

    .upload-zone {
      border: 1px dashed #CBD5E1; border-radius: 6px;
      padding: 18px; background: #FAFAFA;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag {
      border-color: #1E6FFF; background: rgba(30,111,255,0.04);
    }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone .upload-cta { font-family: 'Satoshi', sans-serif; font-weight: 600; font-size: 14px; color: #0F172A; }
    .upload-zone .upload-sub { font-size: 12px; color: #64748B; margin-top: 4px; line-height: 1.5; }
    .upload-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .upload-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: #FAFAFA;
      border: 1px solid #E2E8F0; border-radius: 4px;
      font-size: 13px; font-family: 'JetBrains Mono', monospace;
    }
    .upload-item .name { color: #0F172A; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .upload-item .meta { color: #64748B; font-size: 11px; margin-left: 12px; flex-shrink: 0; }
    .upload-item button.remove {
      background: transparent; border: none; color: #64748B; cursor: pointer;
      font-family: inherit; font-size: 16px; padding: 0 4px; margin-left: 12px;
    }
    .upload-item button.remove:hover { color: #C0392B; }

    .studio-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 28px; padding-top: 24px; border-top: 1px solid #E2E8F0;
    }
    .studio-actions .left {
      font-size: 12px; color: #64748B; line-height: 1.5; max-width: 50%;
    }
    .studio-actions button.primary {
      background: #1E6FFF; color: #FFFFFF; border: none;
      padding: 14px 28px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      border-radius: 4px; cursor: pointer; transition: background 0.2s;
    }
    .studio-actions button.primary:hover { background: #2980F0; }
    .studio-actions button.primary:disabled { opacity: 0.6; cursor: wait; }

    .studio-err {
      padding: 14px 18px;
      background: rgba(192,57,43,0.06);
      border: 1px solid rgba(192,57,43,0.25);
      border-radius: 6px; color: #C0392B; font-size: 13px; margin-bottom: 20px;
    }

    .studio-gate {
      max-width: 480px; margin: 120px auto;
      padding: 48px;
      background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 8px;
      text-align: center;
    }
    .studio-gate h2 { font-family: 'Satoshi', sans-serif; font-weight: 700; font-size: 22px; color: #0F172A; margin-bottom: 12px; }
    .studio-gate p { color: #64748B; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .studio-gate a.btn-primary {
      display: inline-flex; align-items: center;
      background: #1E6FFF; color: #FFFFFF; padding: 12px 22px;
      border-radius: 4px; font-size: 14px; font-weight: 600; text-decoration: none;
    }

    .templates-row {
      max-width: 880px; margin: 0 auto 32px;
      padding: 0 4px;
    }
    .templates-row .label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em;
      text-transform: uppercase; color: #64748B; margin-bottom: 10px;
    }
    .templates-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .templates-chips button {
      font-family: 'Satoshi', sans-serif; font-weight: 500; font-size: 13px;
      padding: 8px 14px; border-radius: 999px;
      background: #FFFFFF; border: 1px solid #CBD5E1; color: #475569;
      cursor: pointer; transition: all 0.15s;
    }
    .templates-chips button:hover { border-color: #1E6FFF; color: #1E6FFF; background: rgba(30,111,255,0.04); }

    /* Phase O.9 — credit balance pill in the top nav. */
    .nav-balance {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: rgba(30,111,255,0.08);
      border: 1px solid rgba(30,111,255,0.2);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: #1E6FFF;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .nav-balance:hover { background: rgba(30,111,255,0.14); border-color: #1E6FFF; }
    .nav-balance .num { font-weight: 600; color: #0F172A; }
    .nav-balance.low { background: rgba(192,57,43,0.06); border-color: rgba(192,57,43,0.25); color: #C0392B; }
    .nav-balance.low .num { color: #C0392B; }

    /* Phase O.9 — insufficient-credits warning above Generate. */
    .credit-warn {
      padding: 14px 18px;
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 6px;
      color: #B45309; font-size: 13.5px; line-height: 1.55;
      margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
    }
    .credit-warn a.btn {
      background: #1E6FFF; color: #FFFFFF; text-decoration: none;
      padding: 8px 16px; border-radius: 4px;
      font-family: 'Satoshi', sans-serif; font-weight: 600; font-size: 13px;
    }
    .credit-warn a.btn:hover { background: #2980F0; }
    .credit-cost-note {
      font-size: 11.5px; color: #64748B; margin-right: 16px;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>

  <nav class="new-nav">
    <div class="container">
      <a class="logo" href="/">
        <span class="logo-mark">KIR<span class="a-accent">A</span></span>
        <span class="logo-sub">Studio</span>
      </a>
      <div class="new-nav-links">
        <a href="/library">My library</a>
        <a href="/billing">Credits</a>
        <a href="/">About</a>
        <a href="https://kiraresearch.com">KIRA home ↗</a>
        <a href="/billing" class="nav-balance" id="nav-balance" style="display:none;">
          <span class="num" id="nav-balance-num">–</span><span>credits</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="container" id="studio-root">
    <div style="padding: 120px 0; text-align: center; color: #64748B;">Loading…</div>
  </div>

  <script type="module">
    const root = document.getElementById('studio-root');

    // Module-scope constants must be declared BEFORE any code path that
    // reaches into them. `const` is hoisted but stays in the Temporal
    // Dead Zone until this line runs, so previously placing the array
    // below the renderForm() call site threw a ReferenceError before
    // the form ever rendered.
    // Phase N.23: templates span deliverable types — company profile,
    // service deck, exec brief, market analysis, technical doc.
    // Studio is free-form: brief drives report kind, not a fixed enum.
    const TEMPLATE_PROMPTS = [
      'Company profile presentation — summarise the attached annual report into a 6-slide overview: who they are, what they do, key clients, leadership, financial highlights, contact.',
      'Executive summary — distill the attached materials into a 1-page brief for the management board: situation, key findings, recommended actions.',
      'Service portfolio deck — turn the attached service catalog into a clean 5-slide presentation for prospects: offerings, use cases, differentiators, case studies, CTA.',
      'Market analysis report — synthesise the attached firm-level data + regulator notes into an investor-ready market overview. Focus on sizing, players, and 2027 outlook.',
      'Technical methodology doc — write up the attached research notes as a structured methodology document: approach, findings, limitations, recommendations.'
    ];

    while (!window.kiraAuth) await new Promise(r => setTimeout(r, 20));

    const user = await window.kiraAuth.getUser();
    if (!user) {
      renderGate();
    } else {
      // Phase O.9: kick off balance fetch in parallel with form render
      // — it just paints into the pre-existing nav pill when ready.
      const balancePromise = fetchBalance();
      renderForm(user, balancePromise);
    }

    // Phase O.9: fetch wallet state. Falls back to { balance: 0, report_cost: 100 }
    // on any error so the UI degrades safely (user still sees the form,
    // server-side 402 will catch true insufficiency).
    async function fetchBalance() {
      try {
        const session = (await window.db.auth.getSession()).data.session;
        if (!session) return { balance: 0, report_cost: 100 };
        const r = await fetch('/api/studio-credits', {
          headers: { 'Authorization': 'Bearer ' + session.access_token }
        });
        if (!r.ok) return { balance: 0, report_cost: 100 };
        return await r.json();
      } catch {
        return { balance: 0, report_cost: 100 };
      }
    }

    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function renderGate() {
      root.innerHTML = `
        <div class="studio-gate">
          <h2>Sign in to use KIRA Studio</h2>
          <p>Reports you generate are saved to your private library — only you can see them. Existing KIRA Research accounts work.</p>
          <a href="/auth.html" class="btn-primary">Sign in / Create account</a>
        </div>
      `;
      try { sessionStorage.setItem('kira_redirect_after_login', '/new'); } catch {}
    }

    function renderForm(user, balancePromise) {
      root.innerHTML = `
        <section class="studio-hero">
          <div class="eyebrow">New report · ${escHtml(user.email || '')}</div>
          <h1>Bring the research. We write the deliverable.</h1>
          <p class="lede">Upload your source dossier — analyst notes, primary data, transcripts, regulator filings, financial models. Tell us what to make. Studio drafts a consulting-grade report from your sources in 3–5 minutes.</p>
        </section>

        <div class="templates-row">
          <div class="label">Example brief</div>
          <div class="templates-chips" id="tpl-chips"></div>
        </div>

        <section class="studio-form-card">
          <div id="studio-err"></div>
          <div id="credit-warn-slot"></div>

          <div class="studio-field">
            <label for="topic">Report brief</label>
            <textarea id="topic" placeholder="e.g. Make a 6-slide company profile presentation from this PDF — focus on services, leadership, key clients. Or: Summarise these analyst notes into a 1-page executive brief for the board." maxlength="600"></textarea>
            <div class="hint">Tell us what you want — type of deliverable (report / deck / brief / profile), length (number of slides or sections), audience, focus. The more specific, the better the output. Max 600 characters.</div>
          </div>

          <div class="studio-field">
            <label>Source documents <span style="color:#C0392B;">*</span></label>
            <label for="files" class="upload-zone" id="upload-zone">
              <div class="upload-cta">Drop files here or click to attach</div>
              <div class="upload-sub">PDF, DOCX, XLSX, CSV, TXT · max 25 MB each · up to 10 files · at least 1 required</div>
              <input type="file" id="files" multiple accept=".pdf,.docx,.xlsx,.csv,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv,text/plain" />
            </label>
            <div class="upload-list" id="upload-list"></div>
            <div class="hint" style="margin-top:8px;">Studio writes from your sources — no autonomous web search. Inline citations reference each filename. Better sources in → better report out.</div>
          </div>

          <div class="studio-actions">
            <div class="left">Generation typically takes 3–5 minutes — you'll see live progress on the next page.</div>
            <div style="display:flex;align-items:center;gap:14px;">
              <span class="credit-cost-note" id="credit-cost-note" style="display:none;"></span>
              <button class="primary" id="generate-btn">Generate report →</button>
            </div>
          </div>
        </section>
      `;

      const topicEl  = document.getElementById('topic');
      const filesEl  = document.getElementById('files');
      const zoneEl   = document.getElementById('upload-zone');
      const listEl   = document.getElementById('upload-list');
      const generate = document.getElementById('generate-btn');
      const errEl    = document.getElementById('studio-err');
      const tplEl    = document.getElementById('tpl-chips');
      const warnSlot = document.getElementById('credit-warn-slot');
      const costNote = document.getElementById('credit-cost-note');
      const navBal   = document.getElementById('nav-balance');
      const navBalNum = document.getElementById('nav-balance-num');

      // ── Phase O.9: paint balance state once it arrives. ───
      // Form stays usable while loading; server-side 402 is the real
      // gate. This is just UX clarity.
      let walletState = null;
      (async () => {
        const w = await balancePromise;
        walletState = w;
        const enough = (w.balance || 0) >= (w.report_cost || 100);

        // Nav pill
        navBal.style.display = 'inline-flex';
        navBalNum.textContent = (w.balance || 0).toLocaleString();
        if (!enough) navBal.classList.add('low');

        // Cost note next to Generate
        costNote.style.display = 'inline-block';
        costNote.textContent = `${w.report_cost || 100} credits per report`;

        // Insufficient warning inside the form
        if (!enough) {
          const short = (w.report_cost || 100) - (w.balance || 0);
          warnSlot.innerHTML = `
            <div class="credit-warn">
              <div>
                You need <strong>${w.report_cost || 100} credits</strong> per report.
                Current balance: <strong>${w.balance || 0}</strong> — short by ${short}.
              </div>
              <a href="/billing" class="btn">Buy credits →</a>
            </div>
          `;
          generate.disabled = true;
          generate.title    = 'Insufficient credits — buy a pack to continue';
          generate.style.opacity = '0.55';
        }
      })();

      // Chip label = the short noun phrase before the em-dash (e.g.
      // "Company profile presentation"); full brief expands into the
      // textarea on click. Keeps the chip strip readable on mobile.
      tplEl.innerHTML = TEMPLATE_PROMPTS.map((p, i) =>
        `<button type="button" data-idx="${i}">${escHtml(p.split(' — ')[0])}</button>`
      ).join('');
      tplEl.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
          topicEl.value = TEMPLATE_PROMPTS[Number(b.dataset.idx)];
          topicEl.focus();
        });
      });

      const uploads = [];

      function renderUploads() {
        listEl.innerHTML = uploads.map((u, i) =>
          `<div class="upload-item">
             <span class="name">${escHtml(u.name)}</span>
             <span class="meta">${(u.size / 1024).toFixed(0)} KB</span>
             <button class="remove" data-idx="${i}" aria-label="Remove">×</button>
           </div>`
        ).join('');
        listEl.querySelectorAll('.remove').forEach(b => {
          b.addEventListener('click', () => {
            uploads.splice(Number(b.dataset.idx), 1);
            renderUploads();
          });
        });
      }

      function showErr(msg) {
        errEl.innerHTML = msg ? `<div class="studio-err">${escHtml(msg)}</div>` : '';
      }

      ['dragover'].forEach(ev => zoneEl.addEventListener(ev, e => { e.preventDefault(); zoneEl.classList.add('drag'); }));
      ['dragleave', 'drop'].forEach(ev => zoneEl.addEventListener(ev, e => { e.preventDefault(); zoneEl.classList.remove('drag'); }));
      zoneEl.addEventListener('drop', e => {
        if (e.dataTransfer && e.dataTransfer.files) handleFileList(e.dataTransfer.files);
      });
      filesEl.addEventListener('change', () => handleFileList(filesEl.files));

      async function handleFileList(fileList) {
        if (uploads.length + fileList.length > 10) { showErr('Maximum 10 files per report.'); return; }
        showErr('');
        for (const f of fileList) {
          if (f.size > 25 * 1024 * 1024) { showErr(`${f.name} is over 25 MB.`); continue; }
          await uploadOne(f);
        }
        filesEl.value = '';
      }

      async function uploadOne(file) {
        const session = (await window.db.auth.getSession()).data.session;
        if (!session) { showErr('Session expired. Please sign in again.'); return; }
        try {
          const r = await fetch('/api/studio-upload', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + session.access_token,
              'Content-Type':  file.type || 'application/octet-stream',
              'X-File-Name':   file.name,
              'X-File-Type':   file.type || 'application/octet-stream'
            },
            body: file
          });
          if (!r.ok) {
            const body = await r.json().catch(() => ({}));
            showErr(`Upload failed: ${body.error || r.status}`);
            return;
          }
          const body = await r.json();
          uploads.push({ path: body.path, name: body.name || file.name, size: body.size, mime: body.mime });
          renderUploads();
        } catch {
          showErr('Upload failed. Please retry.');
        }
      }

      generate.addEventListener('click', async () => {
        const topic = topicEl.value.trim();
        if (!topic) { showErr('Please describe the report brief.'); return; }
        if (topic.length > 600) { showErr('Brief is too long — keep it under 600 characters.'); return; }
        if (uploads.length === 0) {
          showErr('Please attach at least 1 source file. Studio writes from your uploads — autonomous web search is not enabled in this phase.');
          return;
        }

        // Client-side guard — server is the authority via 402 below.
        if (walletState && walletState.balance < walletState.report_cost) {
          showErr('Not enough credits. Please buy a pack first.');
          window.location.href = '/billing';
          return;
        }

        showErr('');
        generate.disabled = true;
        generate.textContent = 'Submitting…';

        try {
          const session = (await window.db.auth.getSession()).data.session;
          if (!session) throw new Error('no_session');
          const r = await fetch('/api/studio-jobs', {
            method: 'POST',
            headers: {
              'Content-Type':  'application/json',
              'Authorization': 'Bearer ' + session.access_token
            },
            body: JSON.stringify({
              topic_input: topic,
              uploaded_file_paths: uploads.map(u => u.path)
            })
          });

          // ── Phase O.9: 402 = insufficient credits, redirect to billing. ──
          if (r.status === 402) {
            const body = await r.json().catch(() => ({}));
            showErr(`Not enough credits — short by ${body.short_by ?? '?'}. Redirecting to billing…`);
            setTimeout(() => { window.location.href = '/billing'; }, 1200);
            return;
          }

          if (!r.ok) {
            const body = await r.json().catch(() => ({}));
            throw new Error(body.error || ('http_' + r.status));
          }
          const body = await r.json();
          if (!body.job_id) throw new Error('no_job_id');
          window.location.href = '/jobs?id=' + encodeURIComponent(body.job_id);
        } catch (err) {
          showErr('Could not start generation: ' + (err.message || err));
          generate.disabled = false;
          generate.textContent = 'Generate report →';
        }
      });
    }
  </script>
</body>
</html>
