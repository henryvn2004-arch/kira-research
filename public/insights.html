<script>
const EMOJI_MAP = { fintech:'💳', ecommerce:'🛍️', fmcg:'🧴', automotive:'🚗', healthtech:'🏥', logistics:'📦', edtech:'📚', real_estate:'🏢' };
const FLAG_MAP  = { Vietnam:'🇻🇳', Indonesia:'🇮🇩', Thailand:'🇹🇭', Philippines:'🇵🇭', Malaysia:'🇲🇾', Singapore:'🇸🇬' };

let allArticles = [], activeFilter = '', currentArticle = null;

// ── Load articles ─────────────────────────────────────────
async function loadInsights() {
  try {
    allArticles = await window.kiraDB.getInsights({ limit: 20 });
  } catch {
    allArticles = getSampleArticles();
  }
  renderList(allArticles);
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === (f || 'all'));
  });
  const filtered = f ? allArticles.filter(a => (a.industry || '').toLowerCase().includes(f)) : allArticles;
  renderList(filtered);
}

// ── Render list ───────────────────────────────────────────
function renderList(articles) {
  document.getElementById('view-list').style.display    = 'block';
  document.getElementById('view-article').style.display = 'none';

  const [featured, ...rest] = articles;

  // Featured
  const featSlot = document.getElementById('featured-slot');
  if (featured) {
    const emoji = EMOJI_MAP[featured.industry?.toLowerCase()] || '📊';
    featSlot.innerHTML = `
      <div class="featured-article" onclick="openArticle('${featured.slug}')">
        <div class="featured-img">${emoji}</div>
        <div class="featured-body">
          <div class="featured-label"><span class="new-dot"></span>${(featured.industry || 'market analysis').toUpperCase()}</div>
          <div class="featured-title">${featured.title}</div>
          <div class="featured-excerpt">${featured.content?.slice(0,280) || ''}</div>
          <div class="article-meta">
            <span>${FLAG_MAP[featured.country] || '🌏'} ${featured.country || 'Southeast Asia'}</span>
            <span class="meta-dot"></span>
            <span>${formatDate(featured.created_at)}</span>
            <span class="meta-dot"></span>
            <span>${readTime(featured.content)} min read</span>
          </div>
          <div class="read-more">Read article →</div>
        </div>
      </div>`;
  } else {
    featSlot.innerHTML = '';
  }

  // Grid
  const grid = document.getElementById('articles-grid');
  if (!rest.length) { grid.innerHTML = '<p style="color:#5A6278;font-size:13px;grid-column:span 3;text-align:center;padding:40px 0">No articles yet. Check back soon.</p>'; return; }

  grid.innerHTML = rest.map(a => {
    const emoji = EMOJI_MAP[a.industry?.toLowerCase()] || '📊';
    return `<div class="article-card" onclick="openArticle('${a.slug}')">
      <div class="article-card-img">${emoji}</div>
      <div class="article-card-body">
        <div class="article-industry">${(a.industry || '').toUpperCase()}</div>
        <div class="article-title">${a.title}</div>
        <div class="article-excerpt">${a.content?.slice(0,140) || ''}</div>
        <div class="article-foot">
          <span class="article-country">${FLAG_MAP[a.country] || '🌏'} ${a.country || 'SEA'}</span>
          <span>${readTime(a.content)} min read</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Open article ──────────────────────────────────────────
async function openArticle(slug) {
  let article = allArticles.find(a => a.slug === slug);

  if (!article) {
    try {
      article = await window.kiraDB.getInsightBySlug(slug);
    } catch { return; }
  }

  if (!article) return;
  currentArticle = article;

  // Update URL without reload
  history.pushState({ slug }, '', '/insights.html?slug=' + slug);

  document.getElementById('view-list').style.display    = 'none';
  document.getElementById('view-article').style.display = 'block';
  window.scrollTo(0, 0);

  document.getElementById('art-industry').textContent = (article.industry || '').toUpperCase();
  document.getElementById('art-title').textContent    = article.title;
  document.getElementById('art-date').textContent     = formatDate(article.created_at);
  document.getElementById('art-readtime').textContent = readTime(article.content) + ' min read';
  document.getElementById('art-body').innerHTML       = markdownToHtml(article.content || '');

  // Sidebar: related report
  const reportUrl = '/report.html';
  document.getElementById('sidebar-report-title').textContent = (article.industry || 'Market') + ' Market — ' + (article.country || 'Southeast Asia');
  document.getElementById('sidebar-report-desc').textContent  = 'Full 12-section analysis: market sizing, competitive landscape, consumer insights, and strategic recommendations.';
  document.getElementById('sidebar-cta').href = reportUrl + '?prefill_industry=' + encodeURIComponent(article.industry || '') + '&prefill_country=' + encodeURIComponent(article.country || '');

  // Related articles
  const related = allArticles.filter(a => a.slug !== slug && (a.industry === article.industry || a.country === article.country)).slice(0, 4);
  document.getElementById('related-list').innerHTML = related.map(r =>
    `<div class="related-item" onclick="openArticle('${r.slug}')">${r.title}</div>`
  ).join('') || '<span style="font-size:12px;color:#5A6278">No related articles yet</span>';
}

function goBack() {
  history.pushState({}, '', '/insights.html');
  renderList(activeFilter ? allArticles.filter(a => (a.industry||'').toLowerCase().includes(activeFilter)) : allArticles);
}

window.addEventListener('popstate', () => {
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (slug) openArticle(slug); else goBack();
});

// ── Helpers ───────────────────────────────────────────────
function formatDate(d) {
  if (!d) return '2026';
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function readTime(text) {
  return Math.max(1, Math.round((text || '').split(' ').length / 200));
}

function markdownToHtml(text) {
  return text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[h|u|l])(.+)$/gm, (m) => m.startsWith('<') ? m : '<p>' + m + '</p>');
}

function getSampleArticles() {
  return [
    { slug:'vietnam-fintech-2026', title:'Vietnam Fintech 2026: What\'s Driving the Next Wave of Digital Payment Growth', industry:'fintech', country:'Vietnam', created_at: new Date().toISOString(), content:`## Executive Overview\n\nVietnam\'s fintech sector is entering a new phase of maturity, moving beyond the early-stage cashless promotion era into a more competitive, consolidation-driven market.\n\n## Key Trends\n\nThe market is being shaped by three converging forces: regulatory tightening on e-wallets, aggressive super-app expansion, and the growing importance of B2B payment infrastructure.\n\n**QR Code standardization** completed in 2024 has fundamentally changed merchant acquisition economics. What previously required proprietary hardware now requires only a printed QR code, collapsing the cost of merchant onboarding by an estimated 70%.\n\n## Competitive Dynamics\n\nMoMo retains market leadership in consumer-facing digital wallets with an estimated 35% share of active users. However, ZaloPay\'s integration with Zalo\'s 74 million users gives it a structural distribution advantage that pure-play wallets cannot easily replicate.\n\n## What This Means for Entrants\n\nFor foreign fintech players, the window for standalone wallet plays is largely closed. The opportunity lies in infrastructure — payment processing, lending APIs, and embedded finance solutions for the country\'s 900,000+ SMEs.` },
    { slug:'indonesia-ecommerce-2026', title:'Indonesia E-Commerce 2026: The Battle for Tier-2 Cities', industry:'ecommerce', country:'Indonesia', created_at: new Date(Date.now() - 86400000*2).toISOString(), content:`## Market Context\n\nIndonesia\'s e-commerce market has reached maturity in Java\'s major cities. The next phase of growth — and the next competitive battleground — is in tier-2 and tier-3 cities across Sumatra, Kalimantan, and Sulawesi.\n\n## The Logistics Challenge\n\nLast-mile delivery costs in non-Java markets remain the primary structural barrier. Shipping a 1kg package from Jakarta to Medan costs approximately 3x the equivalent in Java, fundamentally limiting price competitiveness for physical goods.\n\n## TikTok Shop\'s Disruptive Impact\n\nTikTok Shop\'s live-streaming commerce model has proven particularly effective in tier-2 markets, where entertainment and commerce blend naturally. Estimated GMV reached $8 billion in 2025, driven largely by fashion, beauty, and FMCG categories.` },
    { slug:'thailand-fmcg-2026', title:'Thailand FMCG 2026: Health & Wellness Is Reshaping Shelf Space', industry:'fmcg', country:'Thailand', created_at: new Date(Date.now() - 86400000*4).toISOString(), content:`## Overview\n\nThailand\'s packaged food market is undergoing its most significant structural shift in a decade, as health and wellness positioning moves from premium niche to mainstream expectation.\n\n## The Wellness Premium\n\nProducts with functional health claims command 20–40% price premiums over conventional equivalents and are growing at 12–15% annually versus 3–4% for standard categories. This is not a premium-only phenomenon — mass market players are reformulating core products to reduce sugar, sodium, and artificial additives.\n\n## Modern Trade Evolution\n\nConvenience stores, led by 7-Eleven\'s 14,000+ outlets, are evolving from transaction points into daily lifestyle touchpoints. Fresh food, meal solutions, and health products now account for a growing share of 7-Eleven\'s revenue mix.` },
    { slug:'sea-ev-2026', title:'Southeast Asia EV 2026: Which Markets Are Actually Ready?', industry:'automotive', country:'Vietnam', created_at: new Date(Date.now() - 86400000*6).toISOString(), content:`## Regional Overview\n\nSoutheast Asia\'s EV market recorded approximately 180,000 unit registrations across all vehicle types in 2025. The headline number masks significant variation by market maturity, infrastructure readiness, and policy environment.\n\n## Thailand: The Manufacturing Bet\n\nThailand is positioning itself as Southeast Asia\'s EV manufacturing hub, leveraging its established automotive supply chain. BYD, Great Wall Motor, and SAIC have all committed to local production, attracted by the EV 3.5 incentive package.\n\n## Vietnam: Two-Wheel Dominance\n\nVietnam leads the region in two-wheel EV penetration, driven almost entirely by VinFast\'s aggressive pricing and distribution. The four-wheel market remains nascent outside of Hanoi and Ho Chi Minh City.` },
    { slug:'philippines-healthtech-2026', title:'Philippines Digital Health 2026: Infrastructure Gap as Opportunity', industry:'healthtech', country:'Philippines', created_at: new Date(Date.now() - 86400000*8).toISOString(), content:`## Market Snapshot\n\nThe Philippines\' digital health market is growing at 24% annually from a low base, driven by a fundamental mismatch between healthcare demand and physical infrastructure supply.\n\n## The Geography Argument\n\nWith 7,600 islands and specialist care concentrated in Metro Manila, the Philippines presents the strongest structural case for telemedicine in Southeast Asia. A patient in Cebu seeking specialist consultation faces a choice between a 2-hour flight and a 20-minute video call.\n\n## Regulatory Developments\n\nThe FDA\'s digital health framework, updated in 2025, has clarified approval pathways for software as a medical device (SaMD), reducing regulatory uncertainty for health tech entrants.` },
