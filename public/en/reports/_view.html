<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Report — KIRA RESEARCH</title>
  <meta name="description" content="Market intelligence report from KIRA RESEARCH." />

  <link rel="canonical" id="meta-canonical" href="https://kiraresearch.com/en/" />

  <!-- Open Graph + Twitter Card defaults; overridden per-report by updateHead() once data loads. -->
  <meta property="og:type"        content="article" />
  <meta property="og:site_name"   content="KIRA RESEARCH" />
  <meta property="og:title"       id="meta-og-title"       content="Report — KIRA RESEARCH" />
  <meta property="og:description" id="meta-og-description" content="Market intelligence report from KIRA RESEARCH." />
  <meta property="og:url"         id="meta-og-url"         content="https://kiraresearch.com/" />
  <meta property="og:image"       id="meta-og-image"       content="https://kiraresearch.com/logo.png" />
  <meta property="og:locale"      id="meta-og-locale"      content="en_US" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       id="meta-tw-title"       content="Report — KIRA RESEARCH" />
  <meta name="twitter:description" id="meta-tw-description" content="Market intelligence report from KIRA RESEARCH." />
  <meta name="twitter:image"       id="meta-tw-image"       content="https://kiraresearch.com/logo.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="/css/kira.css" />

  <!-- Supabase client + kiraAuth (for purchase state) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>

  <style>
    .rpt-loading, .rpt-404 { padding: 96px 0; text-align: center; color: var(--muted); }
    .rpt-404 h2 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 800; font-size: 28px;
      color: var(--text); margin-bottom: 14px;
    }

    .rpt-fallback-banner {
      background: rgba(30,111,255,0.08);
      border: 1px solid rgba(30,111,255,0.25);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px; color: var(--muted);
      margin-bottom: 32px;
    }
    .rpt-fallback-banner strong { color: var(--text); }

    .rpt-cancel-banner {
      background: rgba(180, 100, 50, 0.1);
      border: 1px solid rgba(180, 100, 50, 0.3);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px; color: var(--muted);
      margin-bottom: 24px;
    }
    .rpt-capturing {
      padding: 28px;
      background: var(--surface);
      border: 1px solid var(--primary);
      border-radius: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* Owned state — full content section + download */
    .rpt-owned-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(30,111,255,0.12);
      color: var(--primary);
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .rpt-owned-tag::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary);
    }
    .rpt-full-body {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .rpt-full-body h2 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 800;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: var(--text);
      margin: 40px 0 16px;
    }
    .rpt-full-body h3 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
      margin: 32px 0 12px;
    }
    .rpt-full-body p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .rpt-full-body p strong { color: var(--text); }
    .pdf-download-btn {
      display: block;
      width: 100%;
      padding: 14px 18px;
      text-align: center;
      background: var(--surface-2);
      border: 1px solid var(--primary);
      border-radius: 4px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    .pdf-download-btn:hover { background: var(--primary); }
    .pdf-pending {
      padding: 14px;
      background: var(--surface-2);
      border: 1px dashed var(--border-strong);
      border-radius: 4px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    .buy-btn:disabled { opacity: 0.5; cursor: wait; }
  </style>
</head>
<body>

  <!-- nav + footer injected by /js/nav.js -->

  <div class="container rpt-page" id="rpt-root">
    <div class="rpt-loading">Loading report…</div>
  </div>

  <!-- Unlock modal — shown when user clicks a LOCKED section in the TOC. -->
  <div id="unlock-modal" class="unlock-modal-overlay" hidden>
    <div class="unlock-modal-card" role="dialog" aria-modal="true" aria-labelledby="unlock-modal-title">
      <button class="unlock-modal-close" id="unlock-modal-close" aria-label="Close">×</button>
      <div class="unlock-modal-eyebrow">Locked Section</div>
      <h3 id="unlock-modal-title">Section</h3>
      <p id="unlock-modal-body">This section is part of the full report. Unlock the complete PDF + online reader access.</p>
      <button class="buy-btn" id="unlock-modal-buy">Unlock full report →</button>
      <div class="unlock-modal-footnote">Single-user license · Free updates for 12 months</div>
    </div>
  </div>

  <script src="/js/nav.js" defer></script>
  <script src="/js/i18n.js" defer></script>

  <script type="module">
    // ── 1) URL parsing ───────────────────────────────────
    const parts  = window.location.pathname.split('/').filter(Boolean);
    const locale = ['en','ja','ko'].includes(parts[0]) ? parts[0] : 'en';
    const slug   = parts[2] ? parts[2].replace(/\/$/, '') : '';
    const qs     = new URLSearchParams(window.location.search);
    const paypalReturn = qs.get('paypal');     // 'success' or 'cancel'
    const paypalToken  = qs.get('token');      // PayPal order id when returning

    document.documentElement.setAttribute('lang', locale);

    // Preview iframe geometry. Source HTML is authored at 1280×720 per page
    // (matches the PDF). 5 pages × 720px = 3600px tall. Declared up here so
    // renderPreviewFrame() and fitPreviewFrame() — both called from render()
    // — can reference them without hitting the TDZ.
    const PREVIEW_PAGE_W = 1280;
    const PREVIEW_PAGE_H = 720;
    const PREVIEW_PAGES  = 5;

    const root = document.getElementById('rpt-root');

    if (!slug) {
      root.innerHTML = '<div class="rpt-404"><h2>No report selected</h2><p><a href="/' + locale + '/library" style="color:var(--primary)">Back to library →</a></p></div>';
      // Stop module execution.
      throw new Error('halt');
    }

    // Wait for kiraAuth (auth.js is a classic <script>).
    while (!window.kiraAuth) await new Promise(r => setTimeout(r, 20));

    // ── 2) Capture PayPal return BEFORE anything else ────
    // Doing this first means the user lands on the unlocked view directly
    // instead of seeing the preview flash, then a swap.
    let captureResult = null;
    if (paypalReturn === 'success' && paypalToken) {
      root.innerHTML = '<div class="rpt-capturing"><strong style="color:var(--text);">Finalising your purchase…</strong><br/>Please don\'t close this tab.</div>';
      captureResult = await capturePurchase(paypalToken);
      // Strip query string from URL so refresh doesn't re-capture.
      const cleanUrl = window.location.pathname;
      window.history.replaceState({}, '', cleanUrl);
    }

    // ── 3) Fetch report base + (if logged in) verify purchase ───
    let data;
    try {
      const r = await fetch('/api/library-report?slug=' + encodeURIComponent(slug) + '&locale=' + locale);
      if (r.status === 404) {
        root.innerHTML =
          '<div class="rpt-404">' +
            '<h2>Report not found</h2>' +
            '<p>The report <code style="color:var(--primary)">' + escapeHtml(slug) + '</code> isn\'t in the library yet.</p>' +
            '<p style="margin-top:18px;"><a href="/' + locale + '/library" style="color:var(--primary)">Back to library →</a></p>' +
          '</div>';
        throw new Error('halt');
      }
      if (!r.ok) throw new Error('http ' + r.status);
      data = await r.json();
    } catch (err) {
      if (err && err.message === 'halt') throw err;
      root.innerHTML = '<div class="rpt-404"><h2>Couldn\'t load report</h2><p>Please retry or browse the <a href="/' + locale + '/library" style="color:var(--primary)">library</a>.</p></div>';
      throw new Error('halt');
    }

    // ── 4) Check purchase state + fetch full content if owned ──
    let purchaseState = { purchased: false, anyLocale: false };
    let fullContent   = null;
    const user = await window.kiraAuth.getUser();
    if (user) {
      purchaseState = await verifyPurchase(data.slug, locale);
      if (purchaseState.purchased) {
        fullContent = await fetchFullContent(data.slug, locale);
      }
    }

    // ── 5) Meta + hreflang ───────────────────────────────
    updateHead(data);

    // ── 6) Render ────────────────────────────────────────
    render(data, purchaseState, fullContent, captureResult);

    if (window.kira && window.kira.i18n) window.kira.i18n.apply();

    // ══════════════════════════════════════════════════════
    //  Auth / purchase helpers
    // ══════════════════════════════════════════════════════
    async function bearerHeaders() {
      const session = (await window.db.auth.getSession()).data.session;
      return session ? { 'Authorization': 'Bearer ' + session.access_token } : {};
    }

    async function verifyPurchase(slug, locale) {
      try {
        const r = await fetch('/api/library-verify?slug=' + encodeURIComponent(slug) + '&locale=' + locale, {
          headers: await bearerHeaders()
        });
        if (!r.ok) return { purchased: false, anyLocale: false };
        return await r.json();
      } catch (_) {
        return { purchased: false, anyLocale: false };
      }
    }

    async function fetchFullContent(slug, locale) {
      try {
        const r = await fetch('/api/library-content?slug=' + encodeURIComponent(slug) + '&locale=' + locale, {
          headers: await bearerHeaders()
        });
        if (!r.ok) return null;
        return await r.json();
      } catch (_) { return null; }
    }

    async function capturePurchase(orderId) {
      // Capture REQUIRES the user to be signed in. If they aren't, prompt
      // login first and pass the order through sessionStorage so we can
      // resume the capture once they're back.
      const session = (await window.db.auth.getSession()).data.session;
      if (!session) {
        sessionStorage.setItem('kira_pending_capture', orderId);
        sessionStorage.setItem('kira_redirect_after_login', window.location.pathname);
        window.location.href = '/auth.html?msg=' + encodeURIComponent('Sign in to finalise your purchase');
        throw new Error('redirecting_to_login');
      }
      try {
        const r = await fetch('/api/library-buy?action=capture', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
          body:    JSON.stringify({ orderId })
        });
        const body = await r.json();
        return { ok: r.ok, ...body };
      } catch (err) {
        return { ok: false, error: 'network' };
      }
    }

    async function startCheckout(slug, locale) {
      // Require login first — capture step needs auth anyway.
      const user = await window.kiraAuth.getUser();
      if (!user) {
        sessionStorage.setItem('kira_redirect_after_login', window.location.pathname);
        window.location.href = '/auth.html?msg=' + encodeURIComponent('Sign in to purchase this report');
        return;
      }
      try {
        const r = await fetch('/api/library-buy?action=create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify({ slug, locale })
        });
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          alert('Could not start checkout (' + (body.error || r.status) + ').');
          return;
        }
        const body = await r.json();
        if (body.approveUrl) {
          window.location.href = body.approveUrl;
        } else {
          alert('Checkout error: no approval URL returned.');
        }
      } catch (err) {
        alert('Network error starting checkout. Please retry.');
      }
    }

    // ══════════════════════════════════════════════════════
    //  Render helpers
    // ══════════════════════════════════════════════════════
    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function updateHead(d) {
      const base = 'https://kiraresearch.com';
      const url  = base + '/' + locale + '/reports/' + d.slug;
      const fullTitle = (d.title || 'Report') + ' — KIRA RESEARCH';
      const description = (d.preview && d.preview.lede)
        ? d.preview.lede.slice(0, 200)
        : 'Market intelligence report from KIRA RESEARCH.';
      // og:locale uses underscore region format. x-default reports → en_US.
      const ogLocale = { en: 'en_US', ja: 'ja_JP', ko: 'ko_KR' }[locale] || 'en_US';

      document.title = fullTitle;
      document.getElementById('meta-canonical').href = url;

      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', description);

      // ── OG + Twitter ────────────────────────────────────
      setMetaContent('meta-og-title',       fullTitle);
      setMetaContent('meta-og-description', description);
      setMetaContent('meta-og-url',         url);
      setMetaContent('meta-og-locale',      ogLocale);
      setMetaContent('meta-tw-title',       fullTitle);
      setMetaContent('meta-tw-description', description);

      // ── hreflang ────────────────────────────────────────
      ['en','ja','ko'].forEach(loc => {
        if (d.availableLocales.includes(loc)) {
          const link = document.createElement('link');
          link.rel = 'alternate'; link.hreflang = loc;
          link.href = base + '/' + loc + '/reports/' + d.slug;
          document.head.appendChild(link);
        }
      });
      const xdef = document.createElement('link');
      xdef.rel = 'alternate'; xdef.hreflang = 'x-default';
      xdef.href = base + '/en/reports/' + d.slug;
      document.head.appendChild(xdef);

      // ── JSON-LD: Product + BreadcrumbList ───────────────
      injectJsonLd('ld-product', {
        '@context':    'https://schema.org',
        '@type':       'Product',
        name:          d.title || d.slug,
        description,
        url,
        sku:           d.slug,
        category:      [d.industry, d.country].filter(Boolean).join(' · ') || 'Market Research',
        brand: {
          '@type': 'Organization',
          name:    'KIRA RESEARCH'
        },
        offers: {
          '@type':         'Offer',
          price:           String(d.price || 39),
          priceCurrency:   'USD',
          availability:    'https://schema.org/InStock',
          url
        }
      });

      const crumbs = [
        { name: 'KIRA RESEARCH',   item: base + '/' + locale + '/' },
        { name: 'Library',         item: base + '/' + locale + '/library' }
      ];
      if (d.country)  crumbs.push({ name: d.country,  item: base + '/' + locale + '/library?country='  + d.country.toLowerCase() });
      if (d.industry) crumbs.push({ name: d.industry, item: base + '/' + locale + '/library?industry=' + d.industry.toLowerCase().replace(/[^a-z0-9]+/g, '-') });
      crumbs.push({ name: d.title || d.slug, item: url });

      injectJsonLd('ld-breadcrumb', {
        '@context':        'https://schema.org',
        '@type':           'BreadcrumbList',
        itemListElement:   crumbs.map((c, i) => ({
          '@type':    'ListItem',
          position:   i + 1,
          name:       c.name,
          item:       c.item
        }))
      });
    }

    function setMetaContent(id, value) {
      const el = document.getElementById(id);
      if (el) el.setAttribute('content', value || '');
    }

    function injectJsonLd(id, payload) {
      // Idempotent: replace if already present (re-render after locale fallback).
      let el = document.getElementById(id);
      if (!el) {
        el = document.createElement('script');
        el.type = 'application/ld+json';
        el.id   = id;
        document.head.appendChild(el);
      }
      el.textContent = JSON.stringify(payload);
    }

    function renderChart(c) {
      if (!c || !Array.isArray(c.bars) || !c.bars.length) return '';
      const bars = c.bars.map(b => {
        const pct = Math.max(0, Math.min(100, Number(b.pct) || 0));
        return '<div class="chart-bar" data-label="' + escapeHtml(b.label) +
               '" data-value="' + escapeHtml(b.value) +
               '" style="height:' + pct + '%;"></div>';
      }).join('');
      return (
        '<div class="chart-card">' +
          '<div class="chart-head">' +
            '<span class="chart-title">' + escapeHtml(c.title || '') + '</span>' +
            (c.subtitle ? '<span class="chart-subtitle">' + escapeHtml(c.subtitle) + '</span>' : '') +
          '</div>' +
          '<div class="chart-bars">' + bars + '</div>' +
        '</div>'
      );
    }

    // Sprint 8 — internal linking. Show up to 3 related insights at the bottom of
    // the report. Drives discovery + extra organic surface area. Cards link to
    // /<locale>/insights/<slug> via the same path users get from /insights/.
    function renderRelatedInsights(items) {
      if (!Array.isArray(items) || !items.length) return '';
      const cards = items.map(it => {
        const tagLabel = [it.country, it.industry].filter(Boolean)
          .map(s => s.toUpperCase()).join(' · ');
        return (
          '<a href="/' + locale + '/insights/' + encodeURIComponent(it.slug) + '" class="rpt-insight-card">' +
            '<div class="rpt-insight-meta">' +
              '<span class="cat">' + escapeHtml(tagLabel || 'FIELD NOTE') + '</span>' +
              (it.read_time ? '<span>' + escapeHtml(it.read_time.toUpperCase()) + '</span>' : '') +
            '</div>' +
            '<h3>' + escapeHtml(it.title || it.slug) + '</h3>' +
            (it.excerpt ? '<p>' + escapeHtml(it.excerpt) + '</p>' : '') +
            '<div class="rpt-insight-cta">Read field note →</div>' +
          '</a>'
        );
      }).join('');
      const intro = items.length > 1
        ? "Short reads from our analyst desk on the topics this report covers — sourced field signals, not generated content."
        : "A short read from our analyst desk on a topic this report covers.";
      return (
        '<section class="rpt-related-insights">' +
          '<h4>Field notes from this market</h4>' +
          '<p class="rpt-related-intro">' + intro + '</p>' +
          '<div class="rpt-related-grid">' + cards + '</div>' +
        '</section>'
      );
    }

    function renderToc(toc, ownsContent) {
      if (!Array.isArray(toc) || !toc.length) return '';
      const items = toc.map(t => {
        const isPreview        = t.locked === false;
        const isLockable       = !ownsContent && !isPreview;
        const isPreviewScroll  = !ownsContent && isPreview;
        const interactive      = isLockable || isPreviewScroll;
        // .preview = blue-tinted (free or owned); .lockable = clickable, opens modal;
        // .preview-scroll = clickable, scrolls to the iframe preview above.
        let cls = '';
        if (ownsContent || isPreview) cls += ' preview';
        if (isLockable)               cls += ' lockable';
        if (isPreviewScroll)          cls += ' preview-scroll';
        const tag = interactive ? 'button' : 'div';
        const typeAttr = interactive ? ' type="button"' : '';
        const dataAttr = isLockable
          ? ' data-section="' + escapeHtml(t.name) + '"'
          : '';
        return '<' + tag + ' class="toc-item' + cls + '"' + typeAttr + dataAttr + '>' +
                 '<span class="num">' + escapeHtml(t.num) + '</span>' +
                 '<span class="name">' + escapeHtml(t.name) + '</span>' +
                 '<span class="pages">' + escapeHtml(t.pages || '') + '</span>' +
               '</' + tag + '>';
      }).join('');
      return (
        '<div class="toc">' +
          '<h4>Table of Contents · ' + toc.length + ' Sections</h4>' +
          items +
        '</div>'
      );
    }

    function renderPreviewFrame(d, currentLocale) {
      const src = '/api/preview-html?slug=' + encodeURIComponent(d.slug) +
                  '&locale=' + encodeURIComponent(currentLocale);
      const totalH = PREVIEW_PAGE_H * PREVIEW_PAGES;
      const price  = d.price || 39;
      return (
        '<section class="rpt-preview-section">' +
          '<div class="rpt-preview-eyebrow">Inside the report · Pages 1–' + PREVIEW_PAGES + '</div>' +
          '<div class="rpt-preview-frame" data-w="' + PREVIEW_PAGE_W +
                                       '" data-h="' + totalH + '">' +
            '<iframe src="' + src + '" ' +
                    'title="Report preview — first ' + PREVIEW_PAGES + ' pages" ' +
                    'loading="lazy" ' +
                    'referrerpolicy="same-origin"></iframe>' +
            '<div class="rpt-preview-fade" aria-hidden="true"></div>' +
            '<div class="rpt-preview-cta">' +
              '<div class="rpt-preview-cta-lede">Continue reading the full report</div>' +
              '<button class="buy-btn" id="preview-buy-btn">' +
                'Unlock full report — $' + price + ' →' +
              '</button>' +
            '</div>' +
          '</div>' +
        '</section>'
      );
    }

    function fitPreviewFrame() {
      document.querySelectorAll('.rpt-preview-frame').forEach(wrap => {
        const iframe = wrap.querySelector('iframe');
        if (!iframe) return;
        const w = Number(wrap.dataset.w) || PREVIEW_PAGE_W;
        const scale = wrap.clientWidth / w;
        iframe.style.transform = 'scale(' + scale + ')';
      });
    }

    // Cross-sell: up to 3 other reports matching country/industry/year. Loaded
    // from /api/library-report (relatedReports key). Cards link to the full
    // report page in the same locale.
    function renderRelatedReports(items) {
      if (!Array.isArray(items) || !items.length) return '';
      const cards = items.map(it => {
        const tagLabel = [it.country, it.industry].filter(Boolean)
          .map(s => s.toUpperCase()).join(' · ');
        const yearStr  = it.year ? String(it.year) : '';
        return (
          '<a href="/' + locale + '/reports/' + encodeURIComponent(it.slug) + '" class="rpt-report-card">' +
            '<div class="rpt-report-meta">' +
              '<span class="cat">' + escapeHtml(tagLabel || 'REPORT') + '</span>' +
              (yearStr ? '<span>' + escapeHtml(yearStr) + '</span>' : '') +
            '</div>' +
            '<h3>' + escapeHtml(it.title || it.slug) + '</h3>' +
            '<div class="rpt-report-foot">' +
              '<span class="rpt-report-price">$' + (it.price || 39) + '</span>' +
              '<span class="rpt-report-cta">Read report →</span>' +
            '</div>' +
          '</a>'
        );
      }).join('');
      const intro = items.length > 1
        ? "Adjacent markets and years our analysts cover — same depth, different angles."
        : "Another market our analysts cover at the same depth.";
      return (
        '<section class="rpt-related-reports">' +
          '<h4>Related reports</h4>' +
          '<p class="rpt-related-intro">' + intro + '</p>' +
          '<div class="rpt-related-grid">' + cards + '</div>' +
        '</section>'
      );
    }

    function renderLangSwitcher(slug, currentLocale, available) {
      const labels = { en: 'EN', ja: '日本語', ko: '한국어' };
      const links = ['en','ja','ko'].map(loc => {
        const isActive = loc === currentLocale;
        const isPublished = available.includes(loc);
        const cls =
          (loc === 'ja' ? 'lang-ja' : loc === 'ko' ? 'lang-ko' : '') +
          (isActive ? ' active' : '') +
          (!isPublished ? ' disabled' : '');
        const href = isPublished ? ('/' + loc + '/reports/' + slug) : '#';
        const titleAttr = isPublished ? '' : ' title="Not yet available in this language"';
        return '<a href="' + href + '" class="' + cls.trim() + '"' +
               (isPublished ? '' : ' aria-disabled="true" onclick="return false"') +
               titleAttr + '>' + labels[loc] + '</a>';
      }).join('');
      return '<span class="label">Lang</span>' + links;
    }

    function renderFullBody(full) {
      if (!full) return '';

      // full_content is JSONB. Shape: { sections: [{ heading, body_html }, ...] }
      // OR a single HTML blob. Be defensive against both.
      if (typeof full === 'string') {
        return '<section class="rpt-full-body">' + full + '</section>';
      }
      const sections = Array.isArray(full.sections) ? full.sections : [];
      if (!sections.length) {
        return '<section class="rpt-full-body"><p style="color:var(--muted-dim);font-style:italic;">' +
               'Full content is being prepared. The PDF download (if available) contains the complete report.' +
               '</p></section>';
      }
      const blocks = sections.map(s => {
        const heading = s.heading ? '<h2>' + escapeHtml(s.heading) + '</h2>' : '';
        // body_html is admin-trusted (writable only via service-key).
        const body = s.body_html || '';
        return '<section>' + heading + body + '</section>';
      }).join('');
      return '<div class="rpt-full-body">' + blocks + '</div>';
    }

    function renderBuyBox(d, state) {
      const pages = d.pages || 78;
      const aggregators = (d.aggregators || []).slice(0, 5);

      // State variants:
      //   purchased            → green tag, PDF download (if pdf_url), no buy button
      //   anyLocale (not this) → "switch language" notice + buy locale button
      //   default (anon/new)   → normal buy button
      let mainCta;
      if (state.purchased) {
        mainCta =
          (state.pdfUrl
            ? '<a class="pdf-download-btn" href="' + escapeHtml(state.pdfUrl) + '" download>Download PDF →</a>'
            : '<div class="pdf-pending">PDF is being prepared.<br/>You\'ll see a download link here once it\'s ready — your online access is active now.</div>'
          );
      } else if (state.anyLocale) {
        mainCta =
          '<div class="pdf-pending" style="margin-bottom:12px;">You already own this report in <strong style="color:var(--primary);text-transform:uppercase;">' + escapeHtml(state.ownedLocale || 'EN') + '</strong>.</div>' +
          '<button class="buy-btn" id="buy-btn">Add ' + locale.toUpperCase() + ' version — $' + (d.price || 39) + ' →</button>';
      } else {
        mainCta = '<button class="buy-btn" id="buy-btn">Purchase report →</button>';
      }

      const tag = state.purchased
        ? '<div class="rpt-owned-tag">You own this report</div>'
        : '<div class="buy-tag">Single report · PDF + online access</div>';

      return (
        '<aside class="buy-box">' +
          tag +
          '<div class="buy-price"><span class="currency">$</span>' + (d.price || 39) + '</div>' +
          '<div class="buy-lang-select" aria-label="Report language">' +
            renderLangSwitcher(d.slug, locale, d.availableLocales || []) +
          '</div>' +
          mainCta +
          (state.purchased ? '' : '<button class="buy-btn-secondary">Add to library bundle</button>') +
          '<div class="buy-includes">' +
            '<h6>What\'s included</h6>' +
            '<div class="include-item">' + pages + '-page PDF download</div>' +
            '<div class="include-item">Online reader access</div>' +
            '<div class="include-item">All charts &amp; data tables</div>' +
            '<div class="include-item">Free updates for 12 months</div>' +
            '<div class="include-item">Single-user license</div>' +
          '</div>' +
          (aggregators.length
            ? '<div class="buy-includes"><h6>Also available on</h6><div class="buy-aggregators">' +
                aggregators.map(escapeHtml).join('<br />') +
              '</div></div>'
            : '') +
        '</aside>'
      );
    }

    function render(d, purchaseState, fullContent, captureResult) {
      const baseCountry = (d.country || '').toUpperCase();
      const breadcrumb = (
        '<div class="rpt-breadcrumb">' +
          '<a href="/' + locale + '/library">Library</a> → ' +
          (d.country ? '<a href="/' + locale + '/library?country=' + d.country.toLowerCase() + '">' + escapeHtml(d.country) + '</a> → ' : '') +
          (d.industry ? '<a href="/' + locale + '/library?industry=' + d.industry.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '">' + escapeHtml(d.industry) + '</a> → ' : '') +
          '<span>' + escapeHtml(d.title || d.slug) + '</span>' +
        '</div>'
      );

      const eyebrow = d.eyebrow ||
        [baseCountry, (d.industry || '').toUpperCase(), 'MARKET ANALYSIS']
          .filter(Boolean).join(' · ');

      // ── Banners ──
      let banners = '';
      if (captureResult) {
        if (captureResult.ok) {
          banners += '<div class="rpt-fallback-banner" style="background:rgba(30,111,255,0.12);border-color:rgba(30,111,255,0.4);">' +
                       '<strong>Purchase complete.</strong> Your full report is unlocked below.' +
                     '</div>';
        } else {
          banners += '<div class="rpt-cancel-banner">' +
                       '<strong style="color:var(--text);">We couldn\'t finalise your purchase.</strong> ' +
                       'Please retry from the buy box on the right, or email <a href="mailto:hello@kiraresearch.com" style="color:var(--primary);">hello@kiraresearch.com</a> with your PayPal receipt.' +
                     '</div>';
        }
      } else if (paypalReturn === 'cancel') {
        banners += '<div class="rpt-cancel-banner">Checkout cancelled — your card was not charged.</div>';
      }
      if (d.isFallback) {
        banners += '<div class="rpt-fallback-banner">This report isn\'t published in your selected language yet — showing the <strong>English version</strong>.</div>';
      }
      if (purchaseState.anyLocale && !purchaseState.purchased) {
        // Already owned in another locale message lives in the buy box; nothing here.
      }

      // ── Preview body ──
      const lede   = d.preview?.lede ? '<p><strong>' + escapeHtml(d.preview.lede) + '</strong></p>' : '';
      const paras  = Array.isArray(d.preview?.paragraphs)
        ? d.preview.paragraphs.map(p => '<p>' + escapeHtml(p) + '</p>').join('')
        : '';
      const chart  = renderChart(d.preview?.chart);
      const toc    = renderToc(d.toc, !!purchaseState.purchased);

      // Full body (only if purchased)
      const fullBody = purchaseState.purchased ? renderFullBody(fullContent && fullContent.full_content) : '';

      const pages    = d.pages || 78;
      const sections = (d.toc && d.toc.length) || 12;
      const refresh  = d.last_refresh
        ? new Date(d.last_refresh).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
        : '—';
      const published = d.published_at
        ? new Date(d.published_at).toLocaleDateString('en-GB', { month:'long', year:'numeric' })
        : '—';

      root.innerHTML = (
        breadcrumb +
        '<div class="rpt-grid">' +
          '<article class="rpt-main">' +
            banners +
            '<div class="hero-eyebrow" style="margin-bottom:20px;">' + escapeHtml(eyebrow) + '</div>' +
            '<h1>' + escapeHtml(d.title || d.slug) + '</h1>' +
            '<div class="rpt-meta">' +
              '<div class="rpt-meta-item"><div class="label">Published</div><div class="val">' + escapeHtml(published) + '</div></div>' +
              '<div class="rpt-meta-item"><div class="label">Pages</div><div class="val">' + pages + '</div></div>' +
              '<div class="rpt-meta-item"><div class="label">Format</div><div class="val">PDF</div></div>' +
              '<div class="rpt-meta-item"><div class="label">Sections</div><div class="val">' + sections + '</div></div>' +
              '<div class="rpt-meta-item"><div class="label">Last Refresh</div><div class="val">' + escapeHtml(refresh) + '</div></div>' +
              '<div class="rpt-meta-item"><div class="label">Analyst</div><div class="val">Our research team</div></div>' +
            '</div>' +

            '<section class="rpt-section">' +
              '<h3>Section 01 · Executive Summary</h3>' +
              '<h2>' + (purchaseState.purchased ? 'Overview' : 'Preview') + '</h2>' +
              lede + paras + chart +
            '</section>' +

            (purchaseState.purchased ? '' : renderPreviewFrame(d, locale)) +

            toc +

            fullBody +

            renderRelatedInsights(d.relatedInsights) +

            renderRelatedReports(d.relatedReports) +
          '</article>' +

          renderBuyBox(d, {
            purchased:   purchaseState.purchased,
            anyLocale:   purchaseState.anyLocale,
            ownedLocale: purchaseState.ownedLocale,
            pdfUrl:      fullContent && fullContent.pdf_url
          }) +
        '</div>'
      );

      // Wire purchase button (only if not already owned).
      const buyBtn = document.getElementById('buy-btn');
      if (buyBtn) {
        buyBtn.addEventListener('click', () => {
          buyBtn.disabled = true;
          buyBtn.textContent = 'Opening checkout…';
          startCheckout(d.slug, locale);
        });
      }

      // Wire LOCKED TOC rows → unlock modal. PREVIEW rows stay as plain text
      // (rendered as <div>, not <button>) so they don't intercept clicks.
      wireUnlockModal(d, purchaseState);

      // Wire preview iframe scale-fit + the inline CTA button under it.
      fitPreviewFrame();
      window.addEventListener('resize', fitPreviewFrame);
      const previewBuyBtn = document.getElementById('preview-buy-btn');
      if (previewBuyBtn) {
        previewBuyBtn.addEventListener('click', () => {
          previewBuyBtn.disabled = true;
          previewBuyBtn.textContent = 'Opening checkout…';
          startCheckout(d.slug, locale);
        });
      }
    }

    function wireUnlockModal(d, purchaseState) {
      const modal     = document.getElementById('unlock-modal');
      const closeBtn  = document.getElementById('unlock-modal-close');
      const buyBtn    = document.getElementById('unlock-modal-buy');
      const titleEl   = document.getElementById('unlock-modal-title');
      const bodyEl    = document.getElementById('unlock-modal-body');
      if (!modal || !closeBtn || !buyBtn || !titleEl || !bodyEl) return;

      const price = d.price || 39;
      const pages = d.pages || 78;

      function openModal(sectionName) {
        titleEl.textContent = sectionName || 'Locked section';
        bodyEl.innerHTML =
          'This section is part of the full report. Unlock the complete <strong>' +
          pages + '-page PDF</strong> + online reader access for <strong>$' +
          price + '</strong>.';
        modal.hidden = false;
        document.body.style.overflow = 'hidden';
        closeBtn.focus();
      }
      function closeModal() {
        modal.hidden = true;
        document.body.style.overflow = '';
      }

      document.querySelectorAll('.toc-item.lockable').forEach(el => {
        el.addEventListener('click', () => openModal(el.dataset.section));
      });
      // Preview rows scroll up to the iframe preview block.
      document.querySelectorAll('.toc-item.preview-scroll').forEach(el => {
        el.addEventListener('click', () => {
          const target = document.querySelector('.rpt-preview-section');
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
      closeBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', e => {
        if (e.target === modal) closeModal();
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && !modal.hidden) closeModal();
      });

      buyBtn.addEventListener('click', () => {
        if (purchaseState.purchased) { closeModal(); return; }
        buyBtn.disabled = true;
        buyBtn.textContent = 'Opening checkout…';
        startCheckout(d.slug, locale);
      });
    }
  </script>
</body>
</html>
