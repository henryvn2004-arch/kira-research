<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Insights — KIRA RESEARCH</title>
  <meta name="description" content="Field notes and analyst commentary on Southeast Asia markets — payments, FMCG, logistics, healthtech, energy." />

  <!-- hreflang -->
  <link rel="alternate" hreflang="en" href="https://kiraresearch.com/en/insights/" />
  <link rel="alternate" hreflang="ja" href="https://kiraresearch.com/ja/insights/" />
  <link rel="alternate" hreflang="ko" href="https://kiraresearch.com/ko/insights/" />
  <link rel="alternate" hreflang="x-default" href="https://kiraresearch.com/en/insights/" />
  <link rel="canonical" href="https://kiraresearch.com/en/insights/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Insights — KIRA RESEARCH" />
  <meta property="og:description" content="Field notes from senior analysts covering Southeast Asia markets." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kiraresearch.com/en/insights/" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="/css/kira.css" />
</head>
<body>

  <!-- nav + footer injected by /js/nav.js -->

  <div class="container">

    <!-- ── PAGE HERO ───────────────────────────────────── -->
    <header class="lib-header">
      <div class="hero-eyebrow" data-i18n="insights.eyebrow">INSIGHTS</div>
      <h1 data-i18n="insights.title">Field notes from our analyst desk.</h1>
      <p data-i18n="insights.sub">Short reads on what's changing across Southeast Asia — markets we cover, signals we're tracking, methodology we use. Free to read.</p>
    </header>

    <!-- ── CATEGORY FILTER ─────────────────────────────── -->
    <nav class="insights-cats" aria-label="Insight categories">
      <a href="#" class="active" data-i18n="insights.catAll">All</a>
      <a href="#" data-cat="vietnam">Vietnam</a>
      <a href="#" data-cat="indonesia">Indonesia</a>
      <a href="#" data-cat="thailand">Thailand</a>
      <a href="#" data-cat="philippines">Philippines</a>
      <a href="#" data-cat="fintech">Fintech</a>
      <a href="#" data-cat="fmcg">FMCG</a>
      <a href="#" data-cat="logistics">Logistics</a>
      <a href="#" data-cat="methodology" data-i18n="insights.catMethod">Methodology</a>
    </nav>

    <!-- ── FEATURED + GRID (rendered dynamically) ──────── -->
    <div id="insights-root">
      <div class="insight-empty">Loading insights…</div>
    </div>

  </div>

  <style>
    .insight-empty {
      padding: 96px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .insight-card.disabled, .insight-featured.disabled {
      pointer-events: none;
      opacity: 0.6;
    }
    .insight-card .badge-cs {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>

  <script src="/js/nav.js" defer></script>
  <script src="/js/i18n.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const root   = document.getElementById('insights-root');
      const cats   = document.querySelectorAll('.insights-cats a');
      const locale = (window.kira && window.kira.locale) || 'en';
      const PAGE_SIZE = 12;
      let activeCat = '';
      let page      = 1;

      // ── Hydrate active category + page from URL (?cat=foo&page=N) ──
      const params = new URLSearchParams(window.location.search);
      const initCat = params.get('cat');
      if (initCat) {
        activeCat = initCat.toLowerCase();
        cats.forEach(a => {
          a.classList.toggle('active',
            (a.dataset.cat || '').toLowerCase() === activeCat ||
            (!a.dataset.cat && !activeCat));
        });
      }
      const initPage = parseInt(params.get('page'), 10);
      if (initPage && initPage > 0) page = initPage;

      // ── Chip clicks (reset to page 1) ──
      cats.forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          cats.forEach(o => o.classList.remove('active'));
          a.classList.add('active');
          activeCat = (a.dataset.cat || '').toLowerCase();
          page = 1;
          syncUrl();
          fetchAndRender();
        });
      });

      // ── Back/forward navigation ──
      window.addEventListener('popstate', () => {
        const p = new URLSearchParams(window.location.search);
        activeCat = (p.get('cat') || '').toLowerCase();
        page = Math.max(1, parseInt(p.get('page'), 10) || 1);
        cats.forEach(a => {
          a.classList.toggle('active',
            (a.dataset.cat || '').toLowerCase() === activeCat ||
            (!a.dataset.cat && !activeCat));
        });
        fetchAndRender();
      });

      function syncUrl() {
        const p = new URLSearchParams();
        if (activeCat) p.set('cat', activeCat);
        if (page > 1)  p.set('page', String(page));
        const qs = p.toString();
        const url = window.location.pathname + (qs ? '?' + qs : '');
        window.history.pushState({}, '', url);
      }

      async function fetchAndRender() {
        root.innerHTML = '<div class="insight-empty">Loading…</div>';
        const qs = new URLSearchParams();
        qs.set('locale', locale);
        qs.set('limit',  String(PAGE_SIZE));
        qs.set('offset', String((page - 1) * PAGE_SIZE));
        if (activeCat) qs.set('category', activeCat);

        try {
          const r = await fetch('/api/insights-list?' + qs.toString());
          if (!r.ok) throw new Error('http ' + r.status);
          const data = await r.json();
          render(data.items || [], data.total || 0);
        } catch (err) {
          root.innerHTML = '<div class="insight-empty">Couldn\'t load insights. Please retry.</div>';
        }
      }

      function render(items, total) {
        if (!items.length) {
          root.innerHTML = '<div class="insight-empty">No insights match this filter yet.</div>';
          return;
        }

        const html = [];

        if (page === 1) {
          // Page 1: featured + rest as grid.
          const featured = items.find(it => it.featured) || items[0];
          const rest     = items.filter(it => it.slug !== featured.slug);
          html.push(renderFeatured(featured));
          if (rest.length) {
            html.push('<div class="insights-grid">');
            rest.forEach(it => html.push(renderCard(it)));
            html.push('</div>');
          }
        } else {
          // Page 2+: plain grid, no featured.
          html.push('<div class="insights-grid">');
          items.forEach(it => html.push(renderCard(it)));
          html.push('</div>');
        }

        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (totalPages > 1) html.push(renderPager(totalPages));

        root.innerHTML = html.join('');

        // Wire pager buttons.
        const prev = root.querySelector('.insights-pager .pager-prev');
        const next = root.querySelector('.insights-pager .pager-next');
        if (prev) prev.addEventListener('click', (e) => { e.preventDefault(); goTo(page - 1); });
        if (next) next.addEventListener('click', (e) => { e.preventDefault(); goTo(page + 1); });
      }

      function goTo(n) {
        page = Math.max(1, n);
        syncUrl();
        fetchAndRender();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function renderPager(totalPages) {
        const prevDisabled = page <= 1 ? ' disabled' : '';
        const nextDisabled = page >= totalPages ? ' disabled' : '';
        return (
          '<nav class="insights-pager" aria-label="Pagination">' +
            '<a href="#" class="pager-prev' + prevDisabled + '"' +
              (prevDisabled ? ' aria-disabled="true"' : '') + '>← Previous</a>' +
            '<span class="pager-status">Page ' + page + ' of ' + totalPages + '</span>' +
            '<a href="#" class="pager-next' + nextDisabled + '"' +
              (nextDisabled ? ' aria-disabled="true"' : '') + '>Next →</a>' +
          '</nav>'
        );
      }

      function renderFeatured(it) {
        const cat = buildCatLabel(it);
        const meta = [formatDate(it.published_at), it.read_time].filter(Boolean).join(' · ');
        const title = it.title || humanize(it.slug);
        const excerpt = it.excerpt || '';
        return (
          '<a href="' + articleHref(it.slug) + '" class="insight-featured' + (it.hasTranslation ? '' : ' disabled') + '">' +
            '<div class="insight-featured-img">' +
              '<span class="ifi-tag">' + escapeHtml(cat || 'INSIGHT') + '</span>' +
            '</div>' +
            '<div class="insight-featured-body">' +
              '<div class="insight-meta">' +
                '<span class="cat">FEATURED</span>' +
                '<span>' + escapeHtml(meta || '—') + '</span>' +
              '</div>' +
              '<h2>' + escapeHtml(title) + '</h2>' +
              (excerpt ? '<p class="insight-excerpt">' + escapeHtml(excerpt) + '</p>' : '') +
              '<div class="insight-footer">' +
                '<span>BY OUR RESEARCH TEAM</span>' +
                '<span class="read">' + (it.hasTranslation ? 'READ →' : 'TRANSLATING…') + '</span>' +
              '</div>' +
            '</div>' +
          '</a>'
        );
      }

      function renderCard(it) {
        const cat = buildCatLabel(it);
        const date = formatDate(it.published_at);
        const title = it.title || humanize(it.slug);
        const excerpt = it.excerpt || '';
        const readTime = it.read_time || '';
        return (
          '<a href="' + articleHref(it.slug) + '" class="insight-card' + (it.hasTranslation ? '' : ' disabled') + '">' +
            '<div class="insight-meta">' +
              '<span class="cat">' + escapeHtml(cat || 'INSIGHT') + '</span>' +
              '<span>' + escapeHtml(date) + '</span>' +
            '</div>' +
            '<h3>' + escapeHtml(title) + '</h3>' +
            (excerpt ? '<p class="insight-excerpt">' + escapeHtml(excerpt) + '</p>' : '') +
            '<div class="insight-footer">' +
              '<span>' + escapeHtml(readTime || '—') + '</span>' +
              '<span class="read">' + (it.hasTranslation ? 'READ →' : 'TRANSLATING…') + '</span>' +
            '</div>' +
          '</a>'
        );
      }

      function articleHref(slug) {
        return '/' + locale + '/insights/' + encodeURIComponent(slug);
      }

      function buildCatLabel(it) {
        const parts = [];
        if (it.country)  parts.push(it.country.toUpperCase());
        if (it.industry) parts.push(it.industry.toUpperCase());
        if (!parts.length && it.category) parts.push(it.category.toUpperCase());
        return parts.join(' · ');
      }

      function formatDate(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('en-US', { month: 'short', year: 'numeric' }).toUpperCase();
      }

      function humanize(slug) {
        return String(slug || '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      fetchAndRender();
    });
  </script>
</body>
</html>
