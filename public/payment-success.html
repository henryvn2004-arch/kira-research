<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Processing — KIRA RESEARCH</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script src="/nav.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0D10;color:#fff;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,111,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(30,111,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
    .card{background:#11151C;border:1px solid #242A35;border-radius:16px;padding:48px 40px;width:100%;max-width:440px;text-align:center;position:relative;z-index:1}
    .icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:28px}
    .icon.processing{background:rgba(30,111,255,.15);border:2px solid rgba(30,111,255,.3);animation:pulse 1.5s ease-in-out infinite}
    .icon.success{background:rgba(56,217,150,.12);border:2px solid rgba(56,217,150,.3)}
    .icon.error{background:rgba(229,62,62,.1);border:2px solid rgba(229,62,62,.25)}
    .icon.cancelled{background:rgba(163,169,182,.1);border:2px solid rgba(163,169,182,.25)}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(30,111,255,.3)}50%{box-shadow:0 0 0 12px rgba(30,111,255,0)}}
    h2{font-size:22px;font-weight:700;margin-bottom:8px}
    p{font-size:14px;color:#A3A9B6;line-height:1.6;margin-bottom:0}
    .progress{margin:24px 0;height:3px;background:#1A1D24;border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:#1E6FFF;border-radius:2px;width:0;transition:width .6s ease}
    .step-list{text-align:left;margin:24px 0;display:flex;flex-direction:column;gap:8px}
    .step-row{display:flex;align-items:center;gap:12px;font-size:13px;color:#5A6278;padding:8px 12px;border-radius:6px;transition:all .3s}
    .step-row.active{color:#fff;background:rgba(30,111,255,.08)}
    .step-row.done{color:#38D996}
    .step-dot{width:8px;height:8px;border-radius:50%;background:#242A35;flex-shrink:0}
    .step-row.done .step-dot{background:#38D996}
    .step-row.active .step-dot{background:#1E6FFF;animation:pulse-dot 1s ease-in-out infinite}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
    .btn{display:inline-block;margin-top:24px;padding:12px 28px;background:#1E6FFF;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:Arial,sans-serif;text-decoration:none}
    .btn:hover{background:#1558CC}
    .btn-ghost{display:inline-block;margin-top:12px;padding:10px 24px;background:transparent;color:#A3A9B6;border:1px solid #242A35;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;text-decoration:none}
    .btn-ghost:hover{border-color:#A3A9B6;color:#fff}
    .error-msg{background:rgba(229,62,62,.08);border:1px solid rgba(229,62,62,.2);border-radius:8px;padding:12px;font-size:13px;color:#FC8181;margin-top:16px}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon processing" id="status-icon">⚡</div>
    <h2 id="status-title">Processing payment...</h2>
    <p id="status-sub">Please wait while we confirm your payment.</p>

    <div class="progress" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="step-list" id="step-list">
      <div class="step-row active" id="step-confirm">
        <div class="step-dot"></div>
        <span>Confirming payment with PayPal</span>
      </div>
      <div class="step-row" id="step-save">
        <div class="step-dot"></div>
        <span>Saving your purchase</span>
      </div>
      <div class="step-row" id="step-redirect">
        <div class="step-dot"></div>
        <span>Starting report generation</span>
      </div>
    </div>

    <div id="error-area"></div>
  </div>

  <script>
    // ── Route map: slug prefix → tool page ──────────────────
    // Covers all 3 live tools + legacy slugs from old report types
    const ROUTE_MAP = {
      // Market Analysis (report.html)
      'market':       '/report.html',
      'industry':     '/report.html',
      'competitive':  '/report.html',
      'customer':     '/report.html',
      'value':        '/report.html',
      'pricing':      '/report.html',
      'partner':      '/report.html',
      // Strategy Builder
      'strategy':     '/strategy-builder.html',
      'go':           '/strategy-builder.html',
      'proposition':  '/strategy-builder.html',
      'gtm':          '/strategy-builder.html',
      // Doc Intelligence
      'doc':          '/docreport.html',
      'document':     '/docreport.html',
      // Library
      'living':       '/library.html',
    };

    function getReturnPage(slug) {
      const prefix = (slug || '').toLowerCase().split('-')[0];
      return ROUTE_MAP[prefix] || '/report.html';
    }

    function setStep(name) {
      const steps = ['confirm', 'save', 'redirect'];
      const idx   = steps.indexOf(name);
      steps.forEach((s, i) => {
        const el = document.getElementById('step-' + s);
        el.classList.remove('active', 'done');
        if (i < idx)  el.classList.add('done');
        if (i === idx) el.classList.add('active');
      });
      const pct = name === 'confirm' ? '20%' : name === 'save' ? '60%' : '90%';
      document.getElementById('progress-fill').style.width = pct;
    }

    function showError(msg) {
      document.getElementById('status-icon').textContent = '✕';
      document.getElementById('status-icon').className   = 'icon error';
      document.getElementById('status-title').textContent = 'Payment Error';
      document.getElementById('status-sub').textContent   = 'Something went wrong. Please try again or contact support.';
      document.getElementById('step-list').style.display  = 'none';
      document.getElementById('progress-bar').style.display = 'none';
      document.getElementById('error-area').innerHTML =
        `<div class="error-msg">${msg}</div>
         <a href="/" class="btn">Return Home</a>`;
    }

    function showCancelled(returnPage) {
      document.getElementById('status-icon').textContent = '↩';
      document.getElementById('status-icon').className   = 'icon cancelled';
      document.getElementById('status-title').textContent = 'Payment cancelled';
      document.getElementById('status-sub').textContent   = 'Your payment was cancelled. No charge was made.';
      document.getElementById('step-list').style.display  = 'none';
      document.getElementById('progress-bar').style.display = 'none';
      document.getElementById('error-area').innerHTML =
        `<a href="${returnPage}" class="btn">Try Again</a>
         <br><a href="/" class="btn-ghost">Return Home</a>`;
    }

    async function processPayment() {
      const params = new URLSearchParams(window.location.search);
      const type   = params.get('type');   // 'topup' | undefined (report purchase)
      const token  = params.get('token');  // PayPal order ID
      const slug   = params.get('slug');
      const userId = params.get('userId') || '';

      // ── Cancelled flow ────────────────────────────────────
      if (params.get('cancelled') === '1') {
        showCancelled(slug ? getReturnPage(slug) : '/pricing.html');
        return;
      }

      // ── CREDIT TOP-UP FLOW ────────────────────────────────
      if (type === 'topup') {
        const credits = params.get('credits');

        // Update steps for topup context
        document.getElementById('step-confirm').querySelector('span').textContent = 'Confirming payment with PayPal';
        document.getElementById('step-save').querySelector('span').textContent    = 'Adding credits to your account';
        document.getElementById('step-redirect').querySelector('span').textContent = 'Done!';

        if (!token) {
          return showError('No payment token found. Please try again.');
        }

        try {
          setStep('confirm');
          const r = await fetch('/api/credits?action=capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ orderId: token, userId, credits }),
          });
          const d = await r.json();
          if (!d.success) throw new Error(d.error || 'Capture failed');

          setStep('save');
          await new Promise(r => setTimeout(r, 600));

          setStep('redirect');
          document.getElementById('progress-fill').style.width = '100%';

          // Show success state
          document.getElementById('status-icon').textContent = '✓';
          document.getElementById('status-icon').className   = 'icon success';
          document.getElementById('status-title').textContent = `${credits} credits added!`;
          document.getElementById('status-sub').textContent   = `Your balance is now ${d.balance} credits.`;
          document.getElementById('step-list').style.display  = 'none';
          document.getElementById('error-area').innerHTML =
            `<a href="/profile.html" class="btn">View My Account</a>
             <br><a href="/report.html" class="btn-ghost">Generate a Report</a>`;

        } catch (e) {
          showError(e.message);
        }
        return;
      }

      // ── REPORT PAYMENT FLOW (legacy / future use) ─────────
      const returnPage = getReturnPage(slug);

      if (!token) {
        document.getElementById('status-icon').textContent = '✕';
        document.getElementById('status-icon').className   = 'icon error';
        document.getElementById('status-title').textContent = 'No payment found';
        document.getElementById('status-sub').textContent   = 'Redirecting you back...';
        document.getElementById('step-list').style.display  = 'none';
        setTimeout(() => window.location.href = returnPage || '/', 2500);
        return;
      }

      if (!slug) {
        return showError('Missing report reference. Please try again from the report page.');
      }

      try {
        setStep('confirm');
        const captureRes = await fetch('/api/payment?action=capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: token, slug, userId }),
        });
        const captureData = await captureRes.json();
        if (!captureData.success) throw new Error(captureData.error || 'Capture failed');

        setStep('save');
        await new Promise(r => setTimeout(r, 600));

        setStep('redirect');
        document.getElementById('progress-fill').style.width = '100%';
        await new Promise(r => setTimeout(r, 500));

        window.location.href = `${returnPage}?unlocked=1&slug=${encodeURIComponent(slug)}`;

      } catch (e) {
        showError(e.message);
      }
    }

    processPayment();
  </script>
</body>
</html>
