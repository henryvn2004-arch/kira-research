<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — KIRA RESEARCH</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script src="/js/nav.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#FFFFFF;color:#0F172A;font-family:'Satoshi',-apple-system,BlinkMacSystemFont,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,111,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(30,111,255,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;opacity:0.5}
    a{color:inherit;text-decoration:none}

    .card{background:#FFFFFF;border:1px solid #E5E7EB;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 12px 32px rgba(15,23,42,0.08)}

    .logo{display:flex;justify-content:center;margin-bottom:32px}
    .logo img{height:32px;width:auto}

    .tabs{display:flex;background:#F7F8FA;border-radius:8px;padding:4px;margin-bottom:32px;gap:4px}
    .tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:#94A3B8;transition:all .2s;border:none;background:transparent;font-family:inherit}
    .tab.active{background:#FFFFFF;color:#0F172A;box-shadow:0 1px 2px rgba(15,23,42,0.06)}

    label{display:block;font-size:12px;color:#475569;margin-bottom:6px;letter-spacing:.02em;font-weight:500}
    .field{margin-bottom:20px}
    input{width:100%;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:8px;padding:11px 14px;font-size:14px;color:#0F172A;font-family:inherit;transition:border-color .2s;outline:none}
    input:focus{border-color:#1E6FFF}
    input::placeholder{color:#94A3B8}

    .btn-submit{width:100%;padding:13px;background:#1E6FFF;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:4px}
    .btn-submit:hover{background:#1558CC;box-shadow:0 4px 12px rgba(15,23,42,0.08)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}

    .btn-google{width:100%;padding:11px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-google:hover{background:#f8f9fa;box-shadow:0 1px 3px rgba(15,23,42,0.08)}

    .divider{text-align:center;font-size:12px;color:#94A3B8;margin:20px 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#E5E7EB}
    .divider::before{left:0}
    .divider::after{right:0}

    .error{background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);border-radius:8px;padding:12px 14px;font-size:13px;color:#C0392B;margin-bottom:20px;display:none}
    .success{background:rgba(34,139,90,.06);border:1px solid rgba(34,139,90,.2);border-radius:8px;padding:12px 14px;font-size:13px;color:#1F7A4F;margin-bottom:20px;display:none}

    .footer-note{text-align:center;font-size:12px;color:#94A3B8;margin-top:24px}
    .footer-note a{color:#1E6FFF}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo.png" alt="KIRA RESEARCH" />
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="msg-error" class="error"></div>
    <div id="msg-success" class="success"></div>

    <!-- Sign In Form -->
    <div id="form-signin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="you@company.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="••••••••" />
      </div>
      <button class="btn-submit" id="btn-signin" onclick="handleSignIn()">Sign In</button>

      <div class="divider">or</div>
      <button class="btn-google" onclick="handleGoogleSignIn()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- Sign Up Form -->
    <div id="form-signup" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@company.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 8 characters" />
      </div>
      <button class="btn-submit" id="btn-signup" onclick="handleSignUp()">Create Account</button>

      <div class="divider">or</div>
      <button class="btn-google" onclick="handleGoogleSignIn()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="footer-note">
      <a href="/">← Back to home</a>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      clearMessages();
    }

    function showError(msg) {
      const el = document.getElementById('msg-error');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('msg-success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('msg-success');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('msg-error').style.display = 'none';
    }

    function clearMessages() {
      document.getElementById('msg-error').style.display = 'none';
      document.getElementById('msg-success').style.display = 'none';
    }

    async function handleGoogleSignIn() {
      try {
        await window.kiraAuth.signInWithGoogle();
        // Page will redirect to Google — nothing else needed here
      } catch (e) {
        showError(e.message || 'Google sign-in failed. Please try again.');
      }
    }

    async function handleSignIn() {
      const email    = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const btn      = document.getElementById('btn-signin');
      if (!email || !password) return showError('Please fill in all fields.');

      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        await window.kiraAuth.signIn(email, password);
        const redirect = sessionStorage.getItem('kira_redirect_after_login') || '/';
        sessionStorage.removeItem('kira_redirect_after_login');
        window.location.href = redirect;
      } catch (e) {
        showError(e.message || 'Sign in failed. Please try again.');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function handleSignUp() {
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const btn      = document.getElementById('btn-signup');
      if (!email || !password) return showError('Please fill in all fields.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');

      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        await window.kiraAuth.signUp(email, password);
        showSuccess('Account created! Check your email to confirm, then sign in.');
        btn.disabled = false; btn.textContent = 'Create Account';
      } catch (e) {
        showError(e.message || 'Sign up failed. Please try again.');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    // If already logged in, redirect to stored path (or home)
    window.kiraAuth.getUser().then(user => {
      if (user) {
        const redirect = sessionStorage.getItem('kira_redirect_after_login') || '/';
        sessionStorage.removeItem('kira_redirect_after_login');
        window.location.href = redirect;
      }
    });

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const activeTab = document.getElementById('tab-signin').classList.contains('active');
      activeTab ? handleSignIn() : handleSignUp();
    });
  </script>
</body>
</html>
