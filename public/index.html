<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KIRA RESEARCH — Southeast Asia Market Intelligence</title>
  <meta name="description" content="Country-specialist market research for Southeast Asia. Senior analysts, modern delivery." />

  <!-- hreflang for crawlers -->
  <link rel="alternate" hreflang="en" href="https://kiraresearch.com/en/" />
  <link rel="alternate" hreflang="ja" href="https://kiraresearch.com/ja/" />
  <link rel="alternate" hreflang="ko" href="https://kiraresearch.com/ko/" />
  <link rel="alternate" hreflang="x-default" href="https://kiraresearch.com/en/" />

  <!-- Default redirect for crawlers / no-JS clients -->
  <meta http-equiv="refresh" content="0;url=/en/" />
  <link rel="canonical" href="https://kiraresearch.com/en/" />

  <style>
    html, body {
      margin: 0;
      background: #FFFFFF;
      color: #475569;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader {
      text-align: center;
      letter-spacing: 0.08em;
      font-size: 14px;
    }
    .loader strong {
      display: block;
      color: #0F172A;
      font-size: 22px;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    .loader em {
      font-style: normal;
      color: #1E6FFF;
      transform: skewX(-8deg);
      display: inline-block;
    }
    .loader a { color: #1E6FFF; text-decoration: none; margin: 0 6px; }
    .loader a:hover { text-decoration: underline; }
    .loader .muted { color: #94A3B8; }
  </style>
</head>
<body>
  <div class="loader">
    <strong>KIR<em>A</em> RESEARCH</strong>
    <span class="muted">Redirecting…</span>
    <p style="margin-top:24px;font-size:12px;">
      <a href="/en/">English</a> ·
      <a href="/ja/">日本語</a> ·
      <a href="/ko/">한국어</a>
    </p>
  </div>

  <script>
    (function () {
      var SUPPORTED = ['en', 'ja', 'ko'];

      // 1) Honor an explicit ?lang= override (used by lang-switch links).
      var qs = new URLSearchParams(window.location.search);
      var qLang = qs.get('lang');
      if (qLang && SUPPORTED.indexOf(qLang) !== -1) {
        window.location.replace('/' + qLang + '/');
        return;
      }

      // 2) Honor a previously stored choice.
      var stored = null;
      try { stored = localStorage.getItem('kira:locale'); } catch (e) {}
      if (stored && SUPPORTED.indexOf(stored) !== -1) {
        window.location.replace('/' + stored + '/');
        return;
      }

      // 3) Sniff navigator.languages (Accept-Language equivalent on the client).
      var langs = (navigator.languages && navigator.languages.length)
        ? navigator.languages
        : [navigator.language || 'en'];

      var picked = 'en';
      for (var i = 0; i < langs.length; i++) {
        var two = (langs[i] || '').slice(0, 2).toLowerCase();
        if (SUPPORTED.indexOf(two) !== -1) { picked = two; break; }
      }

      window.location.replace('/' + picked + '/');
    })();
  </script>
</body>
</html>
