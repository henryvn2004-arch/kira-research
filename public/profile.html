<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Reports — KIRA RESEARCH</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0D10;color:#fff;font-family:Arial,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,111,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(30,111,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:1px solid #1A1D24;background:rgba(11,13,16,.9);backdrop-filter:blur(16px)}
    .nav-inner{max-width:1120px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo img{height:32px;width:auto;display:block}
    .nav-links{display:flex;align-items:center;gap:24px}
    .nav-links a{font-size:13px;color:#A3A9B6;transition:color .2s}.nav-links a:hover{color:#fff}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:Arial,sans-serif}
    .btn-ghost{background:transparent;color:#A3A9B6}.btn-ghost:hover{color:#fff}
    .btn-primary{background:#1E6FFF;color:#fff}.btn-primary:hover{background:#1558CC}
    .container{max-width:1000px;margin:0 auto;padding:0 32px;position:relative;z-index:1}
    .page{padding-top:96px;padding-bottom:80px;min-height:100vh}

    /* header */
    .profile-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:16px}
    .profile-left{display:flex;align-items:center;gap:16px}
    .avatar{width:48px;height:48px;border-radius:50%;background:rgba(30,111,255,.2);border:2px solid rgba(30,111,255,.3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#1E6FFF;flex-shrink:0}
    .profile-name{font-size:20px;font-weight:700}
    .profile-email{font-size:13px;color:#5A6278}

    /* stats */
    .stats-row{display:flex;gap:16px;margin-bottom:40px;flex-wrap:wrap}
    .stat-card{background:#11151C;border:1px solid #1A1D24;border-radius:10px;padding:20px 24px;flex:1;min-width:140px}
    .stat-val{font-size:28px;font-weight:700;color:#fff}
    .stat-lbl{font-size:11px;color:#5A6278;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

    /* tabs */
    .tabs{display:flex;gap:0;border-bottom:1px solid #1A1D24;margin-bottom:32px}
    .tab{padding:10px 20px;font-size:13px;font-weight:600;color:#5A6278;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
    .tab.active{color:#1E6FFF;border-bottom-color:#1E6FFF}
    .tab:hover{color:#A3A9B6}

    /* report cards */
    .reports-list{display:flex;flex-direction:column;gap:12px}
    .report-card{background:#11151C;border:1px solid #1A1D24;border-radius:12px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;transition:border-color .2s}
    .report-card:hover{border-color:#242A35}
    .report-card-left{flex:1;min-width:0}
    .report-type-badge{display:inline-flex;align-items:center;font-size:10px;color:#1E6FFF;background:rgba(30,111,255,.1);border:1px solid rgba(30,111,255,.2);padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .report-title{font-size:15px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .report-meta{font-size:12px;color:#5A6278;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .report-meta span{display:flex;align-items:center;gap:4px}
    .report-card-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .status-badge{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
    .status-completed{background:rgba(56,217,150,.1);color:#38D996;border:1px solid rgba(56,217,150,.2)}
    .status-generating{background:rgba(30,111,255,.1);color:#1E6FFF;border:1px solid rgba(30,111,255,.2)}
    .status-pending{background:rgba(163,169,182,.1);color:#A3A9B6;border:1px solid rgba(163,169,182,.2)}
    .btn-open{padding:8px 16px;font-size:12px;border-radius:6px;background:#1E6FFF;color:#fff;border:none;cursor:pointer;font-family:Arial,sans-serif;font-weight:600;transition:all .2s;white-space:nowrap}
    .btn-open:hover{background:#1558CC}

    /* empty state */
    .empty-state{text-align:center;padding:64px 24px}
    .empty-icon{font-size:40px;margin-bottom:16px;opacity:.4}
    .empty-title{font-size:18px;font-weight:600;margin-bottom:8px;color:#A3A9B6}
    .empty-sub{font-size:14px;color:#5A6278;margin-bottom:28px}

    /* loading */
    .skeleton{background:linear-gradient(90deg,#11151C 25%,#161B24 50%,#11151C 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    footer{border-top:1px solid #1A1D24;padding:40px 0;margin-top:40px}
    .footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .footer-links{display:flex;gap:28px}
    .footer-links a{font-size:12px;color:#5A6278;transition:color .2s}.footer-links a:hover{color:#A3A9B6}

    @media(max-width:700px){.report-card{flex-direction:column;align-items:flex-start}.nav-links{display:none}}
    @media(max-width:560px){.container{padding:0 20px}}
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo"><img src="/logo.png" alt="KIRA RESEARCH" /></a>
    <div class="nav-links">
      <a href="/report.html">Reports</a>
      <a href="/library.html">Library</a>
      <a href="/pricing.html">Pricing</a>
    </div>
    <div style="display:flex;gap:8px">
      <a href="/profile.html" class="btn btn-ghost" id="nav-profile" style="display:none">My Reports</a>
      <button class="btn btn-ghost" id="nav-signout" style="display:none">Sign out</button>
      <a href="/auth.html" class="btn btn-ghost" id="nav-signin">Sign in</a>
    </div>
  </div>
</nav>

<div class="page">
  <div class="container">

    <!-- Profile header -->
    <div class="profile-header">
      <div class="profile-left">
        <div class="avatar" id="avatar">—</div>
        <div>
          <div class="profile-name" id="profile-name">Loading...</div>
          <div class="profile-email" id="profile-email"></div>
        </div>
      </div>
      <a href="/report.html" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Report
      </a>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card skeleton" style="height:72px"></div>
      <div class="stat-card skeleton" style="height:72px"></div>
      <div class="stat-card skeleton" style="height:72px"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('all')">All Reports</div>
      <div class="tab" onclick="switchTab('custom')">Custom</div>
      <div class="tab" onclick="switchTab('library')">Library Purchases</div>
    </div>

    <!-- Reports list -->
    <div class="reports-list" id="reports-list">
      <!-- skeleton rows -->
      <div class="report-card skeleton" style="height:80px"></div>
      <div class="report-card skeleton" style="height:80px"></div>
      <div class="report-card skeleton" style="height:80px"></div>
    </div>

  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <img src="/logo.png" alt="KIRA RESEARCH" style="height:24px;opacity:.7" />
      <div class="footer-links">
        <a href="/pricing.html">Pricing</a>
        <a href="/library.html">Library</a>
        <a href="/contact.html">Contact</a>
      </div>
      <span style="font-size:11px;color:#5A6278">© 2026 KIRA RESEARCH</span>
    </div>
  </div>
</footer>

<script>
const SUPABASE_URL  = document.querySelector('script[src="/auth.js"]') ? null : null;
let allReports = [], currentTab = 'all';

const PAGE_MAP = {
  industry_deep_dive:     '/report.html',
  competitive_comparison: '/compare.html',
  market_entry_brief:     '/tracker.html',
};

const TYPE_LABEL = {
  industry_deep_dive:     'Industry Deep Dive',
  competitive_comparison: 'Competitive Analysis',
  market_entry_brief:     'Market Entry Brief',
};

async function loadProfile() {
  const user = await window.kiraAuth.requireAuth();
  if (!user) return;

  // Set profile header
  const email   = user.email || '';
  const initial = email.charAt(0).toUpperCase();
  document.getElementById('avatar').textContent       = initial;
  document.getElementById('profile-name').textContent = email.split('@')[0];
  document.getElementById('profile-email').textContent = email;

  // Load purchases + reports
  await loadReports(user);
}

async function loadReports(user) {
  // Use Supabase client directly
  const SUPABASE_URL  = 'https://YOUR_PROJECT.supabase.co'; // auto-filled from auth.js
  const SUPABASE_ANON = 'YOUR_ANON_KEY';

  // Fetch via API instead (avoids duplicating keys)
  try {
    const res  = await fetch('/api/get-my-reports', {
      headers: { 'Authorization': 'Bearer ' + (await window.kiraAuth.getSession())?.access_token }
    });
    const data = await res.json();
    allReports = data.reports || [];
    renderStats(allReports, data.purchases || []);
    renderReports('all');
  } catch (e) {
    // Fallback: show empty state
    renderStats([], []);
    renderReports('all');
  }
}

function renderStats(reports, purchases) {
  const completed = reports.filter(r => r.status === 'completed').length;
  const total     = purchases.length;
  const spent     = purchases.reduce((s, p) => s + Number(p.amount || 0), 0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${total}</div>
      <div class="stat-lbl">Total Reports</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${completed}</div>
      <div class="stat-lbl">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">$${spent.toFixed(0)}</div>
      <div class="stat-lbl">Total Spent</div>
    </div>`;
}

function renderReports(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['all','custom','library'][i] === tab);
  });

  let filtered = allReports;
  if (tab === 'custom')  filtered = allReports.filter(r => r.source === 'custom');
  if (tab === 'library') filtered = allReports.filter(r => r.source === 'library');

  const container = document.getElementById('reports-list');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📄</div>
        <div class="empty-title">No reports yet</div>
        <div class="empty-sub">Generate your first market intelligence report</div>
        <a href="/report.html" class="btn btn-primary">Generate a Report</a>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(r => {
    const p       = r.inputParams || {};
    const typeKey = r.reportType || r.report_type || '';
    const label   = TYPE_LABEL[typeKey] || 'Report';
    const page    = PAGE_MAP[typeKey] || '/report.html';
    const title   = p.industry
      ? (p.industry + (p.country ? ' — ' + p.country : ''))
      : (r.title || r.slug || 'Report');
    const date    = new Date(r.createdAt || r.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    const status  = r.status || 'completed';

    return `
      <div class="report-card">
        <div class="report-card-left">
          <div class="report-type-badge">${label}</div>
          <div class="report-title">${title}</div>
          <div class="report-meta">
            <span>📅 ${date}</span>
            ${p.country ? `<span>🌏 ${p.country}</span>` : ''}
          </div>
        </div>
        <div class="report-card-right">
          <span class="status-badge status-${status}">${status}</span>
          ${status === 'completed'
            ? `<a href="${page}?slug=${r.slug}" class="btn-open">Open Report →</a>`
            : status === 'generating'
            ? `<a href="${page}?slug=${r.slug}" class="btn-open">View Progress →</a>`
            : ''}
        </div>
      </div>`;
  }).join('');
}

function switchTab(tab) { renderReports(tab); }

window.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
