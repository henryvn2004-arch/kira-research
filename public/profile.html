<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Reports — KIRA RESEARCH</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script src="/nav.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0D10;color:#fff;font-family:Arial,sans-serif;font-size:15px;line-height:1.6}
    a{color:inherit;text-decoration:none}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,111,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(30,111,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

    .container{max-width:960px;margin:0 auto;padding:104px 32px 80px;position:relative;z-index:1}

    /* header */
    .profile-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:16px}
    .profile-left{display:flex;align-items:center;gap:16px}
    .avatar{width:48px;height:48px;border-radius:50%;background:rgba(30,111,255,.2);border:2px solid rgba(30,111,255,.3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#1E6FFF;flex-shrink:0}
    .profile-name{font-size:20px;font-weight:700}
    .profile-email{font-size:13px;color:#5A6278}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:Arial,sans-serif}
    .btn-primary{background:#1E6FFF;color:#fff}.btn-primary:hover{background:#1558CC}
    .btn-ghost{background:transparent;color:#A3A9B6;border:1px solid #242A35}.btn-ghost:hover{color:#fff;border-color:#A3A9B6}

    /* stats */
    .stats-row{display:flex;gap:16px;margin-bottom:40px;flex-wrap:wrap}
    .stat-card{background:#11151C;border:1px solid #1A1D24;border-radius:10px;padding:20px 24px;flex:1;min-width:140px}
    .stat-val{font-size:28px;font-weight:700;color:#fff}
    .stat-lbl{font-size:11px;color:#5A6278;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

    /* tabs */
    .tabs{display:flex;gap:0;border-bottom:1px solid #1A1D24;margin-bottom:32px}
    .tab{padding:10px 20px;font-size:13px;font-weight:600;color:#5A6278;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
    .tab.active{color:#1E6FFF;border-bottom-color:#1E6FFF}
    .tab:hover{color:#A3A9B6}

    /* report cards */
    .reports-list{display:flex;flex-direction:column;gap:12px}
    .report-card{background:#11151C;border:1px solid #1A1D24;border-radius:12px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;transition:border-color .2s}
    .report-card:hover{border-color:#242A35}
    .report-card-left{flex:1;min-width:0}
    .tool-badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:600}
    .tool-badge.blue{color:#1E6FFF;background:rgba(30,111,255,.1);border:1px solid rgba(30,111,255,.2)}
    .tool-badge.amber{color:#F6AD55;background:rgba(246,173,85,.1);border:1px solid rgba(246,173,85,.2)}
    .tool-badge.teal{color:#00C9A7;background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.2)}
    .report-title{font-size:15px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .report-meta{font-size:12px;color:#5A6278;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .report-card-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .status-badge{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
    .status-completed{background:rgba(56,217,150,.1);color:#38D996;border:1px solid rgba(56,217,150,.2)}
    .status-generating{background:rgba(30,111,255,.1);color:#1E6FFF;border:1px solid rgba(30,111,255,.2)}
    .status-pending,.status-researching{background:rgba(163,169,182,.1);color:#A3A9B6;border:1px solid rgba(163,169,182,.2)}
    .status-failed{background:rgba(229,62,62,.1);color:#FC8181;border:1px solid rgba(229,62,62,.2)}
    .btn-open{padding:8px 16px;font-size:12px;border-radius:6px;background:#1E6FFF;color:#fff;border:none;cursor:pointer;font-family:Arial,sans-serif;font-weight:600;transition:all .2s;white-space:nowrap;text-decoration:none}
    .btn-open:hover{background:#1558CC}

    /* empty */
    .empty-state{text-align:center;padding:64px 24px}
    .empty-icon{font-size:40px;margin-bottom:16px;opacity:.4}
    .empty-title{font-size:18px;font-weight:600;margin-bottom:8px;color:#A3A9B6}
    .empty-sub{font-size:14px;color:#5A6278;margin-bottom:28px}

    /* skeleton */
    .skeleton{background:linear-gradient(90deg,#11151C 25%,#161B24 50%,#11151C 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* signout */
    .account-section{margin-top:48px;padding-top:32px;border-top:1px solid #1A1D24;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .account-section p{font-size:13px;color:#5A6278}

    @media(max-width:700px){.report-card{flex-direction:column;align-items:flex-start}}
    @media(max-width:560px){.container{padding:88px 20px 60px}}
  </style>
</head>
<body>

<div class="container">

  <!-- Profile header -->
  <div class="profile-header">
    <div class="profile-left">
      <div class="avatar" id="avatar">—</div>
      <div>
        <div class="profile-name" id="profile-name">Loading...</div>
        <div class="profile-email" id="profile-email"></div>
      </div>
    </div>
    <a href="/report.html" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Report
    </a>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card skeleton" style="height:72px"></div>
    <div class="stat-card skeleton" style="height:72px"></div>
    <div class="stat-card skeleton" style="height:72px"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('all')">All Reports</div>
    <div class="tab" onclick="switchTab('market')">Market Analysis</div>
    <div class="tab" onclick="switchTab('strategy')">Strategy Builder</div>
    <div class="tab" onclick="switchTab('doc')">Doc Intelligence</div>
  </div>

  <!-- Reports list -->
  <div class="reports-list" id="reports-list">
    <div class="report-card skeleton" style="height:80px"></div>
    <div class="report-card skeleton" style="height:80px"></div>
    <div class="report-card skeleton" style="height:80px"></div>
  </div>

  <!-- Account section -->
  <div class="account-section">
    <p>Signed in as <span id="account-email" style="color:#A3A9B6"></span></p>
    <button class="btn btn-ghost" onclick="window.kiraAuth.signOut()">Sign Out</button>
  </div>

</div>

<script>
// ── Tool config ────────────────────────────────────────────
// Maps report_type → { label, page, toolKey, badgeClass }
const TOOL_MAP = {
  // Market Analysis types
  market_overview:         { label: 'Market Analysis',    page: '/report.html',           toolKey: 'market',   badge: 'blue' },
  competitive_analysis:    { label: 'Competitive Analysis', page: '/report.html',          toolKey: 'market',   badge: 'blue' },
  customer_intelligence:   { label: 'Customer Intelligence', page: '/report.html',         toolKey: 'market',   badge: 'blue' },
  value_chain:             { label: 'Value Chain',         page: '/report.html',           toolKey: 'market',   badge: 'blue' },
  go_to_market:            { label: 'Go-To-Market',        page: '/report.html',           toolKey: 'market',   badge: 'blue' },
  partner_search:          { label: 'Partner Search',      page: '/report.html',           toolKey: 'market',   badge: 'blue' },
  proposition_development: { label: 'Proposition Dev',     page: '/report.html',           toolKey: 'market',   badge: 'blue' },
  industry_deep_dive:      { label: 'Industry Deep Dive',  page: '/report.html',           toolKey: 'market',   badge: 'blue' },
  // Strategy Builder types
  strategy_builder:        { label: 'Strategy Builder',    page: '/strategy-builder.html', toolKey: 'strategy', badge: 'amber' },
  gtm_strategy:            { label: 'GTM Strategy',        page: '/strategy-builder.html', toolKey: 'strategy', badge: 'amber' },
  // Doc Intelligence types
  doc_intelligence:        { label: 'Doc Intelligence',    page: '/docreport.html',        toolKey: 'doc',      badge: 'teal' },
  document_analysis:       { label: 'Doc Analysis',        page: '/docreport.html',        toolKey: 'doc',      badge: 'teal' },
};

// Fallback: detect tool from slug prefix
function getToolFromSlug(slug) {
  const s = (slug || '').toLowerCase();
  if (s.startsWith('doc') || s.startsWith('document')) return 'doc';
  if (s.startsWith('strategy') || s.startsWith('gtm') || s.startsWith('go-')) return 'strategy';
  return 'market';
}

let allReports = [];
let currentTab = 'all';

async function loadProfile() {
  const user = await window.kiraAuth.requireAuth();
  if (!user) return;

  // Fill profile header
  const email   = user.email || '';
  document.getElementById('avatar').textContent        = email.charAt(0).toUpperCase();
  document.getElementById('profile-name').textContent  = user.user_metadata?.full_name || email.split('@')[0];
  document.getElementById('profile-email').textContent = email;
  document.getElementById('account-email').textContent = email;

  // Load reports
  await loadReports(user);
}

async function loadReports(user) {
  try {
    // Fetch custom_reports for this user, newest first
    const { data: reports, error } = await window.db
      .from('custom_reports')
      .select('id, slug, report_type, input_params, status, created_at, sections')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) throw error;

    // Fetch purchases for spend stats
    const { data: purchases } = await window.db
      .from('purchases')
      .select('amount, created_at')
      .eq('user_id', user.id)
      .eq('status', 'completed');

    allReports = (reports || []).map(r => ({
      ...r,
      toolKey: TOOL_MAP[r.report_type]?.toolKey || getToolFromSlug(r.slug),
    }));

    renderStats(allReports, purchases || []);
    renderReports(currentTab);
  } catch (e) {
    console.error('loadReports error:', e);
    renderStats([], []);
    renderReports(currentTab);
  }
}

function renderStats(reports, purchases) {
  const completed = reports.filter(r => r.status === 'completed').length;
  const spent     = purchases.reduce((s, p) => s + Number(p.amount || 0), 0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${reports.length}</div>
      <div class="stat-lbl">Total Reports</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${completed}</div>
      <div class="stat-lbl">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">$${spent.toFixed(0)}</div>
      <div class="stat-lbl">Total Spent</div>
    </div>`;
}

function renderReports(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['all','market','strategy','doc'][i] === tab);
  });

  const filtered = tab === 'all'
    ? allReports
    : allReports.filter(r => r.toolKey === tab);

  const container = document.getElementById('reports-list');

  if (!filtered.length) {
    const toolName = tab === 'market' ? 'Market Analysis' : tab === 'strategy' ? 'Strategy Builder' : tab === 'doc' ? 'Doc Intelligence' : '';
    const ctaHref  = tab === 'strategy' ? '/strategy-builder.html' : tab === 'doc' ? '/docreport.html' : '/report.html';
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📄</div>
        <div class="empty-title">No ${toolName || ''} reports yet</div>
        <div class="empty-sub">Your completed reports will appear here</div>
        <a href="${ctaHref}" class="btn btn-primary">Generate a Report</a>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(r => {
    const p      = r.input_params || {};
    const tool   = TOOL_MAP[r.report_type] || {};
    const label  = tool.label || (r.report_type || 'Report').replace(/_/g, ' ');
    const badge  = tool.badge || 'blue';
    const page   = tool.page  || '/report.html';
    const title  = p.industry
      ? p.industry + (p.country ? ' — ' + p.country : '')
      : (r.slug || 'Report').replace(/-\d{13}$/, '').replace(/-/g, ' ');
    const date   = new Date(r.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    const status = r.status || 'pending';

    const openBtn = status === 'completed'
      ? `<a href="${page}?slug=${r.slug}" class="btn-open">Open Report →</a>`
      : status === 'generating' || status === 'researching'
      ? `<a href="${page}?slug=${r.slug}" class="btn-open">View Progress →</a>`
      : '';

    return `
      <div class="report-card">
        <div class="report-card-left">
          <div class="tool-badge ${badge}">${label}</div>
          <div class="report-title">${title}</div>
          <div class="report-meta">
            <span>📅 ${date}</span>
            ${p.country ? `<span>🌏 ${p.country}</span>` : ''}
          </div>
        </div>
        <div class="report-card-right">
          <span class="status-badge status-${status}">${status}</span>
          ${openBtn}
        </div>
      </div>`;
  }).join('');
}

function switchTab(tab) { renderReports(tab); }

window.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
