# ============================================================
# KIRA RESEARCH — post-deploy smoke tests
#
# Fires after Vercel finishes deploying a production build. We get
# the GitHub `deployment_status` webhook from Vercel's integration,
# filter for state=success + Production, and run Playwright against
# the prod URL.
#
# Why the trigger change (was: `push` + sleep+poll):
#   On push we had no signal that Vercel was done with THIS commit.
#   The 60s sleep + curl-200 loop returned green even if the previous
#   deploy was still being served (cached edge). Smoke could pass
#   against stale code. `deployment_status` is the authoritative
#   "the new build is live" event.
#
# Triggers:
#   - deployment_status   → Vercel build success
#   - workflow_dispatch   → manual rerun via Actions UI
# ============================================================

name: post-deploy smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override SMOKE_BASE_URL (e.g. a preview URL)'
        required: false
        default: 'https://kiraresearch.com'

permissions:
  contents: read

concurrency:
  # Newer deploy supersedes in-flight runs — no point smoke-testing stale code.
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Only run on Production success or manual dispatch. deployment_status
    # fires for every state transition (queued/in_progress/error/failure/
    # success) and every environment (Preview included) — filter explicitly.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')

    steps:
      - name: Checkout (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Checkout (deployment_status — deployed SHA)
        if: github.event_name == 'deployment_status'
        uses: actions/checkout@v4
        with:
          # Run smoke against the exact code Vercel just shipped, not
          # whatever main happens to be at the moment the runner spins up.
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (when browser was cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run smoke tests
        run: npx playwright test
        env:
          # Always target kiraresearch.com on deployment_status — Vercel
          # atomic-swaps the prod alias on success, so by the time this
          # webhook fires, kiraresearch.com IS the new code. The per-deploy
          # vercel.app URL isn't reachable through the canonical domain so
          # tests that assert against `https://kiraresearch.com/...` would
          # false-fail there.
          SMOKE_BASE_URL: ${{ github.event.inputs.base_url || 'https://kiraresearch.com' }}
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
